<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" sizes="180x180">
<link rel="icon" type="image/svg+xml" href="/assets/logo-favicon.svg" sizes="32x32">
<meta name="theme-color" content="#D4AF37">
  <title>Você está offline | HOSPEDAH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #1b3568, #0B1C3D 55%, #08162d);
      color: #f3f6ff;
      padding: 20px;
      text-align: center;
    }
    .card {
      max-width: 560px;
      border-radius: 22px;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(11, 28, 61, 0.7);
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 44px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 10px;
      color: #D4AF37;
    }
    p {
      margin: 0 0 16px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 12px;
      background: #D4AF37;
      color: #0B1C3D;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <article class="card">
    <h1>Sem conexão no momento</h1>
    <p>Seu acesso premium continua parcialmente disponível offline. Assim que a conexão voltar, atualize para sincronizar suas reservas e dados do portal.</p>
    <a href="/index.html">Tentar novamente</a>
  </article>
</body>
</html>
