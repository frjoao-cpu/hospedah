<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOSPEDAH | Offline</title>
<link rel="stylesheet" href="/assets/mobile-first.css">
<link rel="stylesheet" href="/assets/style.css">
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#12305d,#071224);color:#fff;font-family:Poppins,sans-serif}
.offline-card{width:min(92vw,540px);border:1px solid rgb(212 175 55 / 35%);background:rgb(7 18 36 / 90%);border-radius:16px;padding:24px;text-align:center}
.offline-card img{width:140px;height:auto}
.offline-card h1{color:#d4af37;font-size:1.35rem}
.offline-links{display:grid;grid-template-columns:repeat(2,minmax(140px,1fr));gap:10px;margin:18px 0}
.offline-links a,.offline-card button{min-height:44px;border-radius:10px;border:1px solid rgb(212 175 55 / 40%);color:#d4af37;background:rgb(212 175 55 / 8%);display:grid;place-items:center;text-decoration:none;font-weight:600;font-family:inherit;cursor:pointer}
.status{color:#b4c0d6;font-size:.9rem}
@media (max-width:580px){.offline-links{grid-template-columns:1fr}}
</style>
</head>
<body>
  <main class="offline-card" role="main">
    <img src="/assets/logo.svg" alt="HOSPEDAH" width="140" height="45">
    <h1>Você está offline, mas pode ver os resorts salvos</h1>
    <p class="status" id="offlineStatus">Sem conexão no momento. Assim que voltar, suas ações pendentes serão sincronizadas.</p>
    <div class="offline-links">
      <a href="/index.html">Início</a>
      <a href="/busca.html">Buscar resorts</a>
      <a href="/reservas.html">Reservas</a>
      <a href="/resorts/hotbeach.html">Hot Beach</a>
    </div>
    <button type="button" id="retryBtn">Tentar novamente</button>
  </main>
<script>
(function(){'use strict';var status=document.getElementById('offlineStatus');var retryBtn=document.getElementById('retryBtn');function checkConnection(){if(navigator.onLine){status.textContent='Conexão restabelecida! Redirecionando...';setTimeout(function(){window.location.href='/index.html';},700);}else{status.textContent='Ainda offline. Verifique sua internet e tente novamente.';}}retryBtn.addEventListener('click',checkConnection);window.addEventListener('online',checkConnection);}());
</script>
</body>
</html>
