<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HOSPEDAH | Curadoria Exclusiva</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: #fff;

    background:
    linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    url('assets/logo.jpg') center/60% no-repeat fixed;

    background-color: #0a0a0a;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

/* BUSCA */
.search-box {
    background: rgba(20,20,20,0.9);
    padding: 20px;
    border-radius: 15px;
    max-width: 900px;
    margin: auto;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.search-box input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    flex: 1;
}

.search-box button {
    background: linear-gradient(135deg,#D4AF37,#FFD700);
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    font-weight: bold;
}

/* CARDS */
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 40px;
}

.card {
    width: 300px;
    background: rgba(17,17,17,0.9);
    border-radius: 15px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card h3 {
    padding: 10px;
    color: #FFD700;
}

.card p {
    padding: 0 10px;
    font-size: 14px;
}

.btn {
    display: block;
    margin: 15px;
    padding: 10px;
    background: #25D366;
    border-radius: 20px;
    text-align: center;
    color: #fff;
    text-decoration: none;
}

/* BOTÕES FLUTUANTES */
.whatsapp, .instagram {
    position: fixed;
    right: 20px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.whatsapp {
    bottom: 20px;
    background: #25D366;
}

.instagram {
    bottom: 90px;
    background: linear-gradient(135deg,#833AB4,#E1306C,#FCAF45);
}

.icon {
    width: 24px;
    height: 24px;
    fill: #fff;
}

</style>
</head>

<body>

<div class="hero">
<h1>Experiências Exclusivas em Hospedagens</h1>
<p>Curadoria personalizada • Atendimento sob medida</p>
</div>

<div class="search-box">
<input type="text" id="destino" placeholder="Destino">
<input type="date" id="checkin">
<input type="date" id="checkout">
<select id="pessoas">
<option>2 pessoas</option>
<option>4 pessoas</option>
<option>Família</option>
</select>

<button onclick="enviarWhats()">Buscar</button>
</div>

<div class="cards">

<div class="card" data-destino="olimpia">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
<h3>Hot Beach Suites</h3>
<p>Resort completo em Olímpia</p>
<a class="btn" onclick="reservar('Hot Beach Suites')">Consultar</a>
</div>

<div class="card" data-destino="olimpia">
<img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb">
<h3>Olímpia Park</h3>
<p>Localização privilegiada</p>
<a class="btn" onclick="reservar('Olímpia Park')">Consultar</a>
</div>

<div class="card" data-destino="praia">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<h3>Juquehy</h3>
<p>Praia premium</p>
<a class="btn" onclick="reservar('Juquehy')">Consultar</a>
</div>

</div>

<!-- BOTÃO WHATSAPP -->
<a href="https://wa.me/5517982006382" class="whatsapp">

</a>

<script>
function enviarWhats() {
    let destino = document.getElementById('destino').value;
    let msg = `Olá, quero uma experiência premium em ${destino}`;
    window.open(`https://wa.me/5517982006382?text=${encodeURIComponent(msg)}`);
}

function reservar(hotel) {
    let msg = `Olá, quero informações sobre ${hotel}`;
    window.open(`https://wa.me/5517982006382?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
