/* CORES DA MARCA */

    --azul:#0B1C3D;

}

/* SEÇÕES */

    border-left:4px solid var(--dourado);
    padding-left:10px;
    font-size:24px;
    color:var(--dourado-claro);
}

/* GALERIA */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:12px;
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.06);
}

/* BOTÕES */
.whatsapp, .instagram{

    height:55px;

    display:flex;

}

.whatsapp{

}

.instagram{

    background:linear-gradient(135deg,#833AB4,#E1306C,#FCAF45);
}

/* FOOTER */
footer{

    padding:25px;
    font-size:14px;
    opacity:0.7;
