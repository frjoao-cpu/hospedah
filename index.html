<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOSPEDAH | Resorts Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root { --dourado:#D4AF37; --azul:#0B1C3D; }

body{
margin:0;
font-family:Poppins,sans-serif;
background:#0B1C3D;
color:#fff;
}

/* MENU */
.menu-toggle{
position:fixed;top:15px;left:15px;
font-size:28px;background:#0B1C3D;color:#D4AF37;
padding:10px 15px;border-radius:10px;cursor:pointer;z-index:999;
}

.menu-mobile{
position:fixed;left:-100%;top:0;width:260px;height:100%;
background:#fff;color:#000;padding:20px;transition:.3s;z-index:1000;
}

.menu-mobile.open{left:0;}

.menu-mobile a{
display:block;margin:15px 0;color:#0B1C3D;font-weight:bold;text-decoration:none;
}

/* HERO */
.hero{
position:relative;height:320px;overflow:hidden;
}

.hero img{
position:absolute;width:100%;height:100%;object-fit:cover;
opacity:0;animation:slide 30s infinite;
}

.hero img:nth-child(1){animation-delay:0s;}
.hero img:nth-child(2){animation-delay:5s;}
.hero img:nth-child(3){animation-delay:10s;}

@keyframes slide{
0%{opacity:0;}
10%{opacity:1;}
30%{opacity:1;}
40%{opacity:0;}
100%{opacity:0;}
}

.overlay{
position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.3);
}

.logo-hero{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:280px;
}

/* TABS */
.tabs{
display:flex;justify-content:center;gap:10px;margin:30px 10px;flex-wrap:wrap;
}

.tab{
background:#fff1;color:#D4AF37;
border:none;padding:10px 18px;border-radius:20px;cursor:pointer;
}

.tab.active{background:#D4AF37;color:#0B1C3D;}

/* GALERIA */
.gallery-block{display:none;}
.gallery-block.active{display:block;}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:0 15px;
}

.gallery img{
width:100%;height:200px;object-fit:cover;border-radius:12px;
}

/* TITULO */
.resort-title{
text-align:center;color:#D4AF37;margin:20px 0;font-weight:bold;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu-toggle" id="menuBtn">☰</div>

<div class="menu-mobile" id="menu">
<a href="#hotbeach">Hot Beach</a>
<a href="#saopedro">São Pedro</a>
<a href="#olimpia">Olimpia</a>
</div>

<!-- HERO -->
<div class="hero">
<img src="https://i.imgur.com/AmFSwwd.jpeg">
<img src="https://i.imgur.com/PMok8fe.jpeg">
<img src="https://i.imgur.com/bOOUiLE.jpeg">

<div class="overlay"></div>

<img src="https://i.imgur.com/ITjjQaf.jpeg" class="logo-hero">
</div>

<!-- TABS -->
<div class="tabs">
<button class="tab active" data-block="hotbeach">Hot Beach</button>
<button class="tab" data-block="saopedro">São Pedro</button>
<button class="tab" data-block="olimpia">Olimpia</button>
</div>

<!-- GALERIAS -->

<div class="gallery-block active" id="hotbeach">
<div class="resort-title">Hot Beach</div>
<div class="gallery">
<img src="https://i.imgur.com/AmFSwwd.jpeg">
<img src="https://i.imgur.com/PMok8fe.jpeg">
<img src="https://i.imgur.com/bOOUiLE.jpeg">
</div>
</div>

<div class="gallery-block" id="saopedro">
<div class="resort-title">São Pedro</div>
<div class="gallery">
<img src="https://i.imgur.com/pyEKOtQ.jpeg">
<img src="https://i.imgur.com/1HeNjKT.jpeg">
<img src="https://i.imgur.com/9kgfR2y.jpeg">
</div>
</div>

<div class="gallery-block" id="olimpia">
<div class="resort-title">Olimpia</div>
<div class="gallery">
<img src="https://i.imgur.com/AseZPzL.jpeg">
<img src="https://i.imgur.com/uhGHhcA.jpeg">
<img src="https://i.imgur.com/1xGGlIh.jpeg">
</div>
</div>

<!-- SCRIPT -->
<script>

// MENU
document.getElementById("menuBtn").onclick = () => {
document.getElementById("menu").classList.toggle("open");
};

// TABS (CORREÇÃO DA GALERIA)
const tabs = document.querySelectorAll(".tab");
const blocks = document.querySelectorAll(".gallery-block");

tabs.forEach(tab=>{
tab.addEventListener("click",()=>{
let id = tab.getAttribute("data-block");

tabs.forEach(t=>t.classList.remove("active"));
blocks.forEach(b=>b.classList.remove("active"));

tab.classList.add("active");
document.getElementById(id).classList.add("active");
});
});

</script>

</body>
</html>
