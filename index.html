<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HOSPEDAH | Curadoria Exclusiva</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* CORES DA MARCA */
:root {
    --gold: #D4AF37;
    --gold-strong: #FFD700;
    --black: #0a0a0a;
}

/* FUNDO */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: #fff;

    background:
    linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    url('assets/logo.jpg') center/60% no-repeat fixed;

    background-color: var(--black);
}

/* HEADER LUXO */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 30px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Ícone estilo marca */
.logo-icon {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: linear-gradient(135deg,var(--gold),var(--gold-strong));
}

/* Nome da marca */
.logo-text {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--gold-strong);
}

/* HERO */
.hero {
    text-align: center;
    padding: 120px 20px 40px;
}

.hero h1 {
    font-size: 34px;
}

.hero span {
    color: var(--gold-strong);
}

/* BUSCA */
.search-box {
    background: rgba(20,20,20,0.9);
    padding: 20px;
    border-radius: 15px;
    max-width: 900px;
    margin: auto;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.search-box input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    flex: 1;
}

.search-box button {
    background: linear-gradient(135deg,var(--gold),var(--gold-strong));
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    font-weight: bold;
}

/* CARDS */
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 40px;
}

.card {
    width: 300px;
    background: rgba(17,17,17,0.9);
    border-radius: 15px;
    overflow: hidden;
    border: 1px solid rgba(255,215,0,0.1);
}

.card h3 {
    padding: 10px;
    color: var(--gold-strong);
}

.btn {
    display: block;
    margin: 15px;
    padding: 10px;
    background: #25D366;
    border-radius: 20px;
    text-align: center;
    color: #fff;
    text-decoration: none;
}

/* BOTÕES */
.whatsapp, .instagram {
    position: fixed;
    right: 20px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.whatsapp {
    bottom: 20px;
    background: #25D366;
}

.instagram {
    bottom: 90px;
    background: linear-gradient(135deg,#833AB4,#E1306C,#FCAF45);
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <div class="logo-icon"></div>
        <div class="logo-text">HOSPEDAH</div>
    </div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Experiências <span>Exclusivas</span> em Hospedagens</h1>
<p>Curadoria personalizada • Atendimento sob medida</p>
</div>

<!-- BUSCA -->
<div class="search-box">
<input type="text" id="destino" placeholder="Destino">
<input type="date">
<input type="date">
<select>
<option>2 pessoas</option>
<option>4 pessoas</option>
<option>Família</option>
</select>

<button onclick="alert('Atendimento exclusivo via WhatsApp')">Buscar</button>
</div>

<!-- RESORTS -->
<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
<h3>Hot Beach Suites</h3>
<a class="btn" href="https://wa.me/5517982006382">Consultar</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb">
<h3>Olímpia Park</h3>
<a class="btn" href="https://wa.me/5517982006382">Consultar</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<h3>Juquehy</h3>
<a class="btn" href="https://wa.me/5517982006382">Consultar</a>
</div>

</div>

<!-- BOTÕES -->
<a href="https://wa.me/5517982006382" class="whatsapp">💬</a>
<a href="https://www.instagram.com/julianasilvaoliveira.joao" class="instagram">📸</a>

</body>
</html>
