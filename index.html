<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOSPEDAH | PAINEL PROFISSIONAL SEGURO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body{margin:0;font-family:Arial, sans-serif;background:#0B1C3D;color:#fff}
.section{padding:40px;text-align:center}
.box{max-width:600px;margin:auto;background:#111;padding:25px;border-radius:15px}
input,select,textarea{width:100%;padding:12px;margin:6px 0 10px 0;border:none;border-radius:8px;background:#1f1f1f;color:#fff}
button{padding:12px 20px;border:none;border-radius:10px;background:gold;font-weight:bold;cursor:pointer;margin:5px 4px 5px 0;}
button[style*=da3333]{background:#da3333;color:#fff}
.card{background:#111;padding:18px 15px 18px 118px;margin:10px;border-radius:10px;text-align:left;min-height:120px;position:relative;}
.badge{padding:4px 8px;border-radius:6px;font-size:12px}
.novo{background:gray}
.andamento{background:orange}
.fechado{background:green}
.card-actions{margin-top:12px;}
.flagzap{float:right;color:#25d366;font-weight:bold;margin-top:3px;}
.card .thumbs-mult img{width:80px;height:80px;object-fit:cover;border-radius:12px;border:2px solid #292929;margin:2px 3px 4px 0;cursor:pointer;transition:.12s;}
.card .thumbs-mult{position:absolute;left:15px;top:18px;}
.card .thumbs-mult{display:flex;flex-wrap:wrap;max-width:92px;}
.card .thumbs-mult img:hover{border-color:gold;}
textarea{min-height:48px;}
.filtro-bloco{max-width:770px;margin:8px auto;padding:0 0 12px 0;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.input-img-label{display:inline-block;margin-top:7px;}
.input-img-label input{display:none;}
.input-img-label span{
  display:inline-block;padding:8px 15px;background:#444;color:#fff;border-radius:8px;cursor:pointer;font-size:13px;
  border:1.5px solid #555;transition:.15s;
}
.input-img-label span:hover{background:gold;color:#222;}
#preview-mult{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
#preview-mult img{width:60px;height:60px;border-radius:9px;object-fit:cover;border:2px solid #222;}
#toast {
  position: fixed; top:15px; right:15px; background: #1f1f1f; color:#fff;
  padding: 12px 22px; border-radius: 8px; box-shadow:0 2px 15px #000c; 
  z-index:16777; font-weight:600; display:none; min-width:120px; text-align:center;
  animation:toastfadein .2s;
}
@keyframes toastfadein{from{opacity:0;transform:translateY(-25px);}to{opacity:1;transform:translateY(0);}}
.lgpd{font-size:14px;opacity:.7;margin-top:7px;}
@media(max-width:650px){
  .section{padding:18px;}
  .box{padding:13px;}
  .card{padding:19vw 7vw 18vw 38vw;min-height:160px;}
  .card .thumbs-mult img{width:22vw;height:22vw;}
  .card .thumbs-mult{top:15px;}
  #toast{left:20px;right:auto;min-width:60vw;}
}
.lightbox-modal{
  position:fixed;z-index:10000;inset:0;background:rgba(0,0,0,0.87);
  display:flex;align-items:center;justify-content:center;animation:fadeIn .14s;
}
.lightbox-imgset{
  display:flex;gap:14px;align-items:center;flex-direction:column;
  max-width:97vw;max-height:97vh;text-align:center;
}
.lightbox-imgset img{
  max-width:96vw;max-height:77vh;border-radius:14px;box-shadow:0 8px 28px 7px #000c;
}
.lightbox-thumbbar{display:flex;gap:8px;margin-top:10px;justify-content:center;}
.lightbox-thumbbar img{width:52px;height:52px;object-fit:cover;border-radius:7px;border:2.5px solid #fff;opacity:.7;cursor:pointer;}
.lightbox-thumbbar img.active{border-color:gold;box-shadow:0 0 7px 2px #d4af377a;opacity:1;}
.lightbox-close{
  position:absolute;top:20px;right:28px;
  background:#da3333;color:#fff;font-size:2.2em;border-radius:50%;border:none;width:44px;height:44px;cursor:pointer;font-weight:bold;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<div id="toast"></div>
<div class="section">
<h1>📊 Painel HOSPEDAH PROFISSIONAL</h1>
<p>Gestão avançada, <b>Backup/Restore, segurança e exportação completa</b></p>
</div>
<div class="lgpd">🔒 Todo dado é armazenado localmente no seu navegador. Nenhuma informação é enviada para servidores. <button style="background:#1a1a1a;font-size:13px;padding:6px 14px;" onclick="apagarTudo()">Limpar Dados</button></div>

<div class="section">
<div class="box" aria-label="Cadastro Cliente">
<h2>Novo Cliente</h2>
<input id="nome" placeholder="Nome" autocomplete="off">
<input id="email" placeholder="Email (opcional)">
<input id="destino" placeholder="Destino" autocomplete="off">
<input id="checkin" type="date" placeholder="Check-in">
<input id="checkout" type="date" placeholder="Check-out">
<input id="pessoas" placeholder="Pessoas">
<input id="whats" placeholder="WhatsApp (somente números)">
<textarea id="notas" placeholder="Notas/campos adicionais"></textarea>
<label class="input-img-label">
  <input multiple type="file" id="fotos" accept="image/*" onchange="previewImgs(this)">
  <span>📸 Fotos do Cliente/Imóvel (podem ser várias)</span>
</label>
<div id="preview-mult"></div>
<button onclick="salvarCliente()">Salvar + Gerar Proposta</button>
</div>
</div>

<div class="section">
<div class="filtro-bloco">
  <input id="busca" placeholder="🔍 Filtrar por nome/destino/email" oninput="render()">
  <select id="ordem" onchange="render()">
    <option value="recentes">Ordenar: Mais recente</option>
    <option value="antigos">Mais antigos</option>
    <option value="nome">Nome A-Z</option>
    <option value="statusNovo">Status: Novo</option>
    <option value="statusFechado">Status: Fechado</option>
  </select>
  <button onclick="baixarCSV()">Exportar CSV</button>
  <button onclick="baixarZIP()">Exportar ZIP (PDF+Fotos)</button>
  <button onclick="backup()">Backup JSON</button>
  <button onclick="restauraClick()">Restaurar JSON</button>
  <input id="restauraArq" type="file" style="display:none" accept=".json" onchange="restoreFile(this)">
</div>
<h2>Clientes</h2>
<div id="lista"></div>
</div>

<script>
const { jsPDF } = window.jspdf;
let fotosSelecionadas = []; // temp

function toast(msg,time=1900) {
  let t=document.getElementById('toast');
  t.style.display='block'; t.innerText=msg;
  clearTimeout(toast.tm);
  toast.tm=setTimeout(()=>{t.style.display='none'},time);
}

// ---------------- BACKUP E RESTAURAR (seguro/local) ----------------
function backup(){
  let data = localStorage.getItem('clientes')||'[]';
  let blob = new Blob([data],{type:'application/json'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download="clientes_hospedah_BACKUP.json";
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},200);
}
function restauraClick(){ document.getElementById('restauraArq').click(); }
function restoreFile(inp){
  if(!inp.files[0]) return;
  let reader = new FileReader();
  reader.onload = function(e){
    try { let lista = JSON.parse(e.target.result); if(Array.isArray(lista)){ localStorage.setItem('clientes',JSON.stringify(lista));render();toast("Backup restaurado!"); } else throw "Inválido"; }
    catch{ alert('Arquivo inválido.'); }
  };
  reader.readAsText(inp.files[0]);
  inp.value='';
}
function apagarTudo(){
  if(confirm("Apagar todo o CRM? (Esta ação não pode ser desfeita)")){
    localStorage.removeItem('clientes'); render();
    toast("Dados apagados!");
  }
}

// --------------- UPLOAD MULTI/IMG ----------------
function previewImgs(input){
  fotosSelecionadas = [];
  document.getElementById('preview-mult').innerHTML = "";
  if(input.files){
    Array.from(input.files).forEach(file=>{
      let reader = new FileReader();
      reader.onload = function(e){
        fotosSelecionadas.push(e.target.result);
        let imgEl = document.createElement("img");
        imgEl.src = e.target.result;
        document.getElementById('preview-mult').appendChild(imgEl);
      }
      reader.readAsDataURL(file);
    });
  }
}

// ------------ SALVAR CLIENTE -----------------
function salvarCliente(){
  let nome = nomeEl.value.trim();
  let email = emailEl.value.trim();
  let destino = destinoEl.value.trim();
  let whats = whatsEl.value.replace(/\D/g,'');
  let pessoas = pessoasEl.value.trim();
  let checkin = checkinEl.value;
  let checkout = checkoutEl.value;
  let notas = notasEl.value;

  if(!nome || !destino || !whats){
    toast('Preencha Nome, Destino e WhatsApp!',2500); return;
  }
  if(!validWhats(whats)){
    toast('WhatsApp inválido! Coloque só números com DDD e país.',3200); return;
  }

  let lista=JSON.parse(localStorage.getItem('clientes')||'[]');
  if(lista.find(c => c.nome.trim().toLowerCase() === nome.toLowerCase())){
    toast('Já existe um cliente com este nome!',3500);
    return;
  }

  let cliente={
    nome,email,destino,checkin,checkout,pessoas,whats,notas,
    status:'novo',
    zapEnviado:false,
    fotos:[...fotosSelecionadas],
    dateCreated: Date.now(),
    log:[]
  }
  logCliente(cliente,`Cadastro criado`);
  lista.push(cliente);
  localStorage.setItem('clientes',JSON.stringify(lista));
  gerarPDF(cliente);
  enviarWhats(lista.length-1);
  render();
  nomeEl.value=emailEl.value=destinoEl.value=checkinEl.value=checkoutEl.value=pessoasEl.value=whatsEl.value=notasEl.value="";
  fotosSelecionadas=[]; document.getElementById('fotos').value=""; document.getElementById('preview-mult').innerHTML="";
  toast("Cliente salvo!");
}

function validWhats(whats){
  // Aceita 11 ou 13 dígitos (com 55 ou sem)
  return whats.length === 13 || whats.length === 11;
}

// ----------- LOG por cliente --------------
function logCliente(obj,msg){
  try{
    let agora=new Date();
    obj.log = obj.log||[];
    obj.log.push(`${agora.toLocaleString()} - ${msg}`);
  }catch{}
}
function logClienteIdx(idx,msg){
  let lista=JSON.parse(localStorage.getItem('clientes')||'[]');
  logCliente(lista[idx],msg);
  localStorage.setItem('clientes',JSON.stringify(lista));
}

// ----------- PDF ----------------
function gerarPDF(c){
  let doc=new jsPDF()
  doc.setFontSize(16)
  doc.text("PROPOSTA HOSPEDAH",20,20)
  doc.setFontSize(12)
  doc.text(`Cliente: ${c.nome}`,20,40)
  doc.text(`Email: ${c.email||""}`,20,50)
  doc.text(`Destino: ${c.destino}`,20,60)
  doc.text(`Check-in: ${c.checkin||"-"}`,20,70)
  doc.text(`Check-out: ${c.checkout||"-"}`,20,80)
  doc.text(`Pessoas: ${c.pessoas||"-"}`,20,90)
  doc.text(`Notas: ${c.notas||"-"}`,20,100)
  doc.save(`proposta_${c.nome||'cliente'}.pdf`)
}
// ----------- WHATS ----------------
function enviarWhats(idx){
  let lista=JSON.parse(localStorage.getItem('clientes')||'[]');
  let c=lista[idx];
  let msg=`✨ *PROPOSTA HOSPEDAH* ✨\n👤 ${c.nome}\n📍 ${c.destino}`
  if(c.checkin||c.checkout) msg+=`\n📅 ${c.checkin||'-'} até ${c.checkout||'-'}`
  if(c.pessoas) msg+=`\n👥 Pessoas: ${c.pessoas}`
  if(c.email) msg+=`\n📧 ${c.email}`;
  if(c.notas) msg+=`\n📝 ${c.notas}`;
  c.zapEnviado=true; logCliente(c,"WhatsApp enviado");
  localStorage.setItem('clientes',JSON.stringify(lista))
  window.open(`https://wa.me/55${c.whats}?text=${encodeURIComponent(msg)}`,"_blank")
  render()
}
// ----------- STATUS/EXCLUIR/NOTAS -----------
function alterarStatus(index,novo){
  let lista=JSON.parse(localStorage.getItem('clientes'));
  logCliente(lista[index],`Status alterado para: ${novo}`);
  lista[index].status=novo;
  localStorage.setItem('clientes',JSON.stringify(lista));
  render();
}
function remover(index){
  let lista=JSON.parse(localStorage.getItem('clientes'));
  if(confirm("Remover cliente "+(lista[index]?.nome||'')+"?")) {
    logClienteIdx(index,"Cliente removido!");
    lista.splice(index,1);
    localStorage.setItem('clientes',JSON.stringify(lista));
    render();
    toast("Removido!");
  }
}
function atualizarNotas(idx,el){
  let lista=JSON.parse(localStorage.getItem('clientes'))
  lista[idx].notas=el.value; logCliente(lista[idx], "Notas editadas");
  localStorage.setItem('clientes',JSON.stringify(lista))
}
function cardPDF(i){
  let lista=JSON.parse(localStorage.getItem('clientes'))
  gerarPDF(lista[i])
  logClienteIdx(i,`PDF baixado`);
}
// ----------- CSV OUT -----------
function baixarCSV(){
  let lista=JSON.parse(localStorage.getItem('clientes')||'[]')
  if(lista.length==0) return toast("Nada para exportar!");
  let csv = "Nome,Email,Destino,Check-in,Check-out,Pessoas,WhatsApp,Status,Notas,Imagens,Log\n"+
    lista.map(c=>
      `"${c.nome}","${c.email||""}","${c.destino}","${c.checkin||''}","${c.checkout||''}","${c.pessoas||''}","${c.whats}","${c.status}","${(c.notas||"").replace(/"/g,"'")}","${(c.fotos||[]).length}","${(c.log||[]).join(' / ').replace(/"/g,"'")}"`
    ).join("\n")
  let blob = new Blob([csv],{type:"text/csv"})
  let url=URL.createObjectURL(blob)
  let a=document.createElement('a')
  a.href=url;a.download="clientes_hospedah.csv";
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},500);
}
// ---------- ZIP de PDFs e imagens -----------
async function baixarZIP(){
  let lista=JSON.parse(localStorage.getItem('clientes')||'[]');
  if(lista.length==0) return toast("Nada para exportar!");
  let zip = new JSZip();
  let any = false;
  for(let i=0;i<lista.length;i++){
    let c=lista[i];
    let pasta = zip.folder(`${sanitize(c.nome)}_${sanitize(c.destino)}`);
    // PDF (cliente individual)
    let doc = new jsPDF();
    doc.setFontSize(16)
    doc.text("PROPOSTA HOSPEDAH",20,20)
    doc.setFontSize(12)
    doc.text(`Cliente: ${c.nome}`,20,40)
    doc.text(`Email: ${c.email||""}`,20,50)
    doc.text(`Destino: ${c.destino}`,20,60)
    doc.text(`Check-in: ${c.checkin||"-"}`,20,70)
    doc.text(`Check-out: ${c.checkout||"-"}`,20,80)
    doc.text(`Pessoas: ${c.pessoas||"-"}`,20,90)
    doc.text(`Notas: ${c.notas||"-"}`,20,100)
    pasta.file(`proposta_${sanitize(c.nome)}.pdf`,doc.output('arraybuffer'))
    if(c.fotos && c.fotos.length){
      any = true;
      c.fotos.forEach((b64,ix)=>{
        let [meta,data]=b64.split(',');
        let ext = (meta||'').match(/image\/(.*?);/)?.[1]||'jpg';
        pasta.file(`foto${ix+1}.${ext}`,data, {base64:true});
      });
    }
  }
  if(!any) toast("Nenhuma foto mas PDFs exportados!");
  zip.generateAsync({type:"blob"}).then(blob=>{
    let a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download="hospedah_export.zip";
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500);
    toast("ZIP exportado!");
  });
}
function sanitize(s){return (s||'').replace(/[\/\\?%"<>|:]/g,'_').replace(/\s+/g,'_');}

// ----- LIGHTBOX ----
function openLightbox(imgs,idx){
  if(!imgs||imgs.length==0) return;
  let lb = document.createElement("div");
  lb.className = "lightbox-modal";
  let imgset = document.createElement('div');
  imgset.className = "lightbox-imgset";
  let img = document.createElement('img');
  img.src = imgs[idx];
  imgset.appendChild(img);
  let tb = document.createElement('div');
  tb.className = 'lightbox-thumbbar';
  imgs.forEach((src,i)=>{
    let thumb = document.createElement('img');
    thumb.src = src;
    if(i==idx) thumb.classList.add('active');
    thumb.onclick = ()=>{img.src=src;tb.querySelectorAll('img').forEach(t=>t.classList.remove('active'));thumb.classList.add('active');};
    tb.appendChild(thumb);
  });
  imgset.appendChild(tb);
  let closeBtn = document.createElement('button');
  closeBtn.className = 'lightbox-close'; closeBtn.innerHTML='&times;';
  closeBtn.onclick=()=>lb.remove();
  lb.appendChild(imgset);lb.appendChild(closeBtn);
  document.body.appendChild(lb);
  lb.tabIndex=0; closeBtn.focus();

  lb.addEventListener('keydown',function(e){
    if (e.key==='Escape') lb.remove();
    else if (e.key==='ArrowLeft'){
      idx = (idx+imgs.length-1)%imgs.length;
      img.src = imgs[idx];
      tb.querySelectorAll('img').forEach((t,i)=>t.classList.toggle('active',i===idx))
    }
    else if(e.key==='ArrowRight'){
      idx = (idx+1)%imgs.length;
      img.src = imgs[idx];
      tb.querySelectorAll('img').forEach((t,i)=>t.classList.toggle('active',i===idx))
    }
  });
  lb.onclick = e => {if(e.target===lb) lb.remove();}
}

// ------------- RENDER -------------
function render(){
  let lista=JSON.parse(localStorage.getItem('clientes')||'[]')
  let div=document.getElementById('lista')
  let termo=(document.getElementById('busca')||{value:""}).value.trim().toLowerCase()
  let ordem=document.getElementById('ordem')?.value||'recentes';
  let dados = [...lista];

  // Filtra busca
  if(termo) dados = dados.filter(c=>
    c.nome.toLowerCase().includes(termo) ||
    (c.destino||"").toLowerCase().includes(termo) ||
    (c.email||"").toLowerCase().includes(termo)
  );

  // Ordenação
  if(ordem==="antigos") dados.sort((a,b)=>a.dateCreated-b.dateCreated);
  else if(ordem==="nome") dados.sort((a,b)=>a.nome.localeCompare(b.nome));
  else if(ordem==="statusNovo") dados = dados.filter(c=>c.status==='novo');
  else if(ordem==="statusFechado") dados = dados.filter(c=>c.status==='fechado');
  // default: mais recentes e status

  if(dados.length==0){
    div.innerHTML='<em>Nenhum cliente encontrado.</em>'
    return
  }
  div.innerHTML = '';
  dados.forEach((c,ii)=>{
    let idx = lista.findIndex(cl=>cl.nome===c.nome);
    let cor=c.status==='novo'?'novo':c.status==='andamento'?'andamento':'fechado'
    let thumbs = (c.fotos||[]).map((src,i)=> `<img src="${src}" title="Abrir" onclick="openLightbox(JSON.parse(localStorage.getItem('clientes'))[${idx}].fotos,${i})">`).join('');
    div.innerHTML+=`
    <div class="card">
      <div class="thumbs-mult">${thumbs||""}</div>
      <b>${c.nome}</b> ${(c.email? " <small>("+c.email+")</small>":"")} - ${c.destino}
      ${(c.zapEnviado?'<span class="flagzap" title="WhatsApp enviado">✔️ Whats</span>':'')}
      <br>
      <span class="badge ${cor}">${c.status}</span>
      <br>Check-in: ${c.checkin||'-'} | Check-out: ${c.checkout||'-'}<br>Pessoas: ${c.pessoas||'-'}<br>Whatsapp: ${c.whats}
      <br>
      <textarea placeholder="Notas/campo livre" onchange="atualizarNotas(${idx},this)">${c.notas||""}</textarea>
      <select onchange="alterarStatus(${idx},this.value)">
        <option value="novo" ${c.status==='novo'?'selected':''}>Novo</option>
        <option value="andamento" ${c.status==='andamento'?'selected':''}>Em negociação</option>
        <option value="fechado" ${c.status==='fechado'?'selected':''}>Fechado</option>
      </select>
      <div class="card-actions">
        <button onclick="enviarWhats(${idx})">WhatsApp</button>
        <button onclick="cardPDF(${idx})">PDF</button>
        <button onclick="remover(${idx})" style="background:#da3333;color:#fff">Excluir</button>
      </div>
      <!-- Log de ações: não visível, mas pode acessar no export, ou descomente abaixo para mostrar-->
      <!-- <div style="font-size:11px;opacity:.7;margin-top:7px;max-height:36px;overflow:auto">${(c.log||[]).join('<br>')}</div> -->
    </div>`
  })
}

// ELEMENTOS
const nomeEl=document.getElementById('nome')
const emailEl=document.getElementById('email')
const destinoEl=document.getElementById('destino')
const checkinEl=document.getElementById('checkin')
const checkoutEl=document.getElementById('checkout')
const pessoasEl=document.getElementById('pessoas')
const whatsEl=document.getElementById('whats')
const notasEl=document.getElementById('notas')

render()
</script>
</body>
</html>
