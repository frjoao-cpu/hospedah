<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOSPEDAH | Resorts e Experiências Exclusivas</title>
<meta name="description" content="Hospede-se com qualidade nos melhores resorts e tenha experiências exclusivas. Orçamento premium, atendimento digital e profissionais à disposição.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --dourado: #D4AF37;
  --azul: #0B1C3D;
  --bg-claro: #fff;
  --bg-grad: linear-gradient(135deg,#0B1C3D,#142850);
  --cor-foco: #e7c343;
}
html[data-theme="dark"] body { background: var(--bg-grad); color: #fff; }
html[data-theme="light"] body { background: var(--bg-claro); color: #191919; }
body{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
.menu-topo {
  width: 100%;
  background: #fff;
  box-shadow: 0 4px 20px -7px #001e3b30;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 99;
}
nav.nav-main {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 18px 0 8px 0;
  background: none;
  z-index: 2;
}
nav.nav-main a {
  display: inline-block;
  background: var(--azul);
  color: var(--dourado);
  font-weight: 600;
  text-decoration: none;
  font-size: 18px;
  padding: 11px 22px;
  border-radius: 30px;
  transition: background .17s, color .17s, box-shadow .16s;
  box-shadow: 0 2px 8px #1113;
  letter-spacing: .02em;
  border: none;
  outline: none;
}
nav.nav-main a:hover,nav.nav-main a:focus {background: #21315B; color: #FFD700;}
.modo-toggle{position:absolute;right:30px;top:13px;z-index:91;}
.modo-toggle button{background:#132042;color:var(--dourado);border-radius:28px;padding:8px 20px;font-weight:600;border:none;cursor:pointer;font-size:18px;box-shadow:0 2px 8px #1112;}
.modo-toggle button:active{background:var(--dourado);color:#132042;}
@media (max-width:900px) {nav.nav-main {gap: 8px;}nav.nav-main a {font-size:15px;padding:7px 10px;}}
@media (max-width:600px){
  nav.nav-main {flex-wrap:wrap;gap:4px;padding-top:11px;padding-bottom:7px;}
  .menu-topo {flex-direction:column;padding:0;}
}
.faixa-logo {
  width:100%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 0 34px 0;
  position:relative;
  border-bottom: 2px solid #eee;
}
.faixa-logo img{
  max-width:420px; width:94vw; height:auto; display:block; margin:35px auto 0 auto;
}
.topo-infos{display:flex;flex-direction:column;align-items:center;gap:7px;margin-top:22px;}
.topo-infos h1{color:#D4AF37;font-size:1.33rem;font-weight:600;margin-bottom:3px;letter-spacing:.4px;}
.insta-top{
  margin-bottom:4px;
  display:inline-block;
  padding:11px 28px;
  border-radius:30px;
  background:linear-gradient(45deg,#833AB4,#E1306C,#FCAF45);
  text-decoration:none;color:#fff;font-size:17px;font-weight:500;
}
.contatos-topo{display:flex;gap:22px;justify-content:center;margin-top:14px;}
.contato-b{background:rgba(11,28,61,0.07);border-radius:11px;padding:13px 19px 11px 19px;min-width:140px;display:flex;flex-direction:column;align-items:center;}
.contato-b h3{color:#D4AF37;font-size:1.07rem;margin:0 0 2px 0;}
.contato-b p{font-size:13px;margin:0 0 4px 0;color:var(--dourado);font-weight:600;}
.contato-b a.btn{margin-top:1px;padding:8px 18px;background:#25D366;border-radius:16px;color:#fff;text-decoration:none;font-size:15px;}
.section{padding:44px 14px 24px 14px;text-align:center;}
.tabs{display:flex;justify-content:center;gap:7px;margin-bottom:22px;flex-wrap:wrap;}
.tab{padding:10px 24px;background:#fff1;border-radius:22px 22px 0 0;font-size:17px;color:var(--dourado);border:none;cursor:pointer;outline:none;font-weight:600;transition:.14s;}
.tab.active,.tab:focus{background:var(--dourado);color:#0B1C3D;}
.tab:hover{background:#D4AF37cc;color:#fff;}
.gallery-block{display:none;}
.gallery-block.active{display:block;}
.resort-title{font-size:1.33rem;color:var(--dourado);margin-bottom:11px;font-weight:700;letter-spacing:.06em;}
.resort-link{color:var(--dourado);font-size:1rem;text-decoration:none;font-weight:500;margin-bottom:20px;display:inline-block;}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;justify-items:center;}
.gallery img{width:100%;max-width:420px;height:260px;object-fit:cover;border-radius:14px;box-shadow: 0 2px 16px rgba(0,0,0,0.16); cursor: pointer;transition:.2s;}
.gallery img:focus-visible{ outline: 3px solid var(--cor-foco);}
@media (max-width:500px) {.gallery img{height:130px;}}
/* Depoimentos */
.depoimentos-section {padding:38px 4vw 64px 4vw;background:#fff;}
.depo-title {text-align:center;font-size:1.34em;color:#D4AF37;margin-bottom:32px;}
.depo-carousel-wrap {max-width:350px;margin:0 auto;position:relative;}
.depo-carousel-inner {overflow:hidden;}
.depo-card {background:linear-gradient(115deg,#fffbe7 50%,#fbecd1 100%);color:#191919;border-radius:16px;box-shadow:0 2px 18px #efb21107;max-width:340px;min-height:378px;padding:36px 28px 32px 28px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;position:absolute;width:100%;left:0;top:0;opacity:0;transition:all .44s cubic-bezier(.68,-0.55,.27,1.55);pointer-events:none;}
.depo-card.active {opacity:1;position:relative;pointer-events:auto;}
.depo-card img{width:56px;height:56px;border-radius:50%;margin-bottom:15px;object-fit:cover;box-shadow:0 1px 8px #0001;}
.depo-stars{color:gold;font-size:1.26em;margin-bottom:10px;letter-spacing:2px;}
.depo-card p{font-size:1.07em;margin:0 0 12px 0;font-style:italic;}
.depo-nome{font-weight:bold;margin-top:2px;font-size:1.08em;}
.depo-cidade{font-size:.99em;color:#b9aa92;}
.depo-carousel-arrows {text-align:center;margin-top:24px;}
.depo-carousel-btn {background: var(--dourado,#D4AF37); color:#fff;border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:1.8em;margin:0 13px;transition:.15s; vertical-align:middle;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 2px 6px #0002;}
.depo-carousel-btn:hover {background:goldenrod;}
.depo-carousel-dots {text-align:center;margin:22px 0 0 0;}
.depo-carousel-dot{display:inline-block;width:13px;height:13px;background:#ecd498;border-radius:50%;margin:0 6px;cursor:pointer;transition:.15s;border:2px solid #fff;vertical-align:middle;box-shadow:0 2px 7px #d4af3755;}
.depo-carousel-dot.active{background:var(--dourado,#D4AF37);border:2px solid #d4af37;}
@media(max-width:480px){.depo-carousel-wrap {max-width:96vw;}.depo-card {max-width:96vw;}}
/* Pré-reserva painel */
#pre-reserva {background:rgba(255,255,255,0.04);padding:44px 4vw 54px 4vw;border-radius:18px;max-width:1100px; margin:48px auto;}
.panel-duo {display:grid;grid-template-columns:1fr 1fr;gap:34px;}
@media(max-width:900px){.panel-duo{grid-template-columns:1fr;gap:16px;}}
.panel-box {background:#182242; box-shadow:0 2px 20px #0b1c3d13;padding:28px;border-radius:16px;}
.panel-box h2{color:var(--dourado);margin-bottom:18px;font-size:1.33em;}
.panel-box input, .panel-box select {font-family:'Poppins',sans-serif;width:100%;padding:13px;margin:6px 0 17px;border-radius:12px;border:1.5px solid #274678;background:#f8f7f3;color:#222;font-size:17px;}
.panel-box button {margin-top:7px; padding:12px; width:100%; border:none; border-radius:9px; background:var(--azul); color:var(--dourado); font-weight:700; font-size:17px;letter-spacing:.01em; box-shadow:0 2px 6px #0b1c3d22;cursor:pointer;transition: background .11s,color .11s;}
.panel-box button:hover {background:var(--dourado); color:var(--azul);}
.card { background:#24315b; padding:13px 15px;border-radius:14px; margin-top:10px; }
.card button {background:var(--dourado);color:var(--azul);margin-top:8px;font-size:1em;}
.card button:hover{background:goldenrod;color:#fff;}
.small { font-size:13px; opacity:0.75; color:var(--dourado);}
</style>
</head>
<body>
<a id="topo"></a>
<div class="menu-topo">
    <nav class="nav-main" aria-label="Menu principal">
        <a href="#topo">Início</a>
        <a href="#pre-reserva">Pré-Reserva</a>
        <a href="#galeria">Galeria</a>
        <a href="#depoimentos">Avaliações</a>
        <a href="#orcamento">Orçamento</a>
        <a href="#multi">Cadastre seu empreendimento</a>
        <a href="#contato">Contato</a>
    </nav>
    <div class="modo-toggle">
        <button id="modeToggleBtn" aria-label="Trocar tema">🌓</button>
    </div>
</div>
<div class="faixa-logo">
    <img src="https://i.imgur.com/ITjjQaf.jpeg" alt="HOSPEDAH - Sua experiência começa aqui">
</div>
<div class="topo-infos">
    <h1>Experiências Exclusivas</h1>
    <a href="https://www.instagram.com/julianasilvaoliveira.joao?igsh=bzZmNGIxdjdqc285" class="insta-top" target="_blank">📸 Instagram Oficial</a>
    <div class="contatos-topo">
        <div class="contato-b">
            <h3>Flávio</h3>
            <p>Especialista em Hospedagens</p>
            <a class="btn" href="https://wa.me/5517982006382" target="_blank">WhatsApp</a>
        </div>
        <div class="contato-b">
            <h3>Juliana</h3>
            <p>Especialista em Hospedagens</p>
            <a class="btn" href="https://wa.me/5517992068296" target="_blank">WhatsApp</a>
        </div>
    </div>
</div>
<!-- Aqui o resto: painel pré-reserva, galeria completa (como acima), depoimentos, formulários, etc. idênticos ao exemplo anterior -->

<script>
const mbtn = document.getElementById('modeToggleBtn');
mbtn.addEventListener('click',()=>{
  let html = document.documentElement;
  let atual = html.getAttribute('data-theme')||'dark';
  html.setAttribute('data-theme', atual==='dark'?'light':'dark');
  mbtn.innerText = html.getAttribute('data-theme')==='dark' ? '🌓' : '🌞';
});
// ...outros scripts idênticos às respostas anteriores...
</script>
</body>
</html>
