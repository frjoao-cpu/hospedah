<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOSPEDAH | Resorts e Experiências Exclusivas</title>
<meta name="description" content="Hospede-se com qualidade nos melhores resorts e tenha experiências exclusivas. Orçamento premium, atendimento digital e profissionais à disposição.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --dourado: #D4AF37;
  --azul: #0B1C3D;
  --bg-claro: #fff;
  --bg-grad: linear-gradient(135deg,#0B1C3D,#142850);
  --cor-foco: #e7c343;
}
html[data-theme="dark"] body { background: var(--bg-grad); color: #fff; }
html[data-theme="light"] body { background: var(--bg-claro); color: #191919; }
nav.nav-main a,
nav.nav-main a:visited {
  color: var(--dourado);
  background: var(--azul);
}
nav.nav-main a:hover,
nav.nav-main a:focus {
  background: #21315B;
  color: #FFD700;
}
body{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;background:var(--bg-grad);color:#fff;}
.faixa-logo{width:100%;background:#fff;box-shadow:0 4px 20px -7px #001e3b30;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;position:relative;padding-top:0;padding-bottom:34px;}
nav.nav-main {width: 100%;display: flex;justify-content: center;gap: 20px;padding: 18px 0 0 0;position: absolute;top:0;left:0;z-index:22;background: transparent;}
nav.nav-main a{display:inline-block;background:var(--azul);color:var(--dourado);font-weight:600;text-decoration:none;font-size:18px;padding:11px 23px;border-radius:30px;margin:0;letter-spacing:.02em;transition: background .17s, color .17s, box-shadow .16s;box-shadow:0 2px 8px #1113;border:none;outline:none;opacity:1;visibility:visible;}
@media (max-width: 900px) {
    nav.nav-main {gap: 8px;}
    nav.nav-main a {font-size:15px;padding:9px 13px;}
}
@media (max-width:600px){
    nav.nav-main {flex-wrap:wrap;gap:5px;padding-top:10px;position: static;}
    .faixa-logo img {margin-top:14px;}
}
.faixa-logo img{max-width:400px;width:90vw;height:auto;display:block;margin:65px auto 0 auto;}
.modo-toggle{position:absolute;right:22px;top:22px;z-index:91;}
.modo-toggle button{background:#132042;color:var(--dourado);border-radius:28px;padding:8px 20px;font-weight:600;border:none;cursor:pointer;font-size:18px;box-shadow:0 2px 8px #1112;}
.modo-toggle button:active{background:var(--dourado);color:#132042;}
.topo-infos{display:flex;flex-direction:column;align-items:center;gap:7px;margin-top:22px;}
.topo-infos h1{color:#D4AF37;font-size:1.33rem;font-weight:600;margin-bottom:3px;letter-spacing:.4px;}
.insta-top{margin-bottom:4px;display:inline-block;padding:11px 28px;border-radius:30px;background:linear-gradient(45deg,#833AB4,#E1306C,#FCAF45);text-decoration:none;color:#fff;font-size:17px;font-weight:500;}
.contatos-topo{display:flex;gap:22px;justify-content:center;margin-top:14px;}
.contato-b{background:rgba(11,28,61,0.07);border-radius:11px;padding:13px 19px 11px 19px;min-width:140px;display:flex;flex-direction:column;align-items:center;}
.contato-b h3{color:#D4AF37;font-size:1.07rem;margin:0 0 2px 0;}
.contato-b p{
  font-size:13px;
  margin:0 0 4px 0;
  color:var(--dourado);       /* <-- Letreiro especialista em dourado */
  font-weight: 600;
}
.contato-b a.btn{margin-top:1px;padding:8px 18px;background:#25D366;border-radius:16px;color:#fff;text-decoration:none;font-size:15px;}
.section{padding:44px 14px 24px 14px;text-align:center;}
/* Outras regras (tabs, galeria, depoimentos, formulários, etc) iguais das versões anteriores; não removidas para resumo, só não repetidas aqui */
</style>
</head>
<body>
<a id="topo"></a> <!-- ancora para "Início" -->
    <div class="faixa-logo">
        <nav class="nav-main" aria-label="Navegação principal">
            <a href="#topo">Início</a>
            <a href="#galeria">Galeria</a>
            <a href="#orcamento">Orçamento</a>
            <a href="#multi">Cadastre seu empreendimento</a>
            <a href="#contato">Contato</a>
        </nav>
        <div class="modo-toggle">
            <button id="modeToggleBtn" aria-label="Trocar tema">🌓</button>
        </div>
        <img src="https://i.imgur.com/ITjjQaf.jpeg" alt="HOSPEDAH - Sua experiência começa aqui">
    </div>
    <div class="topo-infos">
        <h1>Experiências Exclusivas</h1>
        <a href="https://www.instagram.com/julianasilvaoliveira.joao?igsh=bzZmNGIxdjdqc285" class="insta-top" target="_blank">📸 Instagram Oficial</a>
        <div class="contatos-topo">
            <div class="contato-b">
                <h3>Flávio</h3>
                <p>Especialista em Hospedagens</p>
                <a class="btn" href="https://wa.me/5517982006382" target="_blank">WhatsApp</a>
            </div>
            <div class="contato-b">
                <h3>Juliana</h3>
                <p>Especialista em Hospedagens</p>
                <a class="btn" href="https://wa.me/5517992068296" target="_blank">WhatsApp</a>
            </div>
        </div>
    </div>

    <!-- As demais seções... -->
    <!-- Garanta que todas possuem id=SAME do menu, ex: <div class="section" id="galeria">... -->
    <!-- Ids: galeria, orcamento, multi, contato -->

    <!-- JS Troca de tema -->
    <script>
    const mbtn = document.getElementById('modeToggleBtn');
    mbtn.addEventListener('click',()=>{
      let html = document.documentElement;
      let atual = html.getAttribute('data-theme')||'dark';
      html.setAttribute('data-theme', atual==='dark'?'light':'dark');
      mbtn.innerText = html.getAttribute('data-theme')==='dark' ? '🌓' : '🌞';
    });
    </script>
</body>
</html>
