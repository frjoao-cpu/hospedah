h1 {
    text-align: center;
    padding: 20px;
}

h2 {
    margin: 30px 20px 10px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    padding: 0 20px;
}

.gallery img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

#lightbox {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

#lightbox img {
    max-width:90%;
    border-radius:10px;
}

.close {
    position:absolute;
    top:30px;
    right:40px;
    color:white;
    font-size:30px;
    cursor:pointer;
}

.whatsapp {
    position: fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px 20px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);

</style>
