<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOSPEDAH | Pré-Consulta e Cadastro de Empreendimento</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root { --dourado: #D4AF37; --azul: #0B1C3D; --menu-bg: #fff;}
html[data-theme="dark"] body { background: linear-gradient(135deg,#0B1C3D,#142850); color: #fff; }
html[data-theme="light"] body { background: #fff; color: #191919; }
body{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
.menu-hamburger{position:fixed;top:18px;left:17px;z-index:1301;background:var(--azul);color:var(--dourado);border:none;border-radius:8px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:2em;cursor:pointer;}
.menu-hamburger:active{background:var(--dourado);color:var(--azul);}
.menu-nav{position:fixed;top:0;left:0;height:100vh;width:0;transition:width .23s cubic-bezier(.4,1,.4,1);overflow-x:hidden;background:var(--menu-bg);z-index:1300;}
.menu-nav.open{width:235px;box-shadow:8px 0 28px #0002;}
.menu-close{position:absolute;top:17px;right:13px;background:none;border:none;font-size:2em;color:var(--azul);cursor:pointer;}
.menu-nav ul{list-style:none;margin:0;padding:66px 0 0 0;display:flex;flex-direction:column;gap:12px;}
.menu-nav a{color:var(--azul);background:none;text-decoration:none;font-weight:600;padding:12px 25px;border-radius:14px;font-size:1.09em;transition:.16s;}
.menu-nav a:hover,.menu-nav a:focus{background:#f7f3da;color:var(--dourado);}
@media(min-width:900px){
  .menu-hamburger{display:none;}
  .menu-nav{position:static;width:100vw!important;max-width:none;height:auto;box-shadow:none;}
  .menu-nav.open{box-shadow:none;}
  .menu-nav ul{flex-direction:row;padding:0;}
  .menu-nav a{font-size:1em;padding:13px 18px;}
  .menu-close{display:none;}
}
.modo-toggle{position:fixed;right:20px;top:17px;z-index:1401;}
.modo-toggle button{background:#132042;color:var(--dourado);border-radius:28px;padding:7px 17px;font-weight:600;border:none;cursor:pointer;font-size:16px;}
/* Banner e faixa logo */
#banner-booking{position:relative;height:560px;min-height:410px;width:100vw;overflow:hidden;z-index:10;}
#banner-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;background-size:cover;background-position:center;transition: background-image 1.25s,transform 2s cubic-bezier(.35,.93,.84,1.23);filter: brightness(.72) blur(.2px);}
.faixa-logo-caixa{margin-top:65px;margin-bottom:23px;background:white;border-radius:36px;padding:55px 38px 40px 38px;box-shadow:0 14px 42px #2e30922e, 0 2px 20px #2222;display:inline-block;min-width:330px;max-width:96vw;text-align:center;}
.logo-simbolo{max-width:135px;width:21vw;display:block;margin:0 auto 12px auto;}
.insta-top{margin:8px 0 0 0;display:inline-block;padding:10px 27px;border-radius:30px;background:linear-gradient(45deg,#833AB4,#E1306C,#FCAF45);text-decoration:none;color:#fff;font-size:16px;font-weight:500;}
.contatos-especialistas{margin-top:15px;display:flex;justify-content:center;gap:38px;}
.contato-b{background:rgba(211,211,211,0.18);border-radius:15px;padding:13px 21px 10px 15px;min-width:142px;display:flex;flex-direction:column;align-items:center;box-shadow:0 4px 24px #0B1C3D10;}
.contato-b h3{color:#0A2A3B;font-size:1.08em;font-weight:700;margin:2px 0 0 0;}
.contato-b p{font-size:13px;color:var(--dourado);font-weight:600;margin:4px 0;}
.contato-b a.btn{margin-top:5px;padding:8px 18px;background:#25D366;border-radius:16px;color:#fff;text-decoration:none;font-size:15px;font-weight:600;}
@media (max-width:830px){.faixa-logo-caixa{padding:19px 2vw 19px 2vw;}}
@media (max-width:600px){#banner-booking{min-height:300px;height:320px;}.faixa-logo-caixa{padding:11px 1vw 13px 1vw;}.contatos-especialistas{gap:6px;}}
/* Barra pré-consulta autossugestão */
#banner-busca{margin:0 auto;position:absolute;left:50%;bottom:13px;transform:translateX(-50%);background:#fff;box-shadow:0 2px 24px #4444;padding:16px 9px 13px 9px;border-radius:16px;display:flex;gap:13px;align-items:end;max-width:780px;width:97vw;z-index:4;flex-wrap:wrap;}
#banner-busca > div{flex:2;min-width:120px;position:relative;}
#banner-busca label{color:#888;font-size:12px;display:block;margin-bottom:3px;}
#banner-busca input[type="date"],#banner-busca input[type="number"],#banner-busca input[type="text"]{width:100%;border-radius:8px;padding:8px 9px;font-size:.97em;border:1px solid #ccc;}
#sugestoesDest{display:none;position:absolute;left:0;top:33px;width:100%;background:#fff;border:1px solid #dadada;border-radius:9px;z-index:10;box-shadow:0 4px 16px #0003;}
#sugestoesDest button{display:block;width:100%;text-align:left;background:none;border:none;padding:11px 12px;font-size:1em;color:#333;font-family:'Poppins',sans-serif;cursor:pointer;}
#sugestoesDest button:hover{background:var(--dourado);color:var(--azul);}
#banner-busca button{background:var(--dourado);color:var(--azul);font-weight:700;font-size:1.08em;padding:13px 36px;border-radius:10px;border:none;display:flex;align-items:center;gap:10px;box-shadow:0 2px 16px #0b1c3d18;cursor:pointer;white-space:nowrap;}
#banner-busca button:hover{background:goldenrod;color:#fff;}
@media (max-width:900px){
  #banner-busca{flex-direction:column;align-items:stretch;gap:10px;max-width:98vw;}
  #banner-busca > div,#banner-busca button{width:100%;}
}
.sucesso-msg {color:green;font-size:1em;margin-bottom:8px;}
/* ...restante do CSS igual entregas anteriores (form-premium, galeria, tabs...) ... */
</style>
</head>
<body>
<!-- MENU LATERAL -->
<button class="menu-hamburger" id="menuHamburger" aria-label="Abrir menu">☰</button>
<nav class="menu-nav" id="menuNav" aria-label="Menu principal">
  <button class="menu-close" id="menuClose" aria-label="Fechar menu">&times;</button>
  <ul>
    <li><a href="#banner-booking" class="nav-link">Início</a></li>
    <li><a href="#banner-busca" class="nav-link">Pré-consulta</a></li>
    <li><a href="#cad-empreendimento" class="nav-link">Cadastre seu Empreendimento</a></li>
    <li><a href="#galeria" class="nav-link">Galeria</a></li>
    <li><a href="#depoimentos" class="nav-link">Avaliações</a></li>
  </ul>
</nav>
<div class="modo-toggle">
  <button id="modeToggleBtn" aria-label="Trocar tema">🌓</button>
</div>

<!-- BANNER LOGO + INSTAGRAM + CONTATOS -->
<div id="banner-booking">
  <div id="banner-bg"></div>
  <div class="banner-inner-logo" style="height:100%;">
    <div class="faixa-logo-caixa">
      <!-- ATENÇÃO: insira aqui seu PNG símbolo limpo. Exemplo SVG ilustrativo abaixo: -->
      <svg class="logo-simbolo" viewBox="0 0 140 140" width="135" height="135">
         <circle cx="70" cy="70" r="66" stroke="#D4AF37" stroke-width="6" fill="none"/>
         <path d="M70 28 L105 120 L35 120 Z" fill="#0B1C3D"/>
      </svg>
      <!--<img src="LOGO-PNG-TRANSPARENTE.png" alt="HOSPEDAH símbolo" class="logo-simbolo">-->
      <a href="https://www.instagram.com/julianasilvaoliveira.joao?igsh=bzZmNGIxdjdqc285" class="insta-top" target="_blank">📸 Instagram Oficial</a>
      <div class="contatos-especialistas">
        <div class="contato-b">
          <h3>Flávio</h3>
          <p>Especialista em Hospedagens</p>
          <a class="btn" href="https://wa.me/5517982006382" target="_blank">WhatsApp</a>
        </div>
        <div class="contato-b">
          <h3>Juliana</h3>
          <p>Especialista em Hospedagens</p>
          <a class="btn" href="https://wa.me/5517992068296" target="_blank">WhatsApp</a>
        </div>
      </div>
    </div>
  </div>
  <!-- Barra de pré-consulta -->
  <form id="banner-busca" autocomplete="off">
    <div style="position:relative;">
      <label>Destino</label>
      <input type="text" name="destino" id="destinoInput" placeholder="Cidade ou Resort" autocomplete="off" required readonly>
      <div id="sugestoesDest"></div>
    </div>
    <div>
      <label>Check-in</label>
      <input type="date" name="checkin" required>
    </div>
    <div>
      <label>Check-out</label>
      <input type="date" name="checkout" required>
    </div>
    <div>
      <label>Hóspedes</label>
      <input type="number" min="1" max="15" name="hospedes" value="2" required>
    </div>
    <button type="submit" style="position:relative;"><span style="font-size:1.2em;">🔍</span> Pré-consulta</button>
    <div class="sucesso-msg" style="display:none;">Informações enviadas com sucesso!</div>
  </form>
</div>

<!-- ...restante do site (cadastro, galeria, depoimentos, forms, etc.) igual anteriores ... -->

<script>
//--------------- MENU LATERAL --------------//
const menuHamburger = document.getElementById('menuHamburger');
const menuNav = document.getElementById('menuNav');
const menuClose = document.getElementById('menuClose');
document.querySelectorAll('.nav-link').forEach(link =>{
  link.onclick = (e)=>{
    e.preventDefault();
    menuNav.classList.remove('open');document.body.style.overflow='';
    const href = link.getAttribute('href');
    if(href && href.startsWith('#')){ const sec = document.querySelector(href); if(sec) sec.scrollIntoView({behavior:'smooth'});}
    return false;
  }
});
menuHamburger.onclick = ()=>{ menuNav.classList.add('open');document.body.style.overflow='hidden'; };
menuClose.onclick = ()=>{ menuNav.classList.remove('open');document.body.style.overflow=''; };
//---- BANNER CARROSSEL (galeria) -----//
const imgs = [
  "https://i.imgur.com/AmFSwwd.jpeg","https://i.imgur.com/PMok8fe.jpeg","https://i.imgur.com/pyEKOtQ.jpeg",
  "https://i.imgur.com/AseZPzL.jpeg","https://i.imgur.com/S4tSUzG.jpeg",
  "https://i.imgur.com/iDMQ2XA.jpeg","https://i.imgur.com/SxlktwS.jpeg"
];
let idx=0;
function trocaBanner(){
  document.getElementById('banner-bg').style.backgroundImage = "url('"+imgs[idx]+"')";
  document.getElementById('banner-bg').style.transform="scale(1.13)";
  setTimeout(()=>{document.getElementById('banner-bg').style.transform="scale(1.01)";},700);
  idx = (idx+1)%imgs.length;
}
setInterval(trocaBanner, 3900);
window.onload=trocaBanner;
//---- SUGESTÃO DESTINO AUTOCOMPLETE -------//
const destinosArr = [
  "Hot Beach",
  "Olimpia Park",
  "São Pedro",
  "Wyndham Royal",
  "Solar das Águas",
  "Praia de Juquehy"
];
const destinoInput = document.getElementById('destinoInput');
const sugestoes = document.getElementById('sugestoesDest');
destinoInput.onclick = function(){
  sugestoes.innerHTML = destinosArr.map(o=>`<button type="button">${o}</button>`).join('');
  sugestoes.style.display = 'block';
};
sugestoes.onclick = function(ev){
  if(ev.target.tagName==='BUTTON'){
    destinoInput.value = ev.target.innerText;
    sugestoes.style.display='none';
  }
};
document.body.onclick = function(ev){
  if(ev.target!==destinoInput && ev.target.parentNode!==sugestoes) sugestoes.style.display='none';
};
//---- PRÉ-CONSULTA (form simulada: só mostra sucesso, personalize integração conforme desejar) -------//
document.getElementById("banner-busca").onsubmit = function(e){
  e.preventDefault();
  this.querySelector(".sucesso-msg").style.display="block";
  setTimeout(()=>{this.querySelector(".sucesso-msg").style.display="none";}, 1700);
  this.reset();
};
//---- SWITCH TEMA ----//
const mbtn = document.getElementById('modeToggleBtn');
mbtn.onclick = ()=> { let html = document.documentElement;
  let atual = html.getAttribute('data-theme')||'dark';
  html.setAttribute('data-theme', atual==='dark'?'light':'dark');
  mbtn.innerText = html.getAttribute('data-theme')==='dark' ? '🌓' : '🌞';
};
//---- RESTANTE DOS SCRIPTS (tabs, forms, galeria) cobre igual entrefas anteriores ...//
</script>
</body>
</html>
