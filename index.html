<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOSPEDAH | Sistema Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--dourado:#D4AF37;
--azul:#0B1C3D;
}

body{
margin:0;
font-family:Poppins;
background:#0B1C3D;
color:#fff;
}

/* MENU */
.menu{
display:flex;
justify-content:space-between;
background:#fff;
padding:15px;
}

.menu-toggle{display:none;font-size:26px;cursor:pointer;}

.nav{display:flex;gap:10px;}
.nav a{
background:#0B1C3D;
color:#D4AF37;
padding:8px 15px;
border-radius:20px;
text-decoration:none;
}

@media(max-width:768px){
.menu-toggle{display:block;}
.nav{
display:none;
flex-direction:column;
position:absolute;
top:60px;
background:#fff;
width:100%;
}
.nav.active{display:flex;}
}

/* HERO */
.hero{
height:90vh;
position:relative;
overflow:hidden;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
animation:slide 20s infinite, zoom 20s infinite;
}

.hero img:nth-child(1){animation-delay:0s;}
.hero img:nth-child(2){animation-delay:5s;}
.hero img:nth-child(3){animation-delay:10s;}

@keyframes slide{
0%{opacity:0;}
5%{opacity:1;}
25%{opacity:1;}
30%{opacity:0;}
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.content{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100%;
}

.logo{width:250px;margin-bottom:20px;}

/* BUSCA */
.busca{
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.busca input,.busca select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.busca button{
background:var(--dourado);
border:none;
padding:12px;
font-weight:bold;
cursor:pointer;
}

/* RESULTADOS */
.resultados{
padding:40px;
}

.card{
background:#1c2b52;
padding:15px;
border-radius:10px;
margin:10px 0;
}

/* ADMIN */
.admin{
padding:30px;
background:#142850;
}

input,select{
width:100%;
margin:5px 0;
padding:10px;
border-radius:6px;
border:none;
}

button{
cursor:pointer;
}

/* WHATS */
.whats{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:#fff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="menu">
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<div class="nav">
<a href="#">Início</a>
<a href="#busca">Buscar</a>
<a href="#admin">Admin</a>
</div>
</div>

<section class="hero">

<img src="https://i.imgur.com/AmFSwwd.jpeg">
<img src="https://i.imgur.com/PMok8fe.jpeg">
<img src="https://i.imgur.com/bOOUiLE.jpeg">

<div class="overlay"></div>

<div class="content">
<img src="https://i.imgur.com/ITjjQaf.jpeg" class="logo">

<div class="busca" id="busca">
<input type="date" id="entrada">
<input type="date" id="saida">
<input type="number" id="pessoas" placeholder="Pessoas">
<select id="dorm">
<option value="">Dormitórios</option>
<option value="1">1</option>
<option value="2">2</option>
</select>
<button onclick="buscar()">Buscar</button>
</div>

</div>
</section>

<div class="resultados" id="resultado"></div>

<div class="admin" id="admin">
<h2>Painel de Imóveis</h2>
<input id="nome" placeholder="Nome do imóvel">
<input id="capacidade" placeholder="Capacidade">
<select id="dormitorios">
<option value="">Dormitórios</option>
<option value="1">1</option>
<option value="2">2</option>
</select>
<input id="preco" placeholder="Preço">
<button onclick="add()">Cadastrar</button>

<div id="lista"></div>
</div>

<a class="whats" href="https://wa.me/5517982006382">💬</a>

<script>

function toggleMenu(){
document.querySelector('.nav').classList.toggle('active');
}

/* BANCO */
let banco = JSON.parse(localStorage.getItem('db')) || [];

function salvar(){
localStorage.setItem('db', JSON.stringify(banco));
render();
}

/* ADMIN */
function add(){
let nome = nomeEl.value;
let cap = capacidade.value;
let dorm = dormitorios.value;
let preco = precoEl.value;

if(!nome || !cap || !dorm || !preco) return alert("Preencha tudo");

banco.push({nome,cap,dorm,preco});
salvar();
}

function render(){
let div = document.getElementById('lista');
div.innerHTML="";
banco.forEach((i,index)=>{
div.innerHTML+=`
<div class="card">
${i.nome} - ${i.dorm} dorm - R$ ${i.preco}
<button onclick="del(${index})">Excluir</button>
</div>`;
});
}

function del(i){
banco.splice(i,1);
salvar();
}

/* BUSCA */
function buscar(){
let pessoas = document.getElementById('pessoas').value;
let dorm = document.getElementById('dorm').value;

let res = banco.filter(i =>
(!dorm || i.dorm==dorm) &&
i.cap >= pessoas
);

let div = document.getElementById('resultado');
div.innerHTML="";

res.forEach(i=>{
div.innerHTML+=`
<div class="card">
<h3>${i.nome}</h3>
<p>${i.dorm} dormitórios</p>
<p>Até ${i.cap} pessoas</p>
<p>R$ ${i.preco}</p>
<button onclick="whats('${i.nome}','${i.preco}')">Consultar</button>
</div>`;
});
}

/* WHATS */
function whats(nome,preco){
let msg = `Olá, quero consultar ${nome} valor R$ ${preco}`;
window.open(`https://wa.me/5517982006382?text=${msg}`);
}

render();

</script>

</body>
</html>
