<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HOSPEDAH | Plataforma de Hospedagens</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--dourado:#D4AF37;
--azul:#0B1C3D;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0B1C3D;
color:#fff;
}

/* MENU */
.menu{
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
position:relative;
}

.menu-toggle{
font-size:26px;
cursor:pointer;
display:none;
}

.nav{
display:flex;
gap:12px;
}

.nav a{
background:#0B1C3D;
color:#D4AF37;
padding:8px 14px;
border-radius:20px;
text-decoration:none;
}

@media(max-width:768px){
.menu-toggle{display:block;}
.nav{
display:none;
flex-direction:column;
position:absolute;
top:60px;
left:0;
width:100%;
background:#fff;
padding:20px;
}
.nav.active{display:flex;}
}

/* HERO */
.hero{
position:relative;
height:90vh;
overflow:hidden;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
animation:fade 18s infinite, zoom 18s infinite;
}

.hero img:nth-child(1){animation-delay:0s;}
.hero img:nth-child(2){animation-delay:6s;}
.hero img:nth-child(3){animation-delay:12s;}

@keyframes fade{
0%{opacity:0;}
5%{opacity:1;}
30%{opacity:1;}
35%{opacity:0;}
100%{opacity:0;}
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.hero-content{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.logo{
width:260px;
margin-bottom:20px;
}

/* BUSCA */
.busca{
background:#fff;
padding:18px;
border-radius:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.busca input,.busca select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.busca button{
background:var(--dourado);
border:none;
padding:12px 20px;
font-weight:bold;
cursor:pointer;
}

/* RESULTADOS */
.resultados{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#1c2b52;
padding:15px;
border-radius:12px;
}

.card button{
margin-top:10px;
background:var(--dourado);
border:none;
padding:10px;
cursor:pointer;
}

/* ADMIN */
.admin{
padding:30px;
background:#111;
}

.admin input,.admin select{
width:100%;
padding:10px;
margin:6px 0;
}

/* WHATS */
.whats{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
text-decoration:none;
color:#fff;
font-size:20px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<div class="nav">
<a href="#">Início</a>
<a href="#">Hospedagens</a>
<a href="#">Contato</a>
</div>
</div>

<!-- HERO -->
<section class="hero">

<img src="https://i.imgur.com/AmFSwwd.jpeg">
<img src="https://i.imgur.com/PMok8fe.jpeg">
<img src="https://i.imgur.com/bOOUiLE.jpeg">

<div class="overlay"></div>

<div class="hero-content">
<img src="https://i.imgur.com/ITjjQaf.jpeg" class="logo">

<div class="busca">
<input type="date" id="entrada">
<input type="date" id="saida">
<input type="number" id="pessoas" placeholder="Pessoas">

<select id="dorm">
<option value="">Dormitórios</option>
<option value="1">1</option>
<option value="2">2</option>
</select>

<button onclick="buscar()">Buscar</button>
</div>

</div>
</section>

<!-- RESULTADOS -->
<div class="resultados" id="resultados"></div>

<!-- ADMIN -->
<div class="admin">
<h2>Painel de Imóveis</h2>

<input id="nome" placeholder="Nome do imóvel">
<input id="capacidade" type="number" placeholder="Capacidade">
<select id="dormitorios">
<option value="">Dormitórios</option>
<option value="1">1</option>
<option value="2">2</option>
</select>
<input id="preco" type="number" placeholder="Preço">

<button onclick="add()">Cadastrar</button>
</div>

<a class="whats" href="https://wa.me/5517982006382">💬</a>

<script>

let banco = JSON.parse(localStorage.getItem('imoveis')) || [];

function salvar(){
localStorage.setItem('imoveis',JSON.stringify(banco));
}

function add(){
let nome = document.getElementById('nome').value;
let capacidade = document.getElementById('capacidade').value;
let dorm = document.getElementById('dormitorios').value;
let preco = document.getElementById('preco').value;

banco.push({nome,capacidade,dorm,preco});
salvar();
alert("Imóvel cadastrado!");
}

function buscar(){
let pessoas = document.getElementById('pessoas').value;
let dorm = document.getElementById('dorm').value;

let res = banco.filter(i =>
(i.capacidade >= pessoas) &&
(dorm=="" || i.dorm==dorm)
);

let div = document.getElementById('resultados');
div.innerHTML = "";

res.forEach(i=>{
div.innerHTML += `
<div class="card">
<h3>${i.nome}</h3>
<p>${i.dorm} dormitórios</p>
<p>Até ${i.capacidade} pessoas</p>
<p>R$ ${i.preco}</p>
<button onclick="whats('${i.nome}',${i.preco})">Reservar</button>
</div>
`;
});
}

function whats(nome,preco){
let msg = `Olá! Quero reservar ${nome} - R$ ${preco}`;
window.open(`https://wa.me/5517982006382?text=${msg}`);
}

function toggleMenu(){
document.querySelector('.nav').classList.toggle('active');
}

</script>

</body>
</html>
