<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOSPEDAH | Pré-Consulta e Cadastro de Empreendimento</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
  :root { --dourado: #D4AF37; --azul: #0B1C3D; --menu-bg: #fff;}
  html[data-theme="dark"] body { background: linear-gradient(135deg,#0B1C3D,#142850); color: #fff; }
  html[data-theme="light"] body { background: #fff; color: #191919; }
  body{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
  .menu-hamburger{position:fixed;top:18px;left:17px;z-index:1301;background:var(--azul);color:var(--dourado);border:none;border-radius:8px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:2em;cursor:pointer;}
  .menu-hamburger:active{background:var(--dourado);color:var(--azul);}
  .menu-nav{position:fixed;top:0;left:0;height:100vh;width:0;transition:width .23s cubic-bezier(.4,1,.4,1);overflow-x:hidden;background:var(--menu-bg);z-index:1300;}
  .menu-nav.open{width:235px;box-shadow:8px 0 28px #0002;}
  .menu-close{position:absolute;top:17px;right:13px;background:none;border:none;font-size:2em;color:var(--azul);cursor:pointer;}
  .menu-nav ul{list-style:none;margin:0;padding:66px 0 0 0;display:flex;flex-direction:column;gap:12px;}
  .menu-nav a{color:var(--azul);background:none;text-decoration:none;font-weight:600;padding:12px 25px;border-radius:14px;font-size:1.09em;transition:.16s;}
  .menu-nav a:hover,.menu-nav a:focus{background:#f7f3da;color:var(--dourado);}
  @media(min-width:900px){
    .menu-hamburger{display:none;}
    .menu-nav{position:static;width:100vw!important;max-width:none;height:auto;box-shadow:none;}
    .menu-nav.open{box-shadow:none;}
    .menu-nav ul{flex-direction:row;padding:0;}
    .menu-nav a{font-size:1em;padding:13px 18px;}
    .menu-close{display:none;}
  }
  .modo-toggle{position:fixed;right:20px;top:17px;z-index:1401;}
  .modo-toggle button{background:#132042;color:var(--dourado);border-radius:28px;padding:7px 17px;font-weight:600;border:none;cursor:pointer;font-size:16px;}
  /* Banner/faixa logo */
  #banner-topo{background:linear-gradient(135deg,#fff 96%,#f2efe9 100%);box-shadow:0 9px 42px #0b1c3d20;position:relative;padding:0 0 0 0;}
  .faixa-logo-caixa{
    margin-top:0px;
    margin-bottom:18px;
    background:white;
    border-radius:38px;
    padding:85px 38px 64px 38px;
    box-shadow:0 24px 52px #2e309225, 0 2px 20px #2222;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:340px;max-width:96vw;text-align:center;
    position:relative;
    top:72px;
    z-index:4;
  }
  .logo-simbolo{max-width:153px;width:27vw;display:block;margin:0 auto 13px auto;}
  .insta-top{margin:12px 0;display:inline-block;padding:12px 29px;border-radius:32px;background:linear-gradient(45deg,#833AB4,#E1306C,#FCAF45);text-decoration:none;color:#fff;font-size:18px;font-weight:500;}
  .contatos-especialistas{
    margin-top:33px; /* FAIXA AUMENTADA: contatos descem mais */
    display:flex;justify-content:center;gap:52px;}
  .contato-b{background:rgba(211,211,211,0.16);border-radius:15px;padding:18px 32px 16px 18px;min-width:162px;display:flex;flex-direction:column;align-items:center;box-shadow:0 5px 30px #0B1C3D0B;}
  .contato-b h3{color:#0A2A3B;font-size:1.13em;font-weight:700;margin:2px 0 0 0;}
  .contato-b p{font-size:15px;color:var(--dourado);font-weight:600;margin:7px 0;}
  .contato-b a.btn{margin-top:6px;padding:12px 27px;background:#25D366;border-radius:18px;color:#fff;text-decoration:none;font-size:18px;font-weight:700;}
  @media (max-width:1000px){
    .faixa-logo-caixa{padding:60px 10vw 50px 10vw;}
    .contatos-especialistas{gap:12px;}
  }
  @media (max-width:600px){
    #banner-topo{padding:0;}
    .faixa-logo-caixa{padding:33px 1vw 33px 1vw;top:29px;}
    .contatos-especialistas{gap:3px;}
    .logo-simbolo{max-width:85px;}
  }
  /* Carrossel */
  #banner-carrossel-bg{position:absolute;left:0;top:0;width:100vw;z-index:1;height:450px;min-height:320px;overflow:hidden;}
  .banner-carrossel-img{width:100vw;height:100%;object-fit:cover;object-position:center;z-index:1;position:absolute;left:0;top:0;opacity:0;transition:opacity 1.85s,transform 2.5s;}
  .banner-carrossel-img.active{opacity:1;transform:scale(1.11);}
  /**/
  #espaco-carrossel{width:100%;height:450px;}
  @media (max-width:700px){#banner-carrossel-bg,.banner-carrossel-img,#espaco-carrossel{height:260px;}}
  /* Barra pré-consulta */
  #barra-preconsulta{margin:80px auto 30px auto;background:#fff;box-shadow:0 2px 24px #4444;padding:28px 13px 17px 13px;border-radius:20px;display:flex;gap:18px;align-items:end;max-width:1030px;width:99vw;z-index:5;flex-wrap:wrap;position:relative;}
  #barra-preconsulta > div{flex:2;min-width:120px;position:relative;}
  #barra-preconsulta label{color:#888;font-size:14px;display:block;margin-bottom:3px;}
  #barra-preconsulta input[type="date"],#barra-preconsulta input[type="number"],#barra-preconsulta input[type="text"],#barra-preconsulta input[type="tel"]{width:100%;border-radius:10px;padding:12px 11px;font-size:1.06em;border:1px solid #ccc;}
  #sugestoesDest{display:none;position:absolute;left:0;top:44px;width:100%;background:#fff;border:1px solid #dadada;border-radius:12px;z-index:10;box-shadow:0 4px 16px #0003;}
  #sugestoesDest button{display:block;width:100%;text-align:left;background:none;border:none;padding:13px 13px;font-size:1.1em;color:#333;font-family:'Poppins',sans-serif;cursor:pointer;}
  #sugestoesDest button:hover{background:var(--dourado);color:var(--azul);}
  #barra-preconsulta button{background:var(--dourado);color:var(--azul);font-weight:700;font-size:1.13em;padding:15px 36px;border-radius:13px;border:none;display:flex;align-items:center;gap:14px;box-shadow:0 2px 16px #0b1c3d18;cursor:pointer;white-space:nowrap;}
  #barra-preconsulta button:hover{background:goldenrod;color:#fff;}
  @media (max-width:1000px){
    #barra-preconsulta{flex-direction:column;align-items:stretch;gap:13px;}
    #barra-preconsulta > div,#barra-preconsulta button{width:100%;}
  }
  .sucesso-msg{color:green;font-size:1.07em;margin-top:7px;}
  /* O RESTO (forms, tabs, galeria, depoimentos) igual entregas anteriores */
  </style>
</head>
<body>
<!-- MENU LATERAL -->
<button class="menu-hamburger" id="menuHamburger" aria-label="Abrir menu">☰</button>
<nav class="menu-nav" id="menuNav" aria-label="Menu principal">
  <button class="menu-close" id="menuClose" aria-label="Fechar menu">&times;</button>
  <ul>
    <li><a href="#banner-topo" class="nav-link">Início</a></li>
    <li><a href="#barra-preconsulta" class="nav-link">Pré-consulta</a></li>
    <li><a href="#cad-empreendimento" class="nav-link">Cadastre seu Empreendimento</a></li>
    <li><a href="#galeria" class="nav-link">Galeria</a></li>
    <li><a href="#depoimentos" class="nav-link">Avaliações</a></li>
  </ul>
</nav>
<div class="modo-toggle">
  <button id="modeToggleBtn" aria-label="Trocar tema">🌓</button>
</div>

<!-- CARROSSEL DE FUNDO TOPO -->
<div id="espaco-carrossel"></div>
<div id="banner-carrossel-bg"></div>

<!-- FAIXA DO LOGO -->
<div id="banner-topo" style="position:relative;z-index:12;">
  <div class="faixa-logo-caixa">
    <!-- SVG de símbolo puro como exemplo, troque pelo PNG se preferir -->
    <svg class="logo-simbolo" viewBox="0 0 140 140" width="130" height="130">
      <circle cx="70" cy="70" r="62" stroke="#D4AF37" stroke-width="6" fill="none"/>
      <path d="M70 24 L105 120 L35 120 Z" fill="#0B1C3D"/>
    </svg>
    <!-- <img src="logo-simbolo.png" class="logo-simbolo" alt="Logo HOSPEDAH"> -->
    <a href="https://www.instagram.com/julianasilvaoliveira.joao?igsh=bzZmNGIxdjdqc285" class="insta-top" target="_blank">📸 Instagram Oficial</a>
    <div class="contatos-especialistas">
      <div class="contato-b">
        <h3>Flávio</h3>
        <p>Especialista em Hospedagens</p>
        <a class="btn" href="https://wa.me/5517982006382" target="_blank">WhatsApp</a>
      </div>
      <div class="contato-b">
        <h3>Juliana</h3>
        <p>Especialista em Hospedagens</p>
        <a class="btn" href="https://wa.me/5517992068296" target="_blank">WhatsApp</a>
      </div>
    </div>
  </div>
</div>

<!-- BARRA DE PRÉ CONSULTA (ABAIXO DA FAIXA, MAIS PROFISSIONAL) -->
<form id="barra-preconsulta" autocomplete="off">
  <div>
    <label>Destino</label>
    <input type="text" name="destino" id="destinoInput" placeholder="Escolha seu destino" readonly required>
    <div id="sugestoesDest"></div>
  </div>
  <div>
    <label>Check-in</label>
    <input type="date" name="checkin" required>
  </div>
  <div>
    <label>Check-out</label>
    <input type="date" name="checkout" required>
  </div>
  <div>
    <label>Hóspedes</label>
    <input type="number" min="1" max="15" name="hospedes" value="2" required>
  </div>
  <div>
    <label>Nome</label>
    <input type="text" name="nome" required maxlength="100">
  </div>
  <div>
    <label>Telefone para contato</label>
    <input type="tel" name="telefone" required maxlength="25" placeholder="Ex: (99) 91234-5678">
  </div>
  <button type="submit"><span style="font-size:1.2em;">🔍</span> Pré-consulta</button>
  <div class="sucesso-msg" style="display:none;">Informações enviadas com sucesso!</div>
</form>

<!-- ... RESTANTE DO SITE (cadastro, galeria, depoimentos, etc. iguais exemplos anteriores!) ... -->

<script>
// Menu hamburger
const menuHamburger = document.getElementById('menuHamburger');
const menuNav = document.getElementById('menuNav');
const menuClose = document.getElementById('menuClose');
document.querySelectorAll('.nav-link').forEach(link =>{
  link.onclick = (e)=>{
    e.preventDefault();
    menuNav.classList.remove('open');document.body.style.overflow='';
    const href = link.getAttribute('href');
    if(href && href.startsWith('#')){
      const sec = document.querySelector(href);
      if(sec) sec.scrollIntoView({behavior:'smooth'});
    }
    return false;
  }
});
menuHamburger.onclick = ()=>{ menuNav.classList.add('open');document.body.style.overflow='hidden'; };
menuClose.onclick = ()=>{ menuNav.classList.remove('open');document.body.style.overflow=''; };

// Carrossel premium
const imgs = [
  "https://i.imgur.com/AmFSwwd.jpeg","https://i.imgur.com/PMok8fe.jpeg","https://i.imgur.com/pyEKOtQ.jpeg",
  "https://i.imgur.com/AseZPzL.jpeg","https://i.imgur.com/S4tSUzG.jpeg",
  "https://i.imgur.com/iDMQ2XA.jpeg","https://i.imgur.com/SxlktwS.jpeg"
];
const divCarr = document.getElementById('banner-carrossel-bg');
imgs.forEach((src,i)=>{
  let img=document.createElement('img');
  img.src=src;
  img.className="banner-carrossel-img"+(i==0?" active":"");
  divCarr.appendChild(img);
});
let idx=0, carrEls=document.querySelectorAll('.banner-carrossel-img');
function trocaBanner(){
  carrEls.forEach((img,i)=>img.classList.toggle('active',i===idx));
  idx = (idx+1)%imgs.length;
}
setInterval(trocaBanner,4000);
window.onload=trocaBanner;

// DESTINO autocomplete profissional
const destinosArr = [
  "Hot Beach",
  "Olimpia Park",
  "São Pedro",
  "Wyndham Royal",
  "Solar das Águas",
  "Praia de Juquehy"
];
const destinoInput = document.getElementById('destinoInput');
const sugestoes = document.getElementById('sugestoesDest');
destinoInput.onclick = function(){
  sugestoes.innerHTML = destinosArr.map(o=>`<button type="button">${o}</button>`).join('');
  sugestoes.style.display = 'block';
};
sugestoes.onclick = function(ev){
  if(ev.target.tagName==='BUTTON'){
    destinoInput.value = ev.target.innerText;
    sugestoes.style.display='none';
  }
};
document.body.onclick = function(ev){
  if(ev.target!==destinoInput && ev.target.parentNode!==sugestoes) sugestoes.style.display='none';
};

// PRÉ-CONSULTA automação
document.getElementById("barra-preconsulta").onsubmit = function(e){
  e.preventDefault();
  this.querySelector(".sucesso-msg").style.display="block";
  setTimeout(()=>{this.querySelector(".sucesso-msg").style.display="none";}, 1500);this.reset();
};
// Switch tema
const mbtn = document.getElementById('modeToggleBtn');
mbtn.onclick = ()=> { let html = document.documentElement;
  let atual = html.getAttribute('data-theme')||'dark';
  html.setAttribute('data-theme', atual==='dark'?'light':'dark');
  mbtn.innerText = html.getAttribute('data-theme')==='dark' ? '🌓' : '🌞';
};
</script>
</body>
</html>
