<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOSPEDAH Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI';background:#f5f5f5;color:#333;}

/* TOPO */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#000;
color:#fff;
flex-wrap:wrap;
}

.contacts{display:flex;gap:20px;flex-wrap:wrap;font-size:13px;}
.contact-box strong{font-size:14px;}
.contact-box{line-height:1.5;}

.topbar a{color:#d4af37;text-decoration:none;font-weight:bold;}

/* HERO */
.hero{
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover no-repeat;
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:#fff;
position:relative;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{font-size:3em;color:#d4af37;}
.hero p{margin:15px 0;font-size:1.2em;}

.btn{
padding:12px 25px;
border-radius:30px;
border:none;
cursor:pointer;
margin:5px;
font-weight:bold;
transition:.3s;
}

.btn-gold{background:#d4af37;}
.btn-whatsapp{background:#25d366;color:#fff;}

.btn:hover{transform:translateY(-3px);}

/* CARDS */
.container{padding:40px;}

.resort-card{
background:#fff;
border-radius:15px;
overflow:hidden;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.resort-image{width:100%;height:250px;object-fit:cover;}
.resort-content{padding:25px;}

/* GALERIA */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2000;
}

.modal img{
max-width:90%;
max-height:70%;
border-radius:10px;
}

.gallery-controls{
margin-top:15px;
}

.gallery-controls button{
padding:10px;
margin:5px;
border:none;
cursor:pointer;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:30px;
color:#fff;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TOPO -->
<div class="topbar">
<div class="contacts">

<div class="contact-box">
<strong>Juliana João</strong><br>
Especialista em Hospedagens<br>
📱 (17) 99920-68296
</div>

<div class="contact-box">
<strong>Flávio João</strong><br>
Especialista em Hospedagens<br>
📱 (17) 98200-6382
</div>

</div>

<a href="https://www.instagram.com" target="_blank">📸 Instagram</a>
</div>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>HOSPEDAH Premium</h1>
<p>Experiências exclusivas em resorts e praias</p>

<a href="https://wa.me/5517982006382?text=Quero%20reservar%20uma%20hospedagem" class="btn btn-whatsapp">
Falar no WhatsApp
</a>
</div>
</section>

<!-- CONTEÚDO -->
<div class="container">

<div class="resort-card">
<img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb210f1" class="resort-image">

<div class="resort-content">
<h3>Resort Premium</h3>
<p>Experiência completa com luxo e conforto.</p>

<button class="btn btn-gold" onclick="openGallery()">Ver Fotos</button>

<a href="https://wa.me/5517982006382?text=Quero%20informações%20desse%20resort" class="btn btn-whatsapp">
WhatsApp
</a>

</div>
</div>

</div>

<!-- GALERIA PROFISSIONAL -->
<div class="modal" id="gallery">
<span class="close" onclick="closeGallery()">×</span>

<img id="gallery-img" src="">

<div class="gallery-controls">
<button onclick="prevImg()">⬅️</button>
<button onclick="nextImg()">➡️</button>
</div>

</div>

<script>
let images = [
"https://images.unsplash.com/photo-1501117716987-c8e1ecb210f1",
"https://images.unsplash.com/photo-1566073771259-6a8506099945",
"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b"
];

let index = 0;

function openGallery(){
document.getElementById('gallery').style.display='flex';
document.getElementById('gallery-img').src = images[index];
}

function closeGallery(){
document.getElementById('gallery').style.display='none';
}

function nextImg(){
index = (index + 1) % images.length;
document.getElementById('gallery-img').src = images[index];
}

function prevImg(){
index = (index - 1 + images.length) % images.length;
document.getElementById('gallery-img').src = images[index];
}
</script>

</body>
</html>
