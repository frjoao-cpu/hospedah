<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOSPEDAH | PAINEL ULTRA PREMIUM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:Arial, sans-serif;background:#0B1C3D;color:#fff}
.section{padding:40px;text-align:center}
.box{max-width:600px;margin:auto;background:#111;padding:25px;border-radius:15px}
input,select,textarea{width:100%;padding:12px;margin:6px 0 10px 0;border:none;border-radius:8px;background:#1f1f1f;color:#fff}
button{padding:12px 20px;border:none;border-radius:10px;background:gold;font-weight:bold;cursor:pointer;margin:5px 4px 5px 0;}
button[style*=da3333]{background:#da3333;color:#fff}

.card{background:#111;padding:18px 15px 18px 118px;margin:10px;border-radius:10px;text-align:left;min-height:120px;position:relative;}
.badge{padding:4px 8px;border-radius:6px;font-size:12px}
.novo{background:gray}
.andamento{background:orange}
.fechado{background:green}
.card-actions{margin-top:12px;}
.flagzap{float:right;color:#25d366;font-weight:bold;margin-top:3px;}
.card .thumbs-mult img{width:80px;height:80px;object-fit:cover;border-radius:12px;border:2px solid #292929;margin:2px 3px 4px 0;cursor:pointer;transition:.12s;}
.card .thumbs-mult{position:absolute;left:15px;top:18px;}
.card .thumbs-mult{display:flex;flex-wrap:wrap;max-width:92px;}
.card .thumbs-mult img:hover{border-color:gold;}
textarea{min-height:48px;}
.filtro-bloco{max-width:600px;margin:8px auto;padding:0 0 12px 0;}
.input-img-label{display:inline-block;margin-top:7px;}
.input-img-label input{display:none;}
.input-img-label span{
  display:inline-block;padding:8px 15px;background:#444;color:#fff;border-radius:8px;cursor:pointer;font-size:13px;
  border:1.5px solid #555;transition:.15s;
}
.input-img-label span:hover{background:gold;color:#222;}
#preview-mult{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
#preview-mult img{width:60px;height:60px;border-radius:9px;object-fit:cover;border:2px solid #222;}
@media(max-width:650px){
  .section{padding:18px;}
  .box{padding:13px;}
  .card{padding:19vw 7vw 18vw 38vw;min-height:160px;}
  .card .thumbs-mult img{width:22vw;height:22vw;}
  .card .thumbs-mult{top:15px;}
}
.lightbox-modal{
  position:fixed;z-index:10000;inset:0;background:rgba(0,0,0,0.87);
  display:flex;align-items:center;justify-content:center;animation:fadeIn .14s;
}
.lightbox-imgset{
  display:flex;gap:14px;align-items:center;flex-direction:column;
  max-width:97vw;max-height:97vh;text-align:center;
}
.lightbox-imgset img{
  max-width:96vw;max-height:77vh;border-radius:14px;box-shadow:0 8px 28px 7px #000c;
}
.lightbox-thumbbar{display:flex;gap:8px;margin-top:10px;justify-content:center;}
.lightbox-thumbbar img{width:52px;height:52px;object-fit:cover;border-radius:7px;border:2.5px solid #fff;opacity:.7;cursor:pointer;}
.lightbox-thumbbar img.active{border-color:gold;box-shadow:0 0 7px 2px #d4af377a;opacity:1;}
.lightbox-close{
  position:absolute;top:20px;right:28px;
  background:#da3333;color:#fff;font-size:2.2em;border-radius:50%;border:none;width:44px;height:44px;cursor:pointer;font-weight:bold;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<div class="section">
<h1>📊 Painel HOSPEDAH ULTRA PREMIUM</h1>
<p>Gestão de clientes com <b>UPLOAD MÚLTIPLO de fotos</b>, PDF, CSV, busca e lightbox</p>
</div>

<div class="section">
<div class="box" aria-label="Cadastro Cliente">
<h2>Novo Cliente</h2>
<input id="nome" placeholder="Nome" autocomplete="off">
<input id="destino" placeholder="Destino" autocomplete="off">
<input id="checkin" type="date" placeholder="Check-in">
<input id="checkout" type="date" placeholder="Check-out">
<input id="pessoas" placeholder="Pessoas">
<input id="whats" placeholder="WhatsApp (somente números)">
<textarea id="notas" placeholder="Notas/campos adicionais"></textarea>
<label class="input-img-label">
  <input multiple type="file" id="fotos" accept="image/*" onchange="previewImgs(this)">
  <span>📸 Fotos do Cliente/Imóvel (podem ser várias)</span>
</label>
<div id="preview-mult"></div>
<button onclick="salvarCliente()">Salvar + Gerar Proposta</button>
</div>
</div>

<div class="section">
<div class="filtro-bloco">
  <input id="busca" placeholder="🔍 Filtrar por nome/destino" oninput="render()">
  <button onclick="baixarCSV()">Exportar CSV</button>
</div>
<h2>Clientes</h2>
<div id="lista"></div>
</div>

<script>
const { jsPDF } = window.jspdf;
let fotosSelecionadas = []; // array temporário base64

function previewImgs(input){
  fotosSelecionadas = [];
  document.getElementById('preview-mult').innerHTML = "";
  if(input.files){
    Array.from(input.files).forEach(file=>{
      let reader = new FileReader();
      reader.onload = function(e){
        fotosSelecionadas.push(e.target.result);
        let imgEl = document.createElement("img");
        imgEl.src = e.target.result;
        document.getElementById('preview-mult').appendChild(imgEl);
      }
      reader.readAsDataURL(file);
    });
  }
}

function salvarCliente(){
  let cliente={
    nome:nomeEl.value,
    destino:destinoEl.value,
    checkin:checkinEl.value,
    checkout:checkoutEl.value,
    pessoas:pessoasEl.value,
    whats:whatsEl.value,
    notas:notasEl.value,
    status:'novo',
    zapEnviado:false,
    fotos:[...fotosSelecionadas]
  }

  if(!cliente.nome||!cliente.destino||!cliente.whats){
    alert('Preencha os campos obrigatórios!');return
  }

  let lista=JSON.parse(localStorage.getItem('clientes')||'[]')
  lista.push(cliente)
  localStorage.setItem('clientes',JSON.stringify(lista))

  gerarPDF(cliente)
  enviarWhats(lista.length-1)
  render()
  // Limpa campos
  nomeEl.value=destinoEl.value=checkinEl.value=checkoutEl.value=pessoasEl.value=whatsEl.value=notasEl.value=""
  fotosSelecionadas=[]; document.getElementById('fotos').value=""; document.getElementById('preview-mult').innerHTML="";
}

function gerarPDF(c){
  let doc=new jsPDF()
  doc.setFontSize(16)
  doc.text("PROPOSTA HOSPEDAH",20,20)
  doc.setFontSize(12)
  doc.text(`Cliente: ${c.nome}`,20,40)
  doc.text(`Destino: ${c.destino}`,20,50)
  doc.text(`Check-in: ${c.checkin||"-"}`,20,60)
  doc.text(`Check-out: ${c.checkout||"-"}`,20,70)
  doc.text(`Pessoas: ${c.pessoas||"-"}`,20,80)
  doc.text(`Notas: ${c.notas||"-"}`,20,90)
  doc.save(`proposta_${c.nome||'cliente'}.pdf`)
}

function enviarWhats(idx){
  let lista=JSON.parse(localStorage.getItem('clientes')||'[]');
  let c=lista[idx]
  let msg=`✨ *PROPOSTA HOSPEDAH* ✨\n👤 ${c.nome}\n📍 ${c.destino}`
  if(c.checkin||c.checkout) msg+=`\n📅 ${c.checkin||'-'} até ${c.checkout||'-'}`
  if(c.pessoas) msg+=`\n👥 Pessoas: ${c.pessoas}`
  if(c.notas) msg+=`\n📝 ${c.notas}`
  c.zapEnviado=true;
  localStorage.setItem('clientes',JSON.stringify(lista))
  window.open(`https://wa.me/55${c.whats}?text=${encodeURIComponent(msg)}`,"_blank")
  render()
}

function alterarStatus(index,novo){
  let lista=JSON.parse(localStorage.getItem('clientes'))
  lista[index].status=novo
  localStorage.setItem('clientes',JSON.stringify(lista))
  render()
}

function remover(index){
  if(!confirm("Remover cliente?")) return;
  let lista=JSON.parse(localStorage.getItem('clientes'))
  lista.splice(index,1)
  localStorage.setItem('clientes',JSON.stringify(lista))
  render()
}

function atualizarNotas(idx,el){
  let lista=JSON.parse(localStorage.getItem('clientes'))
  lista[idx].notas=el.value
  localStorage.setItem('clientes',JSON.stringify(lista))
}

function cardPDF(i){
  let lista=JSON.parse(localStorage.getItem('clientes'))
  gerarPDF(lista[i])
}

function baixarCSV(){
  let lista=JSON.parse(localStorage.getItem('clientes')||'[]')
  if(lista.length==0) return alert("Nada para exportar!");
  let csv = "Nome,Destino,Check-in,Check-out,Pessoas,WhatsApp,Status,Notas,Imagens\n"+
    lista.map(c=>
      `"${c.nome}","${c.destino}","${c.checkin||''}","${c.checkout||''}","${c.pessoas||''}","${c.whats}","${c.status}","${(c.notas||"").replace(/"/g,"'")}","${(c.fotos||[]).length}"`
    ).join("\n")
  let blob = new Blob([csv],{type:"text/csv"})
  let url=URL.createObjectURL(blob)
  let a=document.createElement('a')
  a.href=url;a.download="clientes_hospedah.csv";
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},500);
}

// ----- LIGHTBOX ----
function openLightbox(imgs,idx){
  if(!imgs||imgs.length==0) return;
  let lb = document.createElement("div");
  lb.className = "lightbox-modal";
  let imgset = document.createElement('div');
  imgset.className = "lightbox-imgset";
  let img = document.createElement('img');
  img.src = imgs[idx];
  imgset.appendChild(img);
  // thumbbar
  let tb = document.createElement('div');
  tb.className = 'lightbox-thumbbar';
  imgs.forEach((src,i)=>{
    let thumb = document.createElement('img');
    thumb.src = src;
    if(i==idx) thumb.classList.add('active');
    thumb.onclick = ()=>{img.src=src;tb.querySelectorAll('img').forEach(t=>t.classList.remove('active'));thumb.classList.add('active');};
    tb.appendChild(thumb);
  });
  imgset.appendChild(tb);
  let closeBtn = document.createElement('button');
  closeBtn.className = 'lightbox-close'; closeBtn.innerHTML='&times;';
  closeBtn.onclick=()=>lb.remove();
  lb.appendChild(imgset);lb.appendChild(closeBtn);
  document.body.appendChild(lb);
  lb.tabIndex=0; closeBtn.focus();

  lb.addEventListener('keydown',function(e){
    if (e.key==='Escape') lb.remove();
    else if (e.key==='ArrowLeft'){
      idx = (idx+imgs.length-1)%imgs.length;
      img.src = imgs[idx];
      tb.querySelectorAll('img').forEach((t,i)=>t.classList.toggle('active',i===idx))
    }
    else if(e.key==='ArrowRight'){
      idx = (idx+1)%imgs.length;
      img.src = imgs[idx];
      tb.querySelectorAll('img').forEach((t,i)=>t.classList.toggle('active',i===idx))
    }
  });
  lb.onclick = e => {if(e.target===lb) lb.remove();}
}

// ------------- RENDER CARDS -------------
function render(){
  let lista=JSON.parse(localStorage.getItem('clientes')||'[]')
  let div=document.getElementById('lista')
  let termo=(document.getElementById('busca')||{value:""}).value.trim().toLowerCase()
  div.innerHTML=''

  let filtrado = termo ? lista.filter(c=>
    c.nome.toLowerCase().includes(termo) ||
    c.destino.toLowerCase().includes(termo)
  ) : lista

  if(filtrado.length==0){
    div.innerHTML='<em>Nenhum cliente encontrado.</em>'
    return
  }

  filtrado.forEach((c,ii)=>{
    let idx = lista.indexOf(c)
    let cor=c.status==='novo'?'novo':c.status==='andamento'?'andamento':'fechado'
    let thumbs = (c.fotos||[]).map((src,i)=> `<img src="${src}" title="Abrir" onclick="openLightbox(JSON.parse(localStorage.getItem('clientes'))[${idx}].fotos,${i})">`).join('');
    div.innerHTML+=`
    <div class="card">
      <div class="thumbs-mult">${thumbs||""}</div>
      <b>${c.nome}</b> - ${c.destino}
      ${(c.zapEnviado?'<span class="flagzap" title="WhatsApp enviado">✔️ Whats</span>':'')}
      <br>
      <span class="badge ${cor}">${c.status}</span>
      <br>Check-in: ${c.checkin||'-'} | Check-out: ${c.checkout||'-'}<br>Pessoas: ${c.pessoas||'-'}<br>Whatsapp: ${c.whats}
      <br>
      <textarea placeholder="Notas/campo livre" onchange="atualizarNotas(${idx},this)">${c.notas||""}</textarea>
      <select onchange="alterarStatus(${idx},this.value)">
        <option value="novo" ${c.status==='novo'?'selected':''}>Novo</option>
        <option value="andamento" ${c.status==='andamento'?'selected':''}>Em negociação</option>
        <option value="fechado" ${c.status==='fechado'?'selected':''}>Fechado</option>
      </select>
      <div class="card-actions">
        <button onclick="enviarWhats(${idx})">WhatsApp</button>
        <button onclick="cardPDF(${idx})">PDF</button>
        <button onclick="remover(${idx})" style="background:#da3333;color:#fff">Excluir</button>
      </div>
    </div>`
  })
}

// ----- ELEMENTOS
const nomeEl=document.getElementById('nome')
const destinoEl=document.getElementById('destino')
const checkinEl=document.getElementById('checkin')
const checkoutEl=document.getElementById('checkout')
const pessoasEl=document.getElementById('pessoas')
const whatsEl=document.getElementById('whats')
const notasEl=document.getElementById('notas')

render()
</script>
</body>
</html>
