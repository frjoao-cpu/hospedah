name: Lighthouse Semanal

on:
  schedule:
    - cron: '0 8 * * 1'  # toda segunda-feira às 08:00 UTC
  workflow_dispatch:

jobs:
  lighthouse-audit:
    name: Auditoria de Performance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-lhci
          restore-keys: ${{ runner.os }}-npm-

      - name: Instalar Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Executar Lighthouse CI
        id: lhci
        run: lhci autorun
        continue-on-error: true

      - name: Abrir issue se performance degradou
        if: steps.lhci.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `⚡ Lighthouse: degradação detectada — ${new Date().toISOString().split('T')[0]}`
            const body = [
              '## Auditoria Lighthouse Semanal',
              '',
              'Detectada degradação em uma ou mais métricas de **performance**, **acessibilidade** ou **SEO**.',
              '',
              `**Executado em:** ${new Date().toISOString()}`,
              `**Workflow:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '### Próximos passos',
              '- [ ] Revisar o relatório Lighthouse no workflow acima',
              '- [ ] Identificar a regressão (imagens sem dimensões, JS bloqueante, LCP alto, etc.)',
              '- [ ] Corrigir e fazer novo deploy para validar',
            ].join('\n')

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'performance',
            })

            const alreadyOpen = issues.some(i => i.title.startsWith('⚡ Lighthouse'))
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                body,
                labels: ['performance', 'bug'],
              })
            }
