name: CI — Validação, Qualidade e Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # 1. Valida HTML com htmlhint
  # ──────────────────────────────────────────────
  validate-html:
    name: Validação HTML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-htmlhint
          restore-keys: ${{ runner.os }}-npm-

      - name: Instalar htmlhint
        run: npm install -g htmlhint

      - name: Validar HTML
        run: htmlhint "**/*.html" --config .htmlhintrc

  # ──────────────────────────────────────────────
  # 2. Valida JavaScript com ESLint
  # ──────────────────────────────────────────────
  validate-js:
    name: Validação JavaScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-eslint8
          restore-keys: ${{ runner.os }}-npm-

      - name: Instalar ESLint
        run: npm install -g eslint@8

      - name: Validar JavaScript
        run: eslint . --ext .js

  # ──────────────────────────────────────────────
  # 3. Valida CSS com Stylelint
  # ──────────────────────────────────────────────
  validate-css:
    name: Validação CSS
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-stylelint
          restore-keys: ${{ runner.os }}-npm-

      - name: Instalar Stylelint
        run: npm install -g stylelint

      - name: Validar CSS
        run: stylelint "**/*.css" --config .stylelintrc.json

  # ──────────────────────────────────────────────
  # 4. Verifica links quebrados com Lychee
  # ──────────────────────────────────────────────
  check-links:
    name: Verificar Links
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verificar links em HTML e Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --config .lychee.toml '**/*.html' '**/*.md'
          fail: false

  # ──────────────────────────────────────────────
  # 5. Auditoria de qualidade com Lighthouse CI
  # ──────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-lhci
          restore-keys: ${{ runner.os }}-npm-

      - name: Instalar Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Executar Lighthouse CI
        run: lhci autorun

  # ──────────────────────────────────────────────
  # 6. Varredura de segredos com TruffleHog
  # ──────────────────────────────────────────────
  secret-scan:
    name: Varredura de Segredos
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog — detectar segredos expostos
        if: github.event_name != 'workflow_dispatch'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: HEAD
          extra_args: --only-verified

  # ──────────────────────────────────────────────
  # 7. Publica no GitHub Pages (somente na main)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy GitHub Pages
    needs: [validate-html, validate-js, validate-css]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-deploy
          restore-keys: ${{ runner.os }}-npm-

      - name: Instalar ferramentas de minificação
        run: npm install -g html-minifier-terser terser csso-cli

      - name: Gerar páginas de resort a partir de data.json
        run: node scripts/generate-resorts.js

      - name: Atualizar data do sitemap
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml

      - name: Minificar HTML
        run: |
          set -e
          while IFS= read -r f; do
            echo "Minificando: $f"
            html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --remove-optional-tags \
              --remove-redundant-attributes \
              --remove-script-type-attributes \
              -o "$f.min" "$f" && mv "$f.min" "$f"
          done < <(find . -name "*.html" -not -path "./.git/*")

      - name: Minificar CSS
        run: |
          set -e
          for f in style.css assets/style.css assets/index.css assets/mobile-first.css; do
            if [ -f "$f" ]; then
              echo "Minificando: $f"
              csso "$f" -o "$f.min" && mv "$f.min" "$f"
            fi
          done

      - name: Minificar JavaScript
        run: |
          set -e
          for f in script.js sw.js; do
            if [ -f "$f" ]; then
              echo "Minificando: $f"
              terser "$f" -o "$f.min" --compress --mangle && mv "$f.min" "$f"
            fi
          done

      - name: Gerar configuração da IA (placeholder)
        # A chave Gemini NÃO é mais exposta no browser.
        # Todas as chamadas à IA passam pela Supabase Edge Function,
        # que possui a chave configurada como variável de ambiente segura.
        run: |
          echo "window.GEMINI_API_KEY='';" > assets/ai-config.js
          echo "✅ assets/ai-config.js gerado (chave permanece exclusivamente no servidor)"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Fazer upload dos arquivos estáticos
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


  # ──────────────────────────────────────────────
  # 8. Deploy Supabase Edge Functions (somente na main)
  # Pré-requisitos (GitHub Secrets):
  #   SUPABASE_ACCESS_TOKEN → Supabase Personal Access Token (formato sbp_…)
  #                           Gere em: https://supabase.com/dashboard/account/tokens
  #   GEMINI_API_KEY        → Chave da API Google AI Studio (gratuita em aistudio.google.com)
  # ──────────────────────────────────────────────
  deploy-edge-functions:
    name: Deploy Edge Functions (Supabase)
    needs: [validate-html, validate-js, validate-css]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Configurar segredo GEMINI_API_KEY no Supabase
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            supabase secrets set GEMINI_API_KEY="$GEMINI_API_KEY" --project-ref ydrmjoppjxtmnwtvtinb \
              || echo "⚠️  Falha ao configurar GEMINI_API_KEY — verifique se SUPABASE_ACCESS_TOKEN é um Personal Access Token válido (formato sbp_…) em: https://supabase.com/dashboard/account/tokens"
          else
            echo "⚠️  GEMINI_API_KEY não configurado como GitHub Secret — pule esta etapa ou configure o secret."
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Deploy ai-concierge
        run: |
          supabase functions deploy ai-concierge --project-ref ydrmjoppjxtmnwtvtinb --no-verify-jwt \
            || echo "⚠️  Falha ao fazer deploy da Edge Function — verifique se SUPABASE_ACCESS_TOKEN é válido (formato sbp_…)."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ──────────────────────────────────────────────
  # 9. Smoke tests pós-deploy (somente na main)
  # ──────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Aguardar propagação do deploy
        run: sleep 30

      - name: Verificar páginas críticas
        run: |
          set -e
          URLS=(
            "https://hospedah.tur.br/"
            "https://hospedah.tur.br/busca.html"
            "https://hospedah.tur.br/reservas.html"
            "https://hospedah.tur.br/resorts/hotbeach.html"
            "https://hospedah.tur.br/resorts/ipioca.html"
          )
          FAILED=0
          for url in "${URLS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$url")
            if [ "$STATUS" = "200" ]; then
              echo "✅ $url → HTTP $STATUS"
            else
              echo "❌ $url → HTTP $STATUS"
              FAILED=$((FAILED+1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "Smoke tests falharam em $FAILED página(s)"
            exit 1
          fi
