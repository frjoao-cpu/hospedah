<head>

<link rel="manifest" href="/manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

<style>
:root {
  --dourado: #D4AF37;
  --dourado-hover: #f0c93a;
  --azul: #0B1C3D;
  --azul2: #142850;
  --verde: #25D366;
  --vermelho: #e74c3c;
  --amarelo: #f39c12;
  --bg: #0d1b2e;
  --bg2: #10233c;
  --cor-texto: #e8eaf0;
  --cor-sub: #aab4c4;
  --borda: rgba(212,175,55,0.15);
  --radius: 12px;
  --sombra: 0 4px 24px rgba(0,0,0,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--cor-texto);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, var(--azul), var(--azul2));
  border-bottom: 2px solid var(--dourado);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: var(--sombra);
}

.logo {
  color: var(--dourado);
  font-weight: 700;
  font-size: 1.2em;
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.nav-links a {
  color: var(--cor-sub);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85em;
  border: 1px solid var(--borda);
  transition: all 0.2s;
}

.nav-links a:hover, .nav-links a.active {
  background: var(--dourado);
  color: var(--azul);
  border-color: var(--dourado);
}

/* FILTROS BARRA */
.filter-bar {
  background: var(--azul2);
  border-bottom: 1px solid var(--borda);
  padding: 16px 24px;
}

.filter-grid {
  max-width: 1300px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 0.8fr auto;
  gap: 10px;
  align-items: flex-end;
}

@media (max-width: 900px) {
  .filter-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 500px) {
  .filter-grid { grid-template-columns: 1fr; }
}

.field-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.field-group label {
  font-size: 0.72em;
  color: var(--cor-sub);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  font-weight: 500;
}

.field-group input,
.field-group select {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 8px;
  color: var(--cor-texto);
  font-family: inherit;
  font-size: 0.88em;
  padding: 9px 12px;
  transition: border-color 0.2s;
}

.field-group input:focus,
.field-group select:focus {
  outline: none;
  border-color: var(--dourado);
}

.field-group select option { background: var(--azul2); }

.btn-buscar {
  background: var(--dourado);
  color: var(--azul);
  border: none;
  border-radius: 8px;
  padding: 10px 22px;
  font-family: inherit;
  font-size: 0.9em;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}

.btn-buscar:hover { background: var(--dourado-hover); }

/* AVANÇADO */
.filtros-avancados {
  max-width: 1300px;
  margin: 10px auto 0;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.filtros-avancados summary {
  color: var(--cor-sub);
  font-size: 0.82em;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--borda);
  list-style: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.filtros-avancados summary:hover { border-color: var(--dourado); color: var(--dourado); }

details.adv-filters {
  width: 100%;
}

details.adv-filters[open] > summary { color: var(--dourado); border-color: var(--dourado); }

.adv-grid {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

/* TOGGLE VIEW */
.view-toggle {
  display: flex;
  gap: 8px;
  margin: 0 24px 0 auto;
}

.view-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--borda);
  border-radius: 8px;
  padding: 7px 14px;
  color: var(--cor-sub);
  font-family: inherit;
  font-size: 0.82em;
  cursor: pointer;
  transition: all 0.2s;
}

.view-btn.active {
  background: var(--dourado);
  color: var(--azul);
  border-color: var(--dourado);
}

/* LAYOUT PRINCIPAL */
.main-layout {
  max-width: 1300px;
  margin: 0 auto;
  padding: 20px 16px 60px;
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 20px;
}

@media (max-width: 900px) {
  .main-layout { grid-template-columns: 1fr; }
}

/* LISTA DE CARDS */
.results-header {
  font-size: 0.9em;
  color: var(--cor-sub);
  margin-bottom: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.results-header strong { color: var(--dourado); }

.cards-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-height: calc(100vh - 240px);
  overflow-y: auto;
  padding-right: 4px;
}

.cards-list::-webkit-scrollbar { width: 4px; }
.cards-list::-webkit-scrollbar-track { background: transparent; }
.cards-list::-webkit-scrollbar-thumb { background: var(--borda); border-radius: 2px; }

.resort-card {
  background: var(--bg2);
  border: 1px solid var(--borda);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 14px;
}

.resort-card:hover, .resort-card.highlight {
  border-color: rgba(212,175,55,0.5);
  background: rgba(212,175,55,0.04);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.resort-card-img {
  width: 90px;
  height: 72px;
  border-radius: 8px;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2em;
}

.resort-card-body { overflow: hidden; }

.resort-card-name {
  font-size: 0.92em;
  font-weight: 600;
  color: var(--cor-texto);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.resort-card-city {
  font-size: 0.75em;
  color: var(--cor-sub);
  margin-bottom: 6px;
}

.resort-card-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.tag {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 0.68em;
  font-weight: 600;
  background: rgba(212,175,55,0.1);
  color: var(--dourado);
  border: 1px solid rgba(212,175,55,0.2);
}

.resort-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.resort-card-price {
  font-size: 0.9em;
  font-weight: 700;
  color: var(--dourado);
}

.resort-card-price small {
  font-size: 0.7em;
  font-weight: 400;
  color: var(--cor-sub);
}

.stars {
  color: var(--dourado);
  font-size: 0.82em;
  letter-spacing: 1px;
}

.btn-reservar-sm {
  background: var(--dourado);
  color: var(--azul);
  border: none;
  border-radius: 6px;
  padding: 5px 12px;
  font-family: inherit;
  font-size: 0.75em;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-reservar-sm:hover { background: var(--dourado-hover); }

/* MAPA */
.map-container {
  position: sticky;
  top: 80px;
  height: calc(100vh - 100px);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--borda);
}

#map {
  width: 100%;
  height: 100%;
  background: var(--azul2);
}

/* Customizar popup do Leaflet */
.leaflet-popup-content-wrapper {
  background: var(--azul2) !important;
  border: 1px solid var(--borda) !important;
  border-radius: var(--radius) !important;
  box-shadow: var(--sombra) !important;
  color: var(--cor-texto) !important;
  font-family: 'Poppins', sans-serif !important;
}

.leaflet-popup-tip-container .leaflet-popup-tip {
  background: var(--azul2) !important;
}

.popup-nome { font-weight: 600; font-size: 0.92em; color: var(--dourado); margin-bottom: 4px; }
.popup-cidade { font-size: 0.78em; color: var(--cor-sub); margin-bottom: 6px; }
.popup-preco { font-size: 0.85em; font-weight: 700; color: var(--dourado); margin-bottom: 8px; }
.popup-btn {
  display: block;
  background: var(--dourado);
  color: var(--azul);
  padding: 6px 12px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 0.78em;
  font-weight: 600;
  text-align: center;
}

/* CHECKBOX comodidades */
.amenity-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border: 1px solid var(--borda);
  border-radius: 20px;
  font-size: 0.78em;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.03);
  color: var(--cor-sub);
  user-select: none;
}

.amenity-chip.on {
  background: rgba(212,175,55,0.1);
  border-color: var(--dourado);
  color: var(--dourado);
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--cor-sub);
}

.empty-state .empty-icon { font-size: 2.5em; margin-bottom: 10px; }

.empty-state .active-filters-hint {
  margin-top: 12px;
  font-size: 0.8em;
  color: var(--cor-sub);
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}

.empty-state .active-filters-hint .hint-chip {
  background: rgba(212,175,55,0.1);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 12px;
  padding: 3px 9px;
  color: var(--dourado);
  font-size: 0.9em;
}

/* AUTOCOMPLETE */
.autocomplete-wrapper { position: relative; }

.autocomplete-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: var(--azul2);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 8px;
  z-index: 2000;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: var(--sombra);
}

.autocomplete-list li {
  list-style: none;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 0.85em;
  color: var(--cor-texto);
  border-bottom: 1px solid var(--borda);
  transition: background 0.15s;
}

.autocomplete-list li:last-child { border-bottom: none; }
.autocomplete-list li:hover, .autocomplete-list li[aria-selected="true"] {
  background: rgba(212,175,55,0.12);
  color: var(--dourado);
}

/* SKELETON LOADING */
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}

.skeleton-card {
  background: var(--bg2);
  border: 1px solid var(--borda);
  border-radius: var(--radius);
  padding: 16px;
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 14px;
}

.skeleton-block {
  border-radius: 6px;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 400px 100%;
  animation: shimmer 1.4s infinite linear;
}

/* SORT + CLEAR BAR */
.results-header .header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.sort-select {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 8px;
  color: var(--cor-texto);
  font-family: inherit;
  font-size: 0.8em;
  padding: 5px 10px;
  cursor: pointer;
}

.sort-select:focus { outline: none; border-color: var(--dourado); }
.sort-select option { background: var(--azul2); }

.btn-limpar {
  background: transparent;
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 8px;
  color: var(--cor-sub);
  font-family: inherit;
  font-size: 0.78em;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-limpar:hover {
  border-color: var(--dourado);
  color: var(--dourado);
}

/* ADV FILTER BADGE */
.adv-badge {
  display: inline-block;
  background: var(--dourado);
  color: var(--azul);
  border-radius: 10px;
  font-size: 0.75em;
  font-weight: 700;
  padding: 0 6px;
  margin-left: 4px;
  min-width: 18px;
  text-align: center;
  line-height: 18px;
  vertical-align: middle;
}

/* SOCIAL PROOF TOASTS (busca) */
#sp-container-busca {
  position: fixed; bottom: 70px; left: 12px; z-index: 9000;
  display: flex; flex-direction: column; gap: 10px; pointer-events: none;
}
@keyframes spSlideIn { from { transform: translateX(-110%); opacity:0; } to { transform: translateX(0); opacity:1; } }
@keyframes spFadeOut { from { opacity:1; } to { opacity:0; transform: translateX(-110%); } }
</style>
</head>

<!-- FILTROS -->
<div class="filter-bar">
  <div class="filter-grid">
    <div class="field-group">
      <label>🔍 Destino / Cidade</label>
      <div class="autocomplete-wrapper">
        <input type="text" id="f_destino" placeholder="Ex.: Olímpia, Juquehy..." autocomplete="off"
               role="combobox" aria-autocomplete="list" aria-controls="autocompleteList" aria-expanded="false"
               oninput="onDestinoInput()">
        <ul class="autocomplete-list" id="autocompleteList" role="listbox" aria-label="Sugestões de destino" style="display:none;"></ul>
      </div>

      <select id="f_hospedes" onchange="filtrar()">
        <option value="">Qualquer</option>

  <!-- FILTROS AVANÇADOS -->
  <div class="filtros-avancados">
    <details class="adv-filters">
      <summary>⚙️ Filtros avançados<span id="advBadge" class="adv-badge" aria-live="polite" aria-atomic="true" style="display:none;"></span></summary>
      <div class="adv-grid">
        <div class="field-group" style="min-width:160px;">
          <label>💲 Preço máx/noite</label>
          <input type="number" id="f_preco_max" placeholder="R$ máximo" min="0" step="50" oninput="filtrar()">
        </div>
        <div class="field-group" style="min-width:160px;">
          <label>💲 Preço mín/noite</label>
          <input type="number" id="f_preco_min" placeholder="R$ mínimo" min="0" step="50" oninput="filtrar()">
        </div>
        <div class="field-group" style="min-width:140px;">
          <label>🏠 Tipo</label>
          <select id="f_tipo" onchange="filtrar()">

            <option value="termas">Termas/SPA</option>
          </select>
        </div>
        <div class="field-group" style="min-width:140px;">
          <label>⭐ Avaliação mín.</label>
          <select id="f_nota" onchange="filtrar()">
            <option value="">Qualquer</option>
            <option value="4.5">4.5+</option>
            <option value="4">4+</option>
            <option value="3">3+</option>
          </select>
        </div>
        <div style="display:flex; flex-direction:column; gap:4px; min-width:300px;">
          <label style="font-size:0.72em; color:var(--cor-sub); text-transform:uppercase; letter-spacing:0.4px;">🛎️ Comodidades</label>
          <div id="amenitiesChips" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
        </div>
      </div>
    </details>
  </div>
</div>

<!-- MAIN -->
<div class="main-layout">

  <!-- LISTA -->
  <div>
    <div class="results-header">
      <span id="resultsCount">Carregando...</span>
      <div class="header-right">
        <select id="sortSelect" class="sort-select" onchange="filtrar()" aria-label="Ordenar resultados">
          <option value="default">Ordenar por...</option>
          <option value="preco_asc">Preço ↑</option>
          <option value="preco_desc">Preço ↓</option>
          <option value="nota_desc">Avaliação</option>
          <option value="nome_asc">Nome A-Z</option>

        <button class="btn-limpar" id="btnLimpar" onclick="limparFiltros()" style="display:none;" aria-label="Limpar todos os filtros">✕ Limpar</button>
        <div class="view-toggle">
          <button class="view-btn active" id="btnListView" onclick="setView('list')">☰ Lista</button>
          <button class="view-btn" id="btnMapView" onclick="setView('map')">🗺️ Mapa</button>

    <div class="cards-list" id="cardsList">

          <div class="skeleton-block" style="height:14px;width:70%;"></div>
          <div class="skeleton-block" style="height:11px;width:45%;"></div>
          <div class="skeleton-block" style="height:10px;width:55%;"></div>
        </div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-block" style="width:90px;height:72px;border-radius:8px;"></div>
        <div style="display:flex;flex-direction:column;gap:8px;justify-content:center;">
          <div class="skeleton-block" style="height:14px;width:60%;"></div>
          <div class="skeleton-block" style="height:11px;width:40%;"></div>
          <div class="skeleton-block" style="height:10px;width:50%;"></div>
        </div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-block" style="width:90px;height:72px;border-radius:8px;"></div>
        <div style="display:flex;flex-direction:column;gap:8px;justify-content:center;">
          <div class="skeleton-block" style="height:14px;width:75%;"></div>
          <div class="skeleton-block" style="height:11px;width:50%;"></div>
          <div class="skeleton-block" style="height:10px;width:60%;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAPA -->
  <div class="map-container" id="mapContainer">
    <div id="map"></div>
  </div>

</div>

<script>
// ============================================================
// SUPABASE — preços dinâmicos

let regrasPrecoByResort = {};   // rules grouped by resort nome for fast lookup

async function carregarPrecosDinamicos() {
  try {
    const { data } = await _sb.from('precos_dinamicos').select('*');
    todasRegrasPreco = data || [];
    // Pre-group by resort_nome for O(1) lookup in calcularPrecoParaPeriodo
    regrasPrecoByResort = {};
    todasRegrasPreco.forEach(r => {
      if (!regrasPrecoByResort[r.resort_nome]) regrasPrecoByResort[r.resort_nome] = [];
      regrasPrecoByResort[r.resort_nome].push(r);
    });
  } catch (e) {
    todasRegrasPreco = [];
    regrasPrecoByResort = {};
  }
}

/**
 * Cálculo embutido de sazonalidade — usado como fallback quando não há
 * regras cadastradas no Supabase para o resort/período.
 * Fatores realistas para turismo de resorts no Brasil:
 *   - Alta temporada (dez, jan, jul): +50 %
 *   - Média temporada (fev, mar, nov): +20 %
 *   - Baixa temporada (demais meses): −10 %
 *   - Adicional sexta/sábado: +15 %
 */
function calcularPrecoBuiltIn(resort, entrada, saida) {
  const baseNoite = resort.preco;
  let total = 0;
  let dias  = 0;

  const inicioUTC = Date.UTC(entrada.getFullYear(), entrada.getMonth(), entrada.getDate());
  const fimUTC    = Date.UTC(saida.getFullYear(),   saida.getMonth(),   saida.getDate());

  for (let ts = inicioUTC; ts < fimUTC; ts += MS_PER_DAY) {
    const d      = new Date(ts);
    const mes    = d.getUTCMonth() + 1; // 1–12
    const diaSem = d.getUTCDay();       // 0=dom, 6=sáb

    let fator;
    if ([12, 1, 7].includes(mes))      fator = 1.50; // alta
    else if ([2, 3, 11].includes(mes)) fator = 1.20; // média
    else                               fator = 0.90; // baixa

    if (diaSem === 5 || diaSem === 6) fator *= 1.15; // fim de semana

    total += baseNoite * fator;
    dias++;
  }

  return dias > 0 ? total / dias : baseNoite;
}

/**
 * Calcula o preço médio por noite para um resort no período informado.
 * Prioridade:
 *   1. Regras cadastradas no Supabase (precos_dinamicos)
 *   2. Cálculo embutido de sazonalidade/fim-de-semana (fallback)
 * Se não houver datas, retorna o preço base do resort.
 */
function calcularPrecoParaPeriodo(resort, entrada, saida) {
  if (!entrada || !saida || entrada >= saida) return resort.preco;

  const regras = regrasPrecoByResort[resort.nome] || [];

  // Sem regras no Supabase → usar cálculo embutido de sazonalidade
  if (regras.length === 0) return calcularPrecoBuiltIn(resort, entrada, saida);

  const baseNoite = resort.preco;
  let total = 0;
  let dias  = 0;

  const inicioUTC = Date.UTC(entrada.getFullYear(), entrada.getMonth(), entrada.getDate());
  const fimUTC    = Date.UTC(saida.getFullYear(),   saida.getMonth(),   saida.getDate());

  for (let ts = inicioUTC; ts < fimUTC; ts += MS_PER_DAY) {
    const dataISO   = new Date(ts).toISOString().slice(0, 10);
    const regrasDia = regras.filter(r => r.data_inicio <= dataISO && r.data_fim >= dataISO);

    let precoNoite = baseNoite;
    const regraDia   = regrasDia.find(r => (r.tipo_regra || '') === 'valor_dia');
    const regraTemp  = regrasDia.find(r => ['temporada_alta', 'temporada_baixa'].includes(r.tipo_regra || ''));
    const regraPromo = regrasDia.find(r => (r.tipo_regra || '') === 'promocao');
    const regraPer   = regrasDia.find(r => (r.tipo_regra || '') === 'valor_periodo');

    if (regraDia && regraDia.preco_noite) {
      precoNoite = Number(regraDia.preco_noite);
    } else if (regraTemp && regraTemp.preco_noite) {
      precoNoite = Number(regraTemp.preco_noite);
    } else if (regraPer && regraPer.preco_noite) {
      // valor_periodo: preco_noite armazena o total do período → dividir pelos dias do período
      const dIni = new Date(regraPer.data_inicio + 'T00:00:00Z');
      const dFim = new Date(regraPer.data_fim    + 'T00:00:00Z');
      const diasPer = Math.max(1, Math.round((dFim - dIni) / MS_PER_DAY));
      precoNoite = Number(regraPer.preco_noite) / diasPer;
    } else {
      // Nenhuma regra Supabase cobre este dia → usar fallback embutido para o dia
      const d      = new Date(ts);
      const mes    = d.getUTCMonth() + 1;
      const diaSem = d.getUTCDay();
      let fator;
      if ([12, 1, 7].includes(mes))      fator = 1.50;
      else if ([2, 3, 11].includes(mes)) fator = 1.20;
      else                               fator = 0.90;
      if (diaSem === 5 || diaSem === 6) fator *= 1.15;
      precoNoite = baseNoite * fator;
    }

    if (regraPromo) {
      let descontoPct = Number(regraPromo.desconto_percentual || 0);
      if (!descontoPct && Number(regraPromo.multiplicador) > 0 && Number(regraPromo.multiplicador) < 1) {
        descontoPct = (1 - Number(regraPromo.multiplicador)) * 100;
      }
      if (descontoPct > 0) precoNoite -= precoNoite * (descontoPct / 100);
    }

    total += precoNoite;
    dias++;
  }

  return dias > 0 ? total / dias : baseNoite;
}

/**
 * Retorna cópia do array RESORTS com preços ajustados para o período.
 */
function resortsComPrecoDinamico(entrada, saida) {
  return RESORTS.map(r => ({
    ...r,
    preco: calcularPrecoParaPeriodo(r, entrada, saida),
  }));
}

function createIcon(icon, highlight = false) {
  return L.divIcon({
    html: `<div style="
      background:${highlight ? '#f0c93a' : '#D4AF37'};
      color:#0B1C3D;
      border-radius:50%;
      width:36px; height:36px;
      display:flex; align-items:center; justify-content:center;

      box-shadow:0 2px 8px rgba(0,0,0,0.5);
      border: 2px solid ${highlight ? '#fff' : 'rgba(255,255,255,0.4)'};
      transition: all 0.2s;
    ">${icon}</div>`,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -20],
  });
}

function renderMarkers(lista) {
  // Remover marcadores antigos
  Object.values(markers).forEach(m => m.remove());
  markers = {};

  const { entrada, saida } = getDatasFiltro();
  const temDatas = !!(entrada && saida);

  lista.forEach(r => {
    let precoLabel;
    if (temDatas) {
      const noites = Math.round((saida - entrada) / MS_PER_DAY);
      const total  = r.preco * noites;
      precoLabel = `💲 R$ ${r.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}/noite · Total: R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
    } else {
      precoLabel = `Selecione o período para ver o preço`;
    }
    const m = L.marker([r.lat, r.lng], { icon: createIcon(r.icon) })
      .addTo(map)
      .bindPopup(`
        <div class="popup-nome">${r.icon} ${r.nome}</div>
        <div class="popup-cidade">📍 ${r.cidade}</div>
        <div class="popup-preco">${precoLabel}</div>
        <div style="margin-bottom:8px;">${renderStars(r.nota)}</div>
        <a href="${r.link}" class="popup-btn">Ver detalhes →</a>
        <a href="reservas.html" class="popup-btn" style="margin-top:6px; background:rgba(37,211,102,0.2); color:#25D366; border:1px solid rgba(37,211,102,0.3);">📅 Reservar</a>
      `);

    m.on('mouseover', () => highlightCard(r.id));
    m.on('mouseout',  () => highlightCard(null));

    markers[r.id] = m;
  });

  // Ajustar bounds se houver resultados
  if (lista.length > 0) {
    const group = L.featureGroup(Object.values(markers));
    map.fitBounds(group.getBounds().pad(0.2));
  }
}

function highlightCard(id) {
  document.querySelectorAll('.resort-card').forEach(c => c.classList.remove('highlight'));
  if (id) {
    const c = document.getElementById('card_' + encodeURIComponent(id));
    if (c) { c.classList.add('highlight'); c.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  }
}

function renderStars(nota) {
  const full  = Math.floor(nota);
  const half  = (nota % 1) >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  return `<span class="stars">${'★'.repeat(full)}${'½'.repeat(half)}${'☆'.repeat(empty)}</span> <small style="color:var(--cor-sub)">(${nota})</small>`;
}

function renderCards(lista) {
  const el = document.getElementById('cardsList');
  document.getElementById('resultsCount').innerHTML = `<strong>${lista.length}</strong> acomodação${lista.length !== 1 ? 'ões' : ''} encontrada${lista.length !== 1 ? 's' : ''}`;

  if (lista.length === 0) {
    const hints = getActiveFilterHints();
    const hintsHtml = hints.length > 0
      ? `<div class="active-filters-hint">Filtros ativos: ${hints.map(h => `<span class="hint-chip">${h}</span>`).join('')}</div>`
      : '';
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div>Nenhuma acomodação encontrada com esses filtros.</div><div style="font-size:0.82em; margin-top:6px;">Tente remover alguns filtros.</div>${hintsHtml}</div>`;
    return;
  }

  el.innerHTML = lista.map(r => {
    // Safely encode the resort id as a data attribute to avoid XSS in inline handlers
    const safeId = encodeURIComponent(r.id);
    const { entrada, saida } = getDatasFiltro();
    const temDatas = !!(entrada && saida);
    let precoLabel;
    if (temDatas) {
      const noites = Math.round((saida - entrada) / MS_PER_DAY);
      const total  = r.preco * noites;
      precoLabel = `<div class="resort-card-price">R$ ${r.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})} <small>/noite (média)</small></div>` +
                   `<div style="font-size:0.78em;color:var(--cor-sub);margin-top:2px;">Total ${noites} noite${noites !== 1 ? 's' : ''}: <strong style="color:var(--dourado)">R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></div>`;
    } else {
      precoLabel = `<div class="resort-card-price"><small>Selecione o período para ver o preço</small></div>`;
    }
    // Build reservas.html URL passing current date params
    let reservasUrl = 'reservas.html';
    if (entrada && saida) {
      const fmt = d => d.toISOString().slice(0, 10);
      reservasUrl += `?entrada=${fmt(entrada)}&saida=${fmt(saida)}&resort=${encodeURIComponent(r.id)}`;
    }
    return `
    <div class="resort-card" id="card_${safeId}" data-resort-id="${safeId}">
      <div class="resort-card-img">
        <img src="${r.img}" alt="${r.nome}" loading="lazy" width="90" height="72"
             style="width:90px;height:72px;border-radius:8px;object-fit:cover;"
             onerror="this.style.display='none'; this.nextSibling.style.display='flex'">
        <div style="display:none; align-items:center; justify-content:center; font-size:2em; width:90px; height:72px;">${r.icon}</div>
      </div>
      <div class="resort-card-body">
        <div class="resort-card-name">${r.nome}</div>
        <div class="resort-card-city">📍 ${r.cidade}</div>
        <div class="resort-card-tags">
          ${r.comodidades.slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('')}
          ${r.comodidades.length > 3 ? `<span class="tag">+${r.comodidades.length - 3}</span>` : ''}
        </div>
        <div class="resort-card-footer">
          <div>
            ${precoLabel}
            <div>${renderStars(r.nota)}</div>
          </div>
          <a href="${reservasUrl}" class="reservar-link">
            <button class="btn-reservar-sm">📅 Reservar</button>
          </a>
        </div>
      </div>
    </div>
  `;
  }).join('');

  // Attach event listeners via delegation (avoids XSS from inline onclick with IDs)
  el.querySelectorAll('.resort-card').forEach(card => {
    const id = decodeURIComponent(card.dataset.resortId || '');
    card.addEventListener('click', e => {
      if (e.target.closest('.reservar-link')) return; // let link bubble
      abrirNoMapa(id);
    });
    card.addEventListener('mouseenter', () => pulseMarker(id));
    card.addEventListener('mouseleave', () => pulseMarker(null));
  });
}

function abrirNoMapa(id) {
  const m = markers[id];
  if (m) {
    map.setView(m.getLatLng(), 14, { animate: true });
    m.openPopup();
  }
}

function pulseMarker(id) {
  Object.entries(markers).forEach(([k, m]) => {
    m.setIcon(createIcon(RESORTS.find(r => r.id === k)?.icon || '📍', k === id));
  });
}

function getDatasFiltro() {
  let entrada = null, saida = null;
  if (window.fpEntrada && window.fpEntrada.selectedDates[0]) entrada = window.fpEntrada.selectedDates[0];
  if (window.fpSaida   && window.fpSaida.selectedDates[0])   saida   = window.fpSaida.selectedDates[0];
  return { entrada, saida };
}

/**
 * Returns a list of human-readable labels for all currently active filters.
 * Used in the empty-state hint and to show/hide the "Limpar" button.
 */
function getActiveFilterHints() {
  const hints = [];
  const destino  = document.getElementById('f_destino').value.trim();
  const hospedes = document.getElementById('f_hospedes').value;
  const precoMin = document.getElementById('f_preco_min').value;
  const precoMax = document.getElementById('f_preco_max').value;
  const tipo     = document.getElementById('f_tipo').value;
  const notaMin  = document.getElementById('f_nota').value;
  const { entrada, saida } = getDatasFiltro();

  if (destino)  hints.push(`Destino: "${destino}"`);
  if (hospedes) hints.push(`Hóspedes: ${hospedes}+`);
  if (entrada)  hints.push(`Check-in: ${window.fpEntrada.formatDate(entrada, 'd/m/Y')}`);
  if (saida)    hints.push(`Check-out: ${window.fpSaida.formatDate(saida, 'd/m/Y')}`);
  if (precoMin) hints.push(`Preço mín: R$${precoMin}`);
  if (precoMax) hints.push(`Preço máx: R$${precoMax}`);
  if (tipo)     hints.push(`Tipo: ${tipo}`);
  if (notaMin)  hints.push(`Avaliação: ${notaMin}+`);
  amenitiesSel.forEach(a => hints.push(a));
  return hints;
}

/** Count only the *advanced* filter fields (for the badge). */
function countActiveAdvancedFilters() {
  let count = 0;
  if (document.getElementById('f_preco_min').value) count++;
  if (document.getElementById('f_preco_max').value) count++;
  if (document.getElementById('f_tipo').value)      count++;
  if (document.getElementById('f_nota').value)      count++;
  count += amenitiesSel.size;
  return count;
}

function updateAdvBadge() {
  const n    = countActiveAdvancedFilters();
  const badge = document.getElementById('advBadge');
  badge.textContent = n;
  badge.style.display = n > 0 ? 'inline-block' : 'none';
}

function updateLimparBtn() {
  const hasFilters = getActiveFilterHints().length > 0;
  document.getElementById('btnLimpar').style.display = hasFilters ? 'inline-block' : 'none';
}

function syncUrl() {
  const params = new URLSearchParams();
  const destino  = document.getElementById('f_destino').value.trim();
  const hospedes = document.getElementById('f_hospedes').value;
  const { entrada, saida } = getDatasFiltro();

  if (destino)  params.set('destino',  destino);
  if (hospedes) params.set('hospedes', hospedes);
  if (entrada)  params.set('entrada',  entrada.toISOString().slice(0, 10));
  if (saida)    params.set('saida',    saida.toISOString().slice(0, 10));

  const precoMin = document.getElementById('f_preco_min').value;
  const precoMax = document.getElementById('f_preco_max').value;
  const tipo     = document.getElementById('f_tipo').value;
  const notaMin  = document.getElementById('f_nota').value;
  if (precoMin) params.set('preco_min', precoMin);
  if (precoMax) params.set('preco_max', precoMax);
  if (tipo)     params.set('tipo',      tipo);
  if (notaMin)  params.set('nota_min',  notaMin);
  if (amenitiesSel.size > 0) params.set('comodidades', [...amenitiesSel].join(','));

  const newUrl = params.toString() ? `${location.pathname}?${params}` : location.pathname;
  history.replaceState(null, '', newUrl);
}

function ordenar(lista) {
  const order = document.getElementById('sortSelect').value;
  const copia = [...lista];
  if (order === 'preco_asc')  copia.sort((a, b) => a.preco - b.preco);
  if (order === 'preco_desc') copia.sort((a, b) => b.preco - a.preco);
  if (order === 'nota_desc')  copia.sort((a, b) => b.nota  - a.nota);
  if (order === 'nome_asc')   copia.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
  return copia;
}

function filtrar() {
  const destino   = document.getElementById('f_destino').value.toLowerCase();
  const hospedes  = parseInt(document.getElementById('f_hospedes').value, 10) || 0;
  const precoMin  = parseFloat(document.getElementById('f_preco_min').value) || 0;
  const precoMax  = parseFloat(document.getElementById('f_preco_max').value) || Infinity;
  const tipo      = document.getElementById('f_tipo').value;
  const notaMin   = parseFloat(document.getElementById('f_nota').value) || 0;

  const { entrada, saida } = getDatasFiltro();
  const listaBase = resortsComPrecoDinamico(entrada, saida);

  resultados = listaBase.filter(r => {
    if (destino && !r.nome.toLowerCase().includes(destino) && !r.cidade.toLowerCase().includes(destino)) return false;
    if (hospedes && r.capacidade < hospedes) return false;
    if (r.preco < precoMin || r.preco > precoMax) return false;
    if (tipo && r.tipo !== tipo) return false;
    if (r.nota < notaMin) return false;
    if (amenitiesSel.size > 0) {
      const temTodos = [...amenitiesSel].every(a => r.comodidades.includes(a));
      if (!temTodos) return false;
    }
    return true;
  });

  const listaSorted = ordenar(resultados);
  renderCards(listaSorted);
  renderMarkers(listaSorted);
  updateAdvBadge();
  updateLimparBtn();
  syncUrl();
}

function renderAmenitiesChips() {
  const c = document.getElementById('amenitiesChips');
  c.innerHTML = AMENITIES_LIST.map(a => {
    const on = amenitiesSel.has(a);
    return `<span class="amenity-chip ${on ? 'on' : ''}" role="checkbox" aria-checked="${on}" tabindex="0" data-amenity="${a}">${a}</span>`;
  }).join('');

  c.querySelectorAll('.amenity-chip').forEach(chip => {
    chip.addEventListener('click', () => toggleAmenity(chip.dataset.amenity));
    chip.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleAmenity(chip.dataset.amenity);
      }
    });
  });
}

function toggleAmenity(a) {
  amenitiesSel.has(a) ? amenitiesSel.delete(a) : amenitiesSel.add(a);
  renderAmenitiesChips();
  filtrar();
}

// ============================================================
// AUTOCOMPLETE DESTINO
// ============================================================
const DEBOUNCE_DELAY_MS       = 300;
const AUTOCOMPLETE_BLUR_DELAY = 150;
let _debounceTimer = null;

function onDestinoInput() {
  clearTimeout(_debounceTimer);
  _debounceTimer = setTimeout(() => {
    mostrarAutocomplete();
    filtrar();
  }, DEBOUNCE_DELAY_MS);
}

function getSugestoes(term) {
  if (!term) return [];
  const t = term.toLowerCase();
  const seen = new Set();
  const sugestoes = [];
  RESORTS.forEach(r => {
    // Add cidade suggestion (use the part before the first hyphen as the search value, or full name if no hyphen)
    if (r.cidade.toLowerCase().includes(t) && !seen.has(r.cidade)) {
      seen.add(r.cidade);
      const cidadeBase = r.cidade.includes('-') ? r.cidade.split('-')[0].trim() : r.cidade;
      sugestoes.push({ label: `📍 ${r.cidade}`, value: cidadeBase, id: `ac-cidade-${seen.size}` });
    }
    // Add resort name suggestion
    if (r.nome.toLowerCase().includes(t) && !seen.has(r.nome)) {
      seen.add(r.nome);
      sugestoes.push({ label: `🏨 ${r.nome}`, value: r.nome, id: `ac-resort-${seen.size}` });
    }
  });
  return sugestoes.slice(0, 6);
}

function mostrarAutocomplete() {
  const input = document.getElementById('f_destino');
  const list  = document.getElementById('autocompleteList');
  const term  = input.value.trim();

  if (!term) { fecharAutocomplete(); return; }

  const sugestoes = getSugestoes(term);
  if (sugestoes.length === 0) { fecharAutocomplete(); return; }

  list.innerHTML = sugestoes.map(s =>
    `<li id="${s.id}" role="option" aria-selected="false" data-value="${s.value}">${s.label}</li>`
  ).join('');

  list.querySelectorAll('li').forEach(li => {
    li.addEventListener('mousedown', e => {
      e.preventDefault(); // prevent blur before click
      document.getElementById('f_destino').value = li.dataset.value;
      fecharAutocomplete();
      filtrar();
    });
  });

  list.style.display = 'block';
  input.setAttribute('aria-expanded', 'true');
}

function fecharAutocomplete() {
  const list  = document.getElementById('autocompleteList');
  const input = document.getElementById('f_destino');
  list.style.display = 'none';
  input.setAttribute('aria-expanded', 'false');
  input.removeAttribute('aria-activedescendant');
}

// Keyboard navigation for autocomplete
document.getElementById('f_destino').addEventListener('keydown', function(e) {
  const list  = document.getElementById('autocompleteList');
  if (list.style.display === 'none') return;
  const items = list.querySelectorAll('li');
  const cur   = list.querySelector('[aria-selected="true"]');

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    const next = cur ? cur.nextElementSibling : items[0];
    if (cur) cur.setAttribute('aria-selected', 'false');
    if (next) {
      next.setAttribute('aria-selected', 'true');
      next.scrollIntoView({ block: 'nearest' });
      this.setAttribute('aria-activedescendant', next.id);
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = cur ? cur.previousElementSibling : items[items.length - 1];
    if (cur) cur.setAttribute('aria-selected', 'false');
    if (prev) {
      prev.setAttribute('aria-selected', 'true');
      prev.scrollIntoView({ block: 'nearest' });
      this.setAttribute('aria-activedescendant', prev.id);
    }
  } else if (e.key === 'Enter') {
    const sel = list.querySelector('[aria-selected="true"]');
    if (sel) {
      e.preventDefault();
      this.value = sel.dataset.value;
      fecharAutocomplete();
      filtrar();
    }
  } else if (e.key === 'Escape') {
    fecharAutocomplete();
  }
});

document.getElementById('f_destino').addEventListener('blur', () => {
  // Delay so mousedown on list item fires first
  setTimeout(fecharAutocomplete, AUTOCOMPLETE_BLUR_DELAY);
});

window.fpEntrada = flatpickr('#f_entrada', {
  locale: 'pt',
  minDate: 'today',
  dateFormat: 'd/m/Y',
  onChange(d) {
    if (d[0]) {
      // Auto-advance: open saída picker with minDate = next day
      const nextDay = new Date(d[0]);
      nextDay.setDate(nextDay.getDate() + 1);
      window.fpSaida.set('minDate', nextDay);
      // If current saída is before the new minDate, clear it
      if (window.fpSaida.selectedDates[0] && window.fpSaida.selectedDates[0] <= d[0]) {
        window.fpSaida.clear();
      }
      window.fpSaida.open();
    }
    filtrar();
  }
});

window.fpSaida = flatpickr('#f_saida', {
  locale: 'pt',
  minDate: 'today',
  dateFormat: 'd/m/Y',
  onChange(d) { if (d[0]) filtrar(); }
});

// Carregar preços dinâmicos do Supabase, depois aplicar params da URL e filtrar
carregarPrecosDinamicos().then(() => {
  // Lê parâmetros da URL (vindo do heroSearch do index.html ou de URL compartilhada)
  (function applyUrlParams() {
    var params = new URLSearchParams(window.location.search);
    var destino    = params.get('destino')     || '';
    var hospedes   = params.get('hospedes')    || '';
    var entrada    = params.get('entrada')     || '';
    var saida      = params.get('saida')       || '';
    var precoMin   = params.get('preco_min')   || '';
    var precoMax   = params.get('preco_max')   || '';
    var tipo       = params.get('tipo')        || '';
    var notaMin    = params.get('nota_min')    || '';
    var comodidades = params.get('comodidades') || '';

    if (destino)  document.getElementById('f_destino').value   = destino;
    if (hospedes) document.getElementById('f_hospedes').value  = hospedes;
    if (precoMin) document.getElementById('f_preco_min').value = precoMin;
    if (precoMax) document.getElementById('f_preco_max').value = precoMax;
    if (tipo)     document.getElementById('f_tipo').value      = tipo;
    if (notaMin)  document.getElementById('f_nota').value      = notaMin;
    if (comodidades) {
      comodidades.split(',').forEach(a => { if (a) amenitiesSel.add(a); });
      renderAmenitiesChips();
    }

    if (entrada && window.fpEntrada) window.fpEntrada.setDate(entrada, false);
    if (saida   && window.fpSaida)   window.fpSaida.setDate(saida,   false);

    // Sempre filtrar após aplicar params URL (preços dinâmicos já carregados)
    filtrar();
  })();
});

let _demandasBusca = {};

(async function carregarDemandasBusca() {
  try {
    const { data } = await _sb.rpc('get_demanda_resort');
    if (data) data.forEach(r => { _demandasBusca[r.resort_nome] = parseInt(r.total_reservas, 10); });
    // Aplicar badges após cards renderizados
    setTimeout(aplicarDemandaBadges, 1200);
  } catch (_) {}
})();

function aplicarDemandaBadges() {
  document.querySelectorAll('.resort-card').forEach(card => {
    const id = decodeURIComponent(card.dataset.resortId || '');
    const resort = RESORTS.find(r => r.id === id);
    if (!resort) return;
    const count = _demandasBusca[resort.nome] || 0;
    const existing = card.querySelector('.demand-badge-busca');
    if (existing) existing.remove();
    if (count >= 3) {
      const b = document.createElement('span');
      b.className = 'demand-badge-busca';
      b.style.cssText = 'display:inline-block;font-size:0.65em;font-weight:700;padding:2px 7px;border-radius:8px;margin-left:6px;background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);';
      b.textContent = '🔥 Alta demanda';
      const name = card.querySelector('.resort-card-name');
      if (name) name.appendChild(b);
    } else if (count >= 1) {
      const b = document.createElement('span');
      b.className = 'demand-badge-busca';
      b.style.cssText = 'display:inline-block;font-size:0.65em;font-weight:700;padding:2px 7px;border-radius:8px;margin-left:6px;background:rgba(251,191,36,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.25);';
      b.textContent = '⚡ Procurado';
      const name = card.querySelector('.resort-card-name');
      if (name) name.appendChild(b);
    }
  });
}

// Re-aplicar badges após cada filtro
const _filtrarOrig = filtrar;
filtrar = function() { _filtrarOrig.apply(this, arguments); setTimeout(aplicarDemandaBadges, 200); };
