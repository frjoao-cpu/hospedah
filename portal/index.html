<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" sizes="180x180">
<link rel="icon" type="image/svg+xml" href="/assets/logo-favicon.svg">
  <title>Portal do Hóspede | HOSPEDAH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/mobile-first.css">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body data-portal-page="auth">
  <main class="portal-auth-wrap">
    <section class="portal-card glass" aria-label="Autenticação do hóspede">
      <a class="portal-brand" href="/index.html">HOSPEDAH</a>
      <h1 class="portal-title">Portal do Hóspede</h1>
      <p class="portal-subtitle">Gerencie suas reservas, vouchers e benefícios premium.</p>

      <div class="portal-tabs" role="tablist" aria-label="Entrar ou criar conta">
        <button class="portal-tab active" id="tab-login" type="button" data-tab="login" role="tab" aria-selected="true">Entrar</button>
        <button class="portal-tab" id="tab-signup" type="button" data-tab="signup" role="tab" aria-selected="false">Criar conta</button>
      </div>

      <div class="portal-message" id="portalAuthMessage" aria-live="polite"></div>

      <form id="loginForm" class="portal-form" novalidate>
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" autocomplete="email" required>

        <label for="loginPassword">Senha</label>
        <input type="password" id="loginPassword" minlength="6" autocomplete="current-password" required>

        <button type="submit" class="portal-btn portal-btn-primary">Entrar</button>
      </form>

      <form id="signupForm" class="portal-form hidden" novalidate>
        <label for="signupName">Nome completo</label>
        <input type="text" id="signupName" autocomplete="name" required>

        <label for="signupEmail">E-mail</label>
        <input type="email" id="signupEmail" autocomplete="email" required>

        <label for="signupPassword">Senha</label>
        <input type="password" id="signupPassword" minlength="6" autocomplete="new-password" required>

        <button type="submit" class="portal-btn portal-btn-primary">Criar conta</button>
      </form>

      <button type="button" id="btnGoogleAuth" class="portal-btn portal-btn-google">Entrar com Google</button>
      <a href="/portal/reset-password.html" class="portal-link">Esqueci minha senha</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/supabase-config.js"></script>
  <script src="/assets/portal.js"></script>
</body>
</html>
