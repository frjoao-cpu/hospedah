<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://ydrmjoppjxtmnwtvtinb.supabase.co; img-src 'self' data: https://i.imgur.com; object-src 'none'; base-uri 'self';">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" sizes="180x180">
  <link rel="icon" type="image/svg+xml" href="/assets/logo-favicon.svg" sizes="any">
  <meta name="theme-color" content="#D4AF37">
  <title>Portal do Hóspede | HOSPEDAH</title>
  <meta name="description" content="Acesse o Portal do Hóspede HOSPEDAH. Gerencie reservas, vouchers e benefícios premium com segurança.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/assets/mobile-first.css">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body data-portal-page="auth">
  <main class="portal-auth-wrap">
    <section class="portal-card glass" aria-label="Autenticação do hóspede">

      <div class="portal-logo-wrap">
        <img src="https://i.imgur.com/fVKGOSt.png" alt="HOSPEDAH" width="240" height="48" loading="eager">
        <div class="portal-logo-tagline">
          <strong>HOSPEDAH</strong>
          <span>Portal do Hóspede</span>
        </div>
      </div>

      <p class="portal-subtitle">Gerencie reservas, vouchers e benefícios premium.</p>

      <div class="portal-tabs" role="tablist" aria-label="Entrar ou criar conta">
        <button class="portal-tab active" id="tab-login" type="button" data-tab="login" role="tab" aria-selected="true">🔑 Entrar</button>
        <button class="portal-tab" id="tab-signup" type="button" data-tab="signup" role="tab" aria-selected="false">✨ Criar conta</button>
      </div>

      <div class="portal-message" id="portalAuthMessage" aria-live="polite"></div>

      <form id="loginForm" class="portal-form" novalidate>
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" autocomplete="email" placeholder="seu@email.com" required autofocus>

        <label for="loginPassword">Senha</label>
        <div class="portal-input-wrap">
          <input type="password" id="loginPassword" minlength="6" autocomplete="current-password" placeholder="••••••••" required>
          <button type="button" class="portal-eye-btn" aria-label="Mostrar senha" data-target="loginPassword">👁</button>
        </div>

        <button type="submit" class="portal-btn portal-btn-primary" id="loginSubmitBtn">🔐 Entrar na minha conta</button>
      </form>

      <form id="signupForm" class="portal-form hidden" novalidate>
        <label for="signupName">Nome completo</label>
        <input type="text" id="signupName" autocomplete="name" placeholder="Seu nome completo" required>

        <label for="signupEmail">E-mail</label>
        <input type="email" id="signupEmail" autocomplete="email" placeholder="seu@email.com" required>

        <label for="signupPassword">Senha <span class="portal-label-hint">(mín. 6 caracteres)</span></label>
        <div class="portal-input-wrap">
          <input type="password" id="signupPassword" minlength="6" autocomplete="new-password" placeholder="••••••••" required>
          <button type="button" class="portal-eye-btn" aria-label="Mostrar senha" data-target="signupPassword">👁</button>
        </div>
        <div class="portal-strength-wrap" id="signupStrengthWrap" aria-live="polite">
          <div class="portal-strength-bar"><div class="portal-strength-fill" id="signupStrengthFill"></div></div>
          <span class="portal-strength-label" id="signupStrengthLabel"></span>
        </div>

        <button type="submit" class="portal-btn portal-btn-primary">🚀 Criar minha conta</button>
      </form>

      <div class="portal-divider">ou acesse com</div>

      <button type="button" id="btnMagicLink" class="portal-btn portal-btn-magic">✉️ Link mágico por e-mail</button>

      <button type="button" id="btnGoogleAuth" class="portal-btn portal-btn-google">Entrar com Google</button>

      <button type="button" id="btnPasswordReset" class="portal-btn portal-btn-reset">🔁 Esqueci minha senha</button>

      <div class="portal-auth-automation" aria-label="Recursos automáticos de acesso">
        <strong>Acesso inteligente</strong>
        <ul>
          <li>Recuperação automática por e-mail</li>
          <li>Link mágico sem senha</li>
          <li>Fallback seguro se um provedor estiver indisponível</li>
        </ul>
      </div>

      <div class="security-seal portal-security-seal">
        🔒 Conexão segura · SSL · Dados protegidos pela LGPD
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/assets/supabase-config.js"></script>
  <script src="/assets/portal.js"></script>
</body>
</html>
