<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir Senha | HOSPEDAH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">
<link rel="stylesheet" href="/assets/mobile-first.css">
<link rel="stylesheet" href="/assets/style.css">
<link rel="stylesheet" href="/assets/portal.css">
</head>
<body class="portal-page" data-portal-page="reset">
  <main class="portal-shell">
    <section class="portal-card portal-auth" aria-label="Redefinir senha">
      <div class="portal-brand">
        <img src="/assets/logo-navbar.svg" alt="HOSPEDAH" width="180" height="36">
        <h1>Redefinir senha</h1>
        <p>Informe uma nova senha para acessar seu portal.</p>
      </div>

      <form class="portal-form" id="resetForm" novalidate>
        <label for="newPassword">Nova senha
          <input class="portal-input" id="newPassword" type="password" minlength="6" required>
        </label>
        <label for="confirmNewPassword">Confirmar nova senha
          <input class="portal-input" id="confirmNewPassword" type="password" minlength="6" required>
        </label>
        <button class="portal-btn portal-btn-primary" type="submit">Salvar nova senha</button>
      </form>

      <div class="portal-helper"><a href="/portal/index.html">Voltar para login</a></div>
      <div class="portal-alert" data-portal-alert role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/supabase-config.js"></script>
  <script src="/assets/portal.js"></script>
</body>
</html>
