<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://ydrmjoppjxtmnwtvtinb.supabase.co; object-src 'none'; base-uri 'self';">
  <title>Redefinir senha | HOSPEDAH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="/assets/mobile-first.css">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body class="portal-body">
  <main class="portal-main auth-main">
    <section class="portal-card auth-card">
      <h1 class="portal-title">Recuperar acesso</h1>
      <p class="portal-subtitle">Enviaremos um link seguro para redefinição de senha.</p>

      <form id="resetRequestForm" class="portal-form" novalidate>
        <label for="resetEmail">E-mail</label>
        <input id="resetEmail" type="email" autocomplete="email" required>
        <button id="resetRequestSubmit" type="submit" class="portal-btn portal-btn-primary">Enviar link de recuperação</button>
      </form>

      <form id="resetUpdateForm" class="portal-form" novalidate>
        <label for="resetNewPassword">Nova senha</label>
        <input id="resetNewPassword" type="password" minlength="6" required>
        <label for="resetConfirmPassword">Confirmar nova senha</label>
        <input id="resetConfirmPassword" type="password" minlength="6" required>
        <button id="resetUpdateSubmit" type="submit" class="portal-btn portal-btn-primary">Atualizar senha</button>
      </form>

      <a href="/portal/index.html" class="portal-link-btn">← Voltar para login</a>
      <div id="portalResetFeedback" class="portal-feedback" aria-live="polite"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/supabase-config.js"></script>
  <script src="/assets/portal.js"></script>
</body>
</html>
