<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir senha | HOSPEDAH</title>
  <meta name="description" content="Redefina sua senha de acesso ao portal do hóspede HOSPEDAH.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"></noscript>
  <link rel="stylesheet" href="/assets/mobile-first.css">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body class="portal-body" data-portal-page="reset">
  <main class="portal-auth-wrapper">
    <section class="portal-auth-card" aria-labelledby="reset-title">
      <h1 id="reset-title">Redefinir senha</h1>
      <p class="portal-auth-subtitle">Defina uma nova senha para acessar o portal.</p>
      <form id="resetPasswordForm" novalidate>
        <label for="resetNewPassword">Nova senha</label>
        <input id="resetNewPassword" type="password" minlength="8" required>
        <label for="resetConfirmPassword">Confirmar nova senha</label>
        <input id="resetConfirmPassword" type="password" minlength="8" required>
        <button class="portal-btn portal-btn-primary" type="submit">Salvar nova senha</button>
      </form>
      <p class="portal-feedback" id="resetFeedback" role="status" aria-live="polite"></p>
      <a class="portal-link-button" href="/portal/">Voltar ao login</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/supabase-config.js"></script>
  <script src="/assets/portal.js"></script>
</body>
</html>
