<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://ydrmjoppjxtmnwtvtinb.supabase.co; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self';">
  <title>Redefinir senha | HOSPEDAH</title>
  <meta name="description" content="Defina uma nova senha para sua conta HOSPEDAH.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="../assets/mobile-first.css">
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="../assets/portal.css">
</head>
<body class="portal-body portal-auth-page">
  <main class="portal-auth-wrapper" role="main">
    <section class="portal-auth-card portal-reset-card" aria-label="Redefinição de senha">
      <h1>Redefinir senha</h1>
      <p>Digite sua nova senha para concluir a recuperação.</p>

      <form id="resetPasswordForm" class="portal-form" novalidate>
        <div class="portal-field">
          <label for="resetNewPassword">Nova senha</label>
          <div class="portal-password-wrap">
            <input id="resetNewPassword" type="password" minlength="8" required>
            <button type="button" class="portal-icon-btn" data-password-toggle="resetNewPassword" aria-label="Mostrar ou ocultar senha">👁️</button>
          </div>
        </div>
        <div class="portal-field">
          <label for="resetConfirmPassword">Confirmar senha</label>
          <div class="portal-password-wrap">
            <input id="resetConfirmPassword" type="password" minlength="8" required>
            <button type="button" class="portal-icon-btn" data-password-toggle="resetConfirmPassword" aria-label="Mostrar ou ocultar senha">👁️</button>
          </div>
        </div>
        <button type="submit" class="portal-btn portal-btn-primary" id="resetPasswordBtn">
          <span class="btn-label">Atualizar senha</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </form>

      <a class="portal-back-link" href="./index.html">← Voltar para login</a>
    </section>
  </main>

  <div id="portalToast" class="portal-toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-config.js"></script>
  <script src="../assets/portal.js"></script>
</body>
</html>
