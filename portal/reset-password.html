<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir Senha | HOSPEDAH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="/assets/mobile-first.css">
<link rel="stylesheet" href="/assets/style.css">
<link rel="stylesheet" href="/assets/portal.css">
</head>
<body class="portal-body">
<main class="portal-auth" aria-label="Redefinição de senha">
  <section class="portal-card">
    <h1>Redefinir senha</h1>
    <p class="portal-subtitle">Informe seu e-mail para receber o link ou defina a nova senha após abrir o link.</p>

    <p class="portal-feedback" id="resetFeedback" aria-live="polite"></p>

    <form id="resetRequestForm" class="portal-form">
      <label for="resetEmail">E-mail</label>
      <input id="resetEmail" name="email" type="email" required>
      <button type="submit" class="portal-btn portal-btn-ghost">Enviar e-mail de recuperação</button>
    </form>

    <form id="resetPasswordForm" class="portal-form">
      <label for="newPassword">Nova senha</label>
      <input id="newPassword" name="newPassword" type="password" minlength="6" required>

      <label for="confirmPassword">Confirmar nova senha</label>
      <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" required>

      <button type="submit" class="portal-btn portal-btn-primary">Atualizar senha</button>
    </form>

    <a class="portal-link" href="/portal/index.html">Voltar para login</a>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/supabase-config.js"></script>
<script src="/assets/portal.js"></script>
</body>
</html>
