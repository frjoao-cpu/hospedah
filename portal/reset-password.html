<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" sizes="180x180">
<link rel="icon" type="image/svg+xml" href="/assets/logo-favicon.svg" sizes="any">
<meta name="theme-color" content="#D4AF37">
  <title>Redefinir senha | HOSPEDAH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/mobile-first.css">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body data-portal-page="reset-password">
  <main class="portal-auth-wrap">
    <section class="portal-card glass" aria-label="Redefinir senha">
      <a class="portal-brand" href="/index.html">HOSPEDAH</a>
      <h1 class="portal-title">Redefinir senha</h1>
      <p class="portal-subtitle">Insira uma nova senha para continuar.</p>

      <div class="portal-message" id="portalResetMessage" aria-live="polite"></div>

      <form id="resetPasswordForm" class="portal-form" novalidate>
        <label for="resetNewPassword">Nova senha</label>
        <div class="portal-input-wrap">
          <input id="resetNewPassword" type="password" minlength="6" autocomplete="new-password" required>
          <button type="button" class="portal-eye-btn" aria-label="Mostrar senha" data-target="resetNewPassword">👁</button>
        </div>

        <button type="submit" class="portal-btn portal-btn-primary">Atualizar senha</button>
      </form>

      <a href="/portal/index.html" class="portal-link">Voltar para login</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/assets/supabase-config.js"></script>
  <script src="/assets/portal.js"></script>
</body>
</html>
