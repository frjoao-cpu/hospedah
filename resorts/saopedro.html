<script>
// Contexto do resort para o Concierge IA
try {
  sessionStorage.setItem('hospedah_busca_ctx', JSON.stringify({ resort: 'saopedro' }));
} catch(e) {}

/* ════════════════════════════════════════════
   ABAS — troca com scroll suave + WCAG 2.1
════════════════════════════════════════════ */
var tabs   = Array.from(document.querySelectorAll('.gallery-tab'));
var panels = Array.from(document.querySelectorAll('.gallery-panel'));

function switchTab(name) {
  tabs.forEach(function(btn) {
    var isActive = btn.id === 'tab-' + name;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-selected', String(isActive));
    btn.tabIndex = isActive ? 0 : -1;
  });
  panels.forEach(function(p) {
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
  // Pausa todos os vídeos ao sair da aba de vídeos
  if (name !== 'videos') {
    document.querySelectorAll('video').forEach(function(v) { v.pause(); });
  }
  // Scroll suave para a galeria em mobile
  var panel = document.getElementById('panel-' + name);
  if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// Navegação por teclado nas abas (← →) — WCAG 2.1 §4.1.3
document.querySelector('[role="tablist"]').addEventListener('keydown', function(e) {
  var idx = tabs.findIndex(function(t) { return t === document.activeElement; });
  if (idx === -1) return;
  if (e.key === 'ArrowRight' && idx < tabs.length - 1) {
    tabs[idx + 1].focus();
    tabs[idx + 1].click();
    e.preventDefault();
  } else if (e.key === 'ArrowLeft' && idx > 0) {
    tabs[idx - 1].focus();
    tabs[idx - 1].click();
    e.preventDefault();
  }
});

/* ════════════════════════════════════════════
   MODAL DE VÍDEO HD
════════════════════════════════════════════ */
var videoModal  = document.getElementById('video-modal');
var vmPlayer    = document.getElementById('vm-player');
var vmTitle     = document.getElementById('vm-title');
var vmClose     = document.getElementById('vm-close');
var _lastFocus  = null;

function openVideoModal(src, title) {
  _lastFocus = document.activeElement;
  vmPlayer.src = src;
  vmTitle.textContent = title || '';
  videoModal.classList.add('open');
  document.body.style.overflow = 'hidden';
  vmPlayer.play().catch(function() {});
  vmClose.focus();
}

function closeVideoModal() {
  vmPlayer.pause();
  vmPlayer.removeAttribute('src');
  vmPlayer.load();
  vmTitle.textContent = '';
  videoModal.classList.remove('open');
  document.body.style.overflow = '';
  if (_lastFocus) _lastFocus.focus();
}

vmClose.addEventListener('click', closeVideoModal);
videoModal.addEventListener('click', function(e) {
  if (e.target === videoModal) closeVideoModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && videoModal.classList.contains('open')) closeVideoModal();
});

// Delegar evento nos botões play-hd-btn
document.querySelectorAll('.play-hd-btn').forEach(function(btn) {
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    openVideoModal(btn.dataset.src, btn.dataset.title);
  });
});

/* ════════════════════════════════════════════
   INTERSECTION OBSERVER — pausa vídeos fora da viewport
════════════════════════════════════════════ */
if ('IntersectionObserver' in window) {
  var ioVideos = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (!entry.isIntersecting) entry.target.pause();
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('video').forEach(function(v) { ioVideos.observe(v); });
}

/* ════════════════════════════════════════════
   LIGHTBOX DE FOTOS
════════════════════════════════════════════ */
var lightbox    = document.getElementById('lightbox');
var lightboxImg = document.getElementById('lightbox-img');
var _lbFocus    = null;

function openImg(img) {
  _lbFocus = document.activeElement;
  lightboxImg.src = img.src;
  lightboxImg.alt = img.alt || 'Foto ampliada — São Pedro Thermas';
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeImg() {
  lightbox.classList.remove('open');
  lightboxImg.src = '';
  document.body.style.overflow = '';
