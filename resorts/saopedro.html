<script>

try {
  sessionStorage.setItem('hospedah_busca_ctx', JSON.stringify({ resort: 'saopedro' }));

/* ── Troca de abas ── */
function switchTab(tab) {
  document.querySelectorAll('.gallery-tab').forEach(function(btn) {
    btn.classList.remove('active');
    btn.setAttribute('aria-selected', 'false');
  });
  document.querySelectorAll('.gallery-panel').forEach(function(panel) {
    panel.classList.remove('active');
  });
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).setAttribute('aria-selected', 'true');
  document.getElementById('panel-' + tab).classList.add('active');

  // Pausa todos os vídeos ao sair da aba vídeos
  if (tab !== 'videos') {
    document.querySelectorAll('video').forEach(function(v) { v.pause(); });
  }
}

/* ── Lightbox ── */
function openImg(img) {
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = img.src;
}
function closeImg() {
  document.getElementById('lightbox').style.display = 'none';
}

document.getElementById('lightbox').style.cssText =
  'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out;';
