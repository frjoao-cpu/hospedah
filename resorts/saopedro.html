<script>
try {
  sessionStorage.setItem('hospedah_busca_ctx', JSON.stringify({ resort: 'saopedro' }));
} catch(e) {}

/* ── Modal Vídeo HD ── */
var videoModal = document.getElementById('video-modal');
var vmPlayer   = document.getElementById('vm-player');
var vmTitle    = document.getElementById('vm-title');
var vmClose    = document.getElementById('vm-close');
var _lastFocus = null;

function openVideoModal(src, title) {
  _lastFocus = document.activeElement;
  vmPlayer.src = src;
  vmTitle.textContent = title || '';
  videoModal.classList.add('open');
  document.body.style.overflow = 'hidden';
  vmPlayer.play().catch(function() {});
  vmClose.focus();
}
function closeVideoModal() {
  vmPlayer.pause();
  vmPlayer.removeAttribute('src');
  vmPlayer.load();
  vmTitle.textContent = '';
  videoModal.classList.remove('open');
  document.body.style.overflow = '';
  if (_lastFocus) _lastFocus.focus();
}
vmClose.addEventListener('click', closeVideoModal);
videoModal.addEventListener('click', function(e) {
  if (e.target === videoModal) closeVideoModal();
});
document.querySelectorAll('.play-hd-btn').forEach(function(btn) {
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    openVideoModal(btn.dataset.src, btn.dataset.title);
  });
});

/* ── Intersection Observer ── */
if ('IntersectionObserver' in window) {
  var ioVideos = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (!entry.isIntersecting) entry.target.pause();
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('video').forEach(function(v) { ioVideos.observe(v); });
}

/* ── Lightbox Fotos ── */
var lightbox    = document.getElementById('lightbox');
var lightboxImg = document.getElementById('lightbox-img');
var _lbFocus    = null;

function openImg(img) {
  _lbFocus = document.activeElement;
  lightboxImg.src = img.src;
  lightboxImg.alt = img.alt || 'Foto ampliada — São Pedro Thermas';
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeImg() {
  lightbox.classList.remove('open');
  lightboxImg.src = '';
  document.body.style.overflow = '';
  if (_lbFocus) _lbFocus.focus();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (videoModal.classList.contains('open')) closeVideoModal();
    if (lightbox.classList.contains('open')) closeImg();
  }
});
</script>
