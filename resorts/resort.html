<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Resort - HOSPEDAH</title>
<meta id="meta-description" name="description" content="Reserve seu resort com a HOSPEDAH.">
<link id="canonical" rel="canonical" href="https://hospedah.tur.br/resorts/resort.html">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" sizes="180x180">
<link rel="icon" type="image/svg+xml" href="/assets/logo-favicon.svg" sizes="any">
<meta name="theme-color" content="#D4AF37">
<!-- Open Graph (preenchido via JS) -->
<meta id="og-type"        property="og:type"        content="website">
<meta id="og-url"         property="og:url"         content="https://hospedah.tur.br/resorts/resort.html">
<meta id="og-site_name"   property="og:site_name"   content="HOSPEDAH">
<meta id="og-title"       property="og:title"       content="Resort | HOSPEDAH">
<meta id="og-description" property="og:description" content="">
<meta id="og-image"       property="og:image"       content="">
<meta id="og-locale"      property="og:locale"      content="pt_BR">
<link rel="stylesheet" href="../assets/mobile-first.css">
<link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<h1 id="resort-heading">Carregando…</h1>

<div id="gallery-container" class="gallery"></div>

<div id="lightbox" onclick="closeImg()">
<span class="close">✕</span>
<img id="lightbox-img" alt="Foto ampliada do resort">
</div>

<div id="resort-actions"></div>

<!-- SECURITY SEAL -->
<div class="security-seal" aria-label="Site seguro">🔒 <strong>Site Seguro</strong> &nbsp;·&nbsp; SSL Criptografado &nbsp;·&nbsp; 🛡️ Dados Protegidos</div>

<script>
(function () {
  'use strict';

  var WA_NUMBER = '5517982006382';
  var IG_URL    = 'https://www.instagram.com/julianasilvaoliveira.joao';

  // Wrappers utilitários mínimos (utils.js pode não estar carregado ainda)
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escAttr(s) {
    return encodeURIComponent(String(s));
  }

  // Lê ?resort=slug da URL
  function getSlug() {
    try {
      return new URLSearchParams(window.location.search).get('resort') || '';
    } catch (e) {
      return '';
    }
  }

  function showError(msg) {
    document.getElementById('resort-heading').textContent = msg;
  }

  function setMeta(id, attr, val) {
    var el = document.getElementById(id);
    if (el) el.setAttribute(attr, val);
  }

  function buildGallery(images, name) {
    var container = document.getElementById('gallery-container');
    if (!container) return;
    images.forEach(function (img, idx) {
      var src = img.url || ('https://i.imgur.com/' + img.id + '.' + img.ext);
      var imgEl = document.createElement('img');
      imgEl.src = src;
      imgEl.alt = escHtml(name) + ' ' + (idx + 1);
      imgEl.width = 800;
      imgEl.height = 600;
      imgEl.onclick = function () { openImg(imgEl); };
      if (idx === 0) {
        imgEl.loading = 'eager';
        imgEl.setAttribute('fetchpriority', 'high');
      } else {
        imgEl.loading = 'lazy';
      }
      container.appendChild(imgEl);
    });
  }

  function buildActions(resort) {
    var container = document.getElementById('resort-actions');
    if (!container) return;

    var waMsg = resort.whatsappMessage || ('Olá! Tenho interesse no ' + resort.name + '. Pode me enviar mais informações e valores?');
    var waHref = 'https://wa.me/' + WA_NUMBER + '?text=' + escAttr(waMsg);

    var waSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true" focusable="false"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>';
    var igSvg  = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" aria-hidden="true" focusable="false"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>';

    container.innerHTML =
      '<a href="' + waHref + '" class="whatsapp" target="_blank" rel="noopener noreferrer">' + waSvg + ' Solicitar orçamento</a>' +
      '<a href="' + IG_URL + '" class="instagram" target="_blank" rel="noopener noreferrer">' + igSvg + ' Instagram Oficial</a>' +
      '<a href="../chat.html?resort=' + escHtml(resort.slug) + '" class="chat-resort">🤖 Chat IA</a>';
  }

  function buildSchema(resort) {
    var schema = {
      '@context': 'https://schema.org',
      '@type': 'Resort',
      'name': resort.name,
      'description': resort.schemaDescription || resort.description,
      'url': 'https://hospedah.tur.br/resorts/resort.html?resort=' + resort.slug,
      'telephone': '+55' + WA_NUMBER,
      'address': {
        '@type': 'PostalAddress',
        'addressCountry': 'BR',
        'addressLocality': resort.city || '',
        'addressRegion': resort.state || ''
      },
      'sameAs': ['https://wa.me/' + WA_NUMBER]
    };
    var el = document.createElement('script');
    el.type = 'application/ld+json';
    el.textContent = JSON.stringify(schema);
    document.head.appendChild(el);
  }

  function renderResort(resort) {
    var slug   = resort.slug;
    var name   = resort.name;
    var emoji  = resort.emoji || '';
    var title  = resort.title || (name + ' - HOSPEDAH');
    var desc   = resort.description || '';
    var ogImg  = resort.ogImage || (resort.images && resort.images.length
      ? ('https://i.imgur.com/' + resort.images[0].id + '.' + resort.images[0].ext)
      : '');
    var canonUrl = 'https://hospedah.tur.br/resorts/resort.html?resort=' + slug;

    document.title = title;
    setMeta('meta-description', 'content', desc);
    setMeta('canonical', 'href', canonUrl);
    setMeta('og-url', 'content', canonUrl);
    setMeta('og-title', 'content', name + ' | HOSPEDAH');
    setMeta('og-description', 'content', desc);
    setMeta('og-image', 'content', ogImg);

    document.getElementById('resort-heading').textContent = emoji + (emoji ? ' ' : '') + name;

    buildGallery(resort.images || [], name);
    buildActions(resort);
    buildSchema(resort);

    try {
      sessionStorage.setItem('hospedah_busca_ctx', JSON.stringify({ resort: slug }));
    } catch (e) {}
  }

  function loadFromDataJson(slug) {
    fetch('/resorts/data.json')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var resorts = data && data.resorts ? data.resorts : [];
        var found = null;
        for (var i = 0; i < resorts.length; i++) {
          if (resorts[i].slug === slug) { found = resorts[i]; break; }
        }
        if (found) {
          renderResort(found);
        } else {
          showError('Resort não encontrado.');
        }
      })
      .catch(function () {
        showError('Erro ao carregar dados do resort.');
      });
  }

  var slug = getSlug();
  if (!slug) {
    showError('Nenhum resort especificado. Use ?resort=SLUG na URL.');
  } else {
    loadFromDataJson(slug);
  }
}());

function openImg(img) {
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = img.src;
}

function closeImg() {
  document.getElementById('lightbox').style.display = 'none';
}

document.getElementById('lightbox').style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:9999;';
</script>
<script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(function(){}); }</script>
<script src="/scripts/navbar.js" data-page="resort"></script>
</body>
</html>
