        <g clip-path="url(#globeClipP)">
          <path fill="#D4AF37" fill-opacity="0.82" d="M114 52 L121 48 L132 49 L140 54 L142 61 L139 67 L135 71 L134 77 L131 83 L128 91 L126 101 L123 113 L120 121 L116 122 L113 116 L114 107 L117 98 L115 89 L112 80 L111 70 L113 61 Z"/>
          <path fill="#D4AF37" fill-opacity="0.68" d="M109 51 L114 48 L118 50 L117 55 L112 57 L108 55 Z"/>
        </g>
