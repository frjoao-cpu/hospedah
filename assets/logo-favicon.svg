<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" preserveAspectRatio="xMidYMid meet" role="img" aria-label="HOSPEDAH favicon">
  <defs>
    <linearGradient id="bgFav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2f5e"/>
      <stop offset="100%" stop-color="#0B1C3D"/>
    </linearGradient>
    <linearGradient id="goldFav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E27A"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="60%" stop-color="#8B6914"/>
      <stop offset="80%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#F5E27A"/>
    </linearGradient>
    <filter id="favGlow" x="-6%" y="-30%" width="112%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#D4AF37" flood-opacity="0.55"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="340" height="80" rx="9" ry="9" fill="url(#bgFav)"/>
  <!-- Outer gold border -->
  <rect width="340" height="80" rx="9" ry="9" fill="none" stroke="#D4AF37" stroke-width="2.2"/>
  <!-- Inner accent border -->
  <rect x="5" y="5" width="330" height="70" rx="5.5" ry="5.5" fill="none" stroke="#D4AF37" stroke-width="0.7" opacity="0.38"/>
  <!-- Decorative gold rule lines -->
  <line x1="14" y1="14" x2="326" y2="14" stroke="#D4AF37" stroke-width="0.8" opacity="0.45"/>
  <line x1="14" y1="66" x2="326" y2="66" stroke="#D4AF37" stroke-width="0.8" opacity="0.45"/>
  <!-- HOSPEDAH text — Georgia serif bold, vertical gold gradient, matching main logo -->
  <text
    x="170"
    y="55"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="46"
    letter-spacing="8"
    text-anchor="middle"
    fill="url(#goldFav)"
    filter="url(#favGlow)">HOSPEDAH</text>
</svg>
