<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 64" preserveAspectRatio="xMidYMid meet" role="img" aria-label="HOSPEDAH favicon">
  <defs>
    <linearGradient id="bgFav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2f5e"/>
      <stop offset="100%" stop-color="#0B1C3D"/>
    </linearGradient>
    <linearGradient id="goldFav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E27A"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="60%" stop-color="#8B6914"/>
      <stop offset="80%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#F5E27A"/>
    </linearGradient>
    <filter id="favGlow" x="-8%" y="-25%" width="116%" height="150%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#D4AF37" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="160" height="64" rx="7" ry="7" fill="url(#bgFav)"/>
  <!-- Outer gold border -->
  <rect width="160" height="64" rx="7" ry="7" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <!-- Inner accent border -->
  <rect x="4" y="4" width="152" height="56" rx="4.5" ry="4.5" fill="none" stroke="#D4AF37" stroke-width="0.6" opacity="0.35"/>
  <!-- Decorative gold rule lines (matching main logo ornament style) -->
  <line x1="10" y1="11" x2="150" y2="11" stroke="#D4AF37" stroke-width="0.7" opacity="0.4"/>
  <line x1="10" y1="53" x2="150" y2="53" stroke="#D4AF37" stroke-width="0.7" opacity="0.4"/>
  <!-- HOSPEDAH text — Georgia serif bold, vertical gold gradient, matching main logo -->
  <text
    x="80"
    y="43"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="22"
    letter-spacing="3"
    text-anchor="middle"
    fill="url(#goldFav)"
    filter="url(#favGlow)">HOSPEDAH</text>
</svg>
