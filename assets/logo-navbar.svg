<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="navbarLogoTitle navbarLogoDesc">
  <title id="navbarLogoTitle">HOSPEDAH</title>
  <desc id="navbarLogoDesc">Logo horizontal da HOSPEDAH com H dourado com serifas, globo e texto dourado.</desc>
  <defs>
    <linearGradient id="goldMetalNav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="30%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#FFF1B0"/>
      <stop offset="72%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldTextNav" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF6CC"/>
      <stop offset="28%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#D4AF37"/>
      <stop offset="76%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldContinentNav" x1="5%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#EDD060"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
    <!-- Enhanced deep-ocean radial gradient (more stops, richer 3-D depth) -->
    <radialGradient id="navyDepthNav" cx="33%" cy="25%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#4060C8"/>
      <stop offset="15%"  stop-color="#2A4FA8"/>
      <stop offset="40%"  stop-color="#163580"/>
      <stop offset="68%"  stop-color="#0E2150"/>
      <stop offset="88%"  stop-color="#071430"/>
      <stop offset="100%" stop-color="#040C1A"/>
    </radialGradient>
    <!-- Specular highlight — sharp bright spot upper-left -->
    <radialGradient id="specularNavHi" cx="32%" cy="24%" r="38%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFFFFF"  stop-opacity="0.75"/>
      <stop offset="40%"  stop-color="#AACCFF"  stop-opacity="0.30"/>
      <stop offset="75%"  stop-color="#4466CC"  stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000"  stop-opacity="0"/>
    </radialGradient>
    <!-- Rim light — subtle blue glow on lower-right edge -->
    <radialGradient id="rimLightNav" cx="68%" cy="75%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2244AA"  stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000"  stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="softShadowNav" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#091429" flood-opacity="0.38"/>
    </filter>
    <!-- Atmosphere blur (applied to halo circle drawn behind sphere) -->
    <filter id="atmosphereBlurNav" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <!-- Globe clip: centre (29,20) r=14 (reduced from 16) -->
    <clipPath id="globeClipNav">
      <circle cx="29" cy="20" r="14"/>
    </clipPath>
  </defs>

  <!-- H rendered FIRST (behind globe) -->
  <g filter="url(#softShadowNav)">
    <rect x="2"   y="2.5" width="4" height="35" fill="url(#goldMetalNav)"/>
    <rect x="17"  y="2.5" width="4" height="35" fill="url(#goldMetalNav)"/>
    <rect x="2"   y="17"  width="19" height="6"  fill="url(#goldMetalNav)"/>
    <rect x="0.5" y="2.5" width="7"  height="1.5" fill="url(#goldMetalNav)"/>
    <rect x="15.5" y="2.5" width="7" height="1.5" fill="url(#goldMetalNav)"/>
    <rect x="0.5" y="36"  width="7"  height="1.5" fill="url(#goldMetalNav)"/>
    <rect x="15.5" y="36" width="7"  height="1.5" fill="url(#goldMetalNav)"/>
    <rect x="2"   y="2.5" width="4"  height="2"   fill="#FFF1B0" opacity="0.40"/>
    <rect x="17"  y="2.5" width="4"  height="2"   fill="#FFF1B0" opacity="0.40"/>
  </g>

  <!-- Atmosphere halo (r=16 = globe r=14 + 2px glow offset, blurred, drawn before globe so it sits behind) -->
  <circle cx="29" cy="20" r="16" fill="none" stroke="#4488FF" stroke-width="3.5" opacity="0.25" filter="url(#atmosphereBlurNav)"/>

  <!-- Globe rendered SECOND (in front of H) — centre (29,20) r=14 -->
  <g filter="url(#softShadowNav)">
    <!-- 3-D sphere base -->
    <circle cx="29" cy="20" r="14" fill="url(#navyDepthNav)"/>

    <!-- Latitude/longitude grid (scaled for r=14) -->
    <g clip-path="url(#globeClipNav)" stroke="url(#goldMetalNav)" fill="none">
      <!-- Longitude meridians -->
      <ellipse cx="29" cy="20" rx="3.5" ry="14" stroke-width="0.5" opacity="0.35"/>
      <ellipse cx="29" cy="20" rx="8"   ry="14" stroke-width="0.5" opacity="0.35"/>
      <ellipse cx="29" cy="20" rx="12"  ry="14" stroke-width="0.5" opacity="0.30"/>
      <!-- Latitude parallels -->
      <ellipse cx="29" cy="20" rx="14"  ry="4"  stroke-width="0.5" opacity="0.35"/>
      <ellipse cx="29" cy="20" rx="13"  ry="7"  stroke-width="0.5" opacity="0.35"/>
      <ellipse cx="29" cy="20" rx="11"  ry="11" stroke-width="0.5" opacity="0.30"/>
    </g>

    <!-- Equator band at y=20 — aligns with H crossbar -->
    <line x1="15" y1="20" x2="43" y2="20" stroke="url(#goldMetalNav)" stroke-width="2.5" clip-path="url(#globeClipNav)"/>

    <!-- Continents (paths rescaled to r=14, centre (29,20)) -->
    <g clip-path="url(#globeClipNav)" fill="url(#goldContinentNav)">
      <!-- North America -->
      <path d="M19,8 L22,7 L25,8 L26,10 L26,13 L26,16 L25,17 L23,18 L20,17 L19,17 L19,14 L19,10 Z"/>
      <!-- Florida -->
      <path d="M23,18 L24,20 L23,22 L22,22 L22,20 L22,18 Z"/>
      <!-- South America -->
      <path d="M20,23 L23,22 L26,23 L26,25 L26,30 L25,33 L22,33 L20,32 L20,29 L20,25 Z"/>
      <!-- Europe -->
      <path d="M32,8 L34,7 L37,8 L37,11 L35,12 L33,12 L32,10 Z"/>
      <!-- Africa -->
      <path d="M33,14 L35,13 L37,15 L38,18 L38,23 L36,25 L33,26 L32,25 L30,24 L30,20 L31,17 Z"/>
    </g>

    <!-- Rim lighting (lower-right blue glow) -->
    <circle cx="29" cy="20" r="14" fill="url(#rimLightNav)"/>

    <!-- Specular highlight (upper-left bright spot) -->
    <circle cx="29" cy="20" r="14" fill="url(#specularNavHi)"/>

    <!-- Globe border -->
    <circle cx="29" cy="20" r="14" fill="none" stroke="url(#goldMetalNav)" stroke-width="1.2"/>
  </g>

  <!-- HOSPEDAH text -->
  <text x="48" y="28" fill="url(#goldTextNav)" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" letter-spacing="1">HOSPEDAH</text>
</svg>
