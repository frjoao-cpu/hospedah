<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="navbarLogoTitle navbarLogoDesc">
  <title id="navbarLogoTitle">HOSPEDAH</title>
  <desc id="navbarLogoDesc">Logo horizontal da HOSPEDAH com globo e texto dourado.</desc>
  <defs>
    <linearGradient id="goldMetalNav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="45%" stop-color="#F2D06B"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="navyDepthNav" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#1E3870"/>
      <stop offset="55%" stop-color="#0E2150"/>
      <stop offset="100%" stop-color="#071020"/>
    </linearGradient>
    <filter id="softShadowNav" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#091429" flood-opacity="0.38"/>
    </filter>
    <!-- Clip to globe circle (local coords: center 18,18 r=15) -->
    <clipPath id="globeClipNav">
      <circle cx="18" cy="18" r="15"/>
    </clipPath>
  </defs>

  <!-- H legs first (behind globe) -->
  <g filter="url(#softShadowNav)">
    <rect x="3" y="3" width="6" height="34" fill="url(#goldMetalNav)"/>
    <rect x="21" y="3" width="6" height="34" fill="url(#goldMetalNav)"/>
  </g>

  <!-- Globe (on top of H legs) -->
  <g transform="translate(2 2)" filter="url(#softShadowNav)">
    <circle cx="18" cy="18" r="15" fill="url(#navyDepthNav)" stroke="url(#goldMetalNav)" stroke-width="1.2"/>
    <!-- Grid lines -->
    <g stroke="url(#goldMetalNav)" fill="none">
      <ellipse cx="18" cy="18" rx="10" ry="5" stroke-width="0.6" opacity="0.5"/>
      <ellipse cx="18" cy="18" rx="10" ry="10" stroke-width="0.6" opacity="0.45"/>
      <ellipse cx="18" cy="18" rx="6" ry="15" stroke-width="0.6" opacity="0.5"/>
      <line x1="18" y1="3" x2="18" y2="33" stroke-width="0.6" opacity="0.5"/>
      <line x1="4" y1="13" x2="32" y2="13" stroke-width="0.5" opacity="0.4"/>
      <line x1="4" y1="23" x2="32" y2="23" stroke-width="0.5" opacity="0.4"/>
    </g>
    <!-- Equator as bold crossbar -->
    <line x1="3" y1="18" x2="33" y2="18" stroke="url(#goldMetalNav)" stroke-width="2.5" clip-path="url(#globeClipNav)"/>
    <!-- Continents -->
    <path d="M10 14l3-2 4 1 1 3-2 3-4 1-3-2 1-4z" fill="#EAC763"/>
    <path d="M12 21l2 0 3 2 0 3-2 4-3 1-2-2 2-6z" fill="#EAC763"/>
    <path d="M20 13l3-1 2 2-1 3-2 1-3 0 1-3z" fill="#EAC763"/>
    <path d="M21 19l3 0 2 2 0 3-2 4-3 0-1-2 1-5z" fill="#EAC763"/>
    <!-- Building silhouette -->
    <g fill="url(#goldMetalNav)">
      <rect x="13" y="19" width="10" height="5"/>
      <rect x="11" y="20" width="4" height="4"/>
      <rect x="23" y="20" width="4" height="4"/>
      <rect x="15" y="15" width="6" height="5"/>
      <polygon points="14,15 22,15 18,11"/>
      <rect x="14" y="20" width="2" height="3" fill="#091429" rx="0.3"/>
      <rect x="17" y="20" width="2" height="3" fill="#091429" rx="0.3"/>
      <rect x="20" y="20" width="2" height="3" fill="#091429" rx="0.3"/>
    </g>
    <!-- Globe border -->
    <circle cx="18" cy="18" r="15" fill="none" stroke="url(#goldMetalNav)" stroke-width="1.5"/>
  </g>

  <text x="40" y="27" fill="url(#goldMetalNav)" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700" letter-spacing="1">HOSPEDAH</text>
</svg>
