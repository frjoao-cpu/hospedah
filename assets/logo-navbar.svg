<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="navbarLogoTitle navbarLogoDesc">
  <title id="navbarLogoTitle">HOSPEDAH</title>
  <desc id="navbarLogoDesc">Logo horizontal da HOSPEDAH com globo e texto dourado.</desc>
  <defs>
    <linearGradient id="goldMetalNav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="45%" stop-color="#F2D06B"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <!-- 3D sphere: radial gradient for depth -->
    <radialGradient id="navyDepthNav" cx="36%" cy="28%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2A4FA8"/>
      <stop offset="30%" stop-color="#163580"/>
      <stop offset="65%" stop-color="#0E2150"/>
      <stop offset="100%" stop-color="#040C1A"/>
    </radialGradient>
    <!-- Specular highlight -->
    <radialGradient id="sphereGlowNav" cx="33%" cy="22%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6888E0" stop-opacity="0.60"/>
      <stop offset="55%" stop-color="#3058B8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1E3870" stop-opacity="0"/>
    </radialGradient>
    <!-- Continent fill -->
    <linearGradient id="goldContinentNav" x1="5%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#EDD060"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
    <filter id="softShadowNav" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#091429" flood-opacity="0.38"/>
    </filter>
    <!-- Clip to globe circle (local coords: center 18,18 r=15) -->
    <clipPath id="globeClipNav">
      <circle cx="18" cy="18" r="15"/>
    </clipPath>
  </defs>

  <!-- H legs first (behind globe) -->
  <g filter="url(#softShadowNav)">
    <rect x="3" y="3" width="6" height="34" fill="url(#goldMetalNav)"/>
    <rect x="21" y="3" width="6" height="34" fill="url(#goldMetalNav)"/>
  </g>

  <!-- Globe (on top of H legs) -->
  <g transform="translate(2 2)" filter="url(#softShadowNav)">
    <!-- 3D sphere base -->
    <circle cx="18" cy="18" r="15" fill="url(#navyDepthNav)"/>
    <!-- Grid lines (clipped) -->
    <g clip-path="url(#globeClipNav)" stroke="url(#goldMetalNav)" fill="none">
      <ellipse cx="18" cy="18" rx="6"  ry="15" stroke-width="0.55" opacity="0.40"/>
      <ellipse cx="18" cy="18" rx="12" ry="15" stroke-width="0.55" opacity="0.38"/>
      <ellipse cx="18" cy="18" rx="15" ry="6"  stroke-width="0.55" opacity="0.40"/>
      <ellipse cx="18" cy="18" rx="14" ry="10" stroke-width="0.55" opacity="0.38"/>
    </g>
    <!-- Equator as bold crossbar -->
    <line x1="3" y1="18" x2="33" y2="18" stroke="url(#goldMetalNav)" stroke-width="2.5" clip-path="url(#globeClipNav)"/>
    <!-- Continents (improved) -->
    <g clip-path="url(#globeClipNav)" fill="url(#goldContinentNav)">
      <!-- North America -->
      <path d="M9 8 L12 7 L15 8 L16 11 L16 14 L14 16 L12 17 L9 16 L7 13 L7 10 Z"/>
      <!-- Florida -->
      <path d="M13 17 L14 19 L13 21 L12 21 L12 19 Z"/>
      <!-- South America -->
      <path d="M11 21 L14 20 L16 22 L16 26 L14 30 L11 31 L9 29 L9 25 Z"/>
      <!-- Europe -->
      <path d="M21 8 L24 7 L26 9 L26 12 L24 13 L22 12 L21 10 Z"/>
      <!-- Africa -->
      <path d="M22 14 L25 13 L27 15 L27 20 L26 24 L23 26 L21 25 L20 22 L20 17 Z"/>
    </g>
    <!-- Resort building (clipped, centred on equator) -->
    <g clip-path="url(#globeClipNav)" fill="url(#goldMetalNav)">
      <!-- Platform -->
      <rect x="8" y="24" width="20" height="1" rx="0.2"/>
      <!-- Left wing -->
      <rect x="9" y="19" width="3.5" height="5"/>
      <rect x="9.5" y="19.5" width="1" height="1.8" fill="#060E20" rx="0.2"/>
      <rect x="11.5" y="19.5" width="1" height="1.8" fill="#060E20" rx="0.2"/>
      <!-- Right wing -->
      <rect x="23.5" y="19" width="3.5" height="5"/>
      <rect x="24" y="19.5" width="1" height="1.8" fill="#060E20" rx="0.2"/>
      <rect x="26" y="19.5" width="1" height="1.8" fill="#060E20" rx="0.2"/>
      <!-- Main facade -->
      <rect x="12" y="13" width="12" height="11"/>
      <!-- Upper windows -->
      <rect x="13"   y="14" width="2" height="3" fill="#060E20" rx="0.3"/>
      <rect x="16.5" y="14" width="2" height="3" fill="#060E20" rx="0.3"/>
      <rect x="20"   y="14" width="2" height="3" fill="#060E20" rx="0.3"/>
      <!-- Ground arches (2 arches) -->
      <path d="M13 24 L13 20.5 A1.5 1.5 0 0 0 16 20.5 L16 24 Z" fill="#060E20"/>
      <path d="M18 24 L18 20.5 A1.5 1.5 0 0 0 21 20.5 L21 24 Z" fill="#060E20"/>
      <!-- Tower -->
      <rect x="15" y="8" width="6" height="6"/>
      <!-- Tower windows -->
      <rect x="15.5" y="9" width="1.8" height="2.5" fill="#060E20" rx="0.3"/>
      <rect x="18.5" y="9" width="1.8" height="2.5" fill="#060E20" rx="0.3"/>
      <!-- Pediment -->
      <polygon points="13.5,8 22.5,8 18,4"/>
      <polyline points="13.5,8 18,4 22.5,8" fill="none" stroke="#FFF1B0" stroke-width="0.4" opacity="0.50"/>
    </g>
    <!-- Specular highlight -->
    <circle cx="18" cy="18" r="15" fill="url(#sphereGlowNav)"/>
    <!-- Globe border -->
    <circle cx="18" cy="18" r="15" fill="none" stroke="url(#goldMetalNav)" stroke-width="1.5"/>
  </g>

  <text x="40" y="27" fill="url(#goldMetalNav)" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700" letter-spacing="1">HOSPEDAH</text>
</svg>
