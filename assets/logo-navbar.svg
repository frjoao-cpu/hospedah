<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="navbarLogoTitle navbarLogoDesc">
  <title id="navbarLogoTitle">HOSPEDAH</title>
  <desc id="navbarLogoDesc">Logo horizontal da HOSPEDAH com H dourado com serifas, globo e texto dourado.</desc>
  <defs>
    <linearGradient id="goldMetalNav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="30%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#FFF1B0"/>
      <stop offset="72%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldTextNav" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF6CC"/>
      <stop offset="28%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#D4AF37"/>
      <stop offset="76%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldContinentNav" x1="5%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#EDD060"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
    <radialGradient id="navyDepthNav" cx="36%" cy="28%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2A4FA8"/>
      <stop offset="30%" stop-color="#163580"/>
      <stop offset="65%" stop-color="#0E2150"/>
      <stop offset="100%" stop-color="#040C1A"/>
    </radialGradient>
    <radialGradient id="sphereGlowNav" cx="33%" cy="22%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6888E0" stop-opacity="0.60"/>
      <stop offset="55%" stop-color="#3058B8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1E3870" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadowNav" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#091429" flood-opacity="0.38"/>
    </filter>
    <!-- Globe clip: centre (31,20) r=16 -->
    <clipPath id="globeClipNav">
      <circle cx="31" cy="20" r="16"/>
    </clipPath>
  </defs>

  <!-- H rendered FIRST (behind globe) -->
  <g filter="url(#softShadowNav)">
    <!-- Left vertical leg -->
    <rect x="2"  y="2.5" width="4" height="35" fill="url(#goldMetalNav)"/>
    <!-- Right vertical leg -->
    <rect x="17" y="2.5" width="4" height="35" fill="url(#goldMetalNav)"/>
    <!-- Crossbar (aligns with globe equator at y=20) -->
    <rect x="2" y="17" width="19" height="6" fill="url(#goldMetalNav)"/>
    <!-- Top serifs -->
    <rect x="0.5" y="2.5" width="7" height="1.5" fill="url(#goldMetalNav)"/>
    <rect x="15.5" y="2.5" width="7" height="1.5" fill="url(#goldMetalNav)"/>
    <!-- Bottom serifs -->
    <rect x="0.5" y="36" width="7" height="1.5" fill="url(#goldMetalNav)"/>
    <rect x="15.5" y="36" width="7" height="1.5" fill="url(#goldMetalNav)"/>
    <!-- Highlights -->
    <rect x="2"  y="2.5" width="4" height="2" fill="#FFF1B0" opacity="0.40"/>
    <rect x="17" y="2.5" width="4" height="2" fill="#FFF1B0" opacity="0.40"/>
  </g>

  <!-- Globe rendered SECOND (in front of H) — centre (31,20) r=16 -->
  <g filter="url(#softShadowNav)">
    <!-- 3D sphere base -->
    <circle cx="31" cy="20" r="16" fill="url(#navyDepthNav)"/>

    <!-- Latitude/longitude grid -->
    <g clip-path="url(#globeClipNav)" stroke="url(#goldMetalNav)" fill="none">
      <ellipse cx="31" cy="20" rx="4"  ry="16" stroke-width="0.5" opacity="0.35"/>
      <ellipse cx="31" cy="20" rx="9"  ry="16" stroke-width="0.5" opacity="0.35"/>
      <ellipse cx="31" cy="20" rx="14" ry="16" stroke-width="0.5" opacity="0.30"/>
      <ellipse cx="31" cy="20" rx="16" ry="4"  stroke-width="0.5" opacity="0.35"/>
      <ellipse cx="31" cy="20" rx="15" ry="8"  stroke-width="0.5" opacity="0.35"/>
      <ellipse cx="31" cy="20" rx="13" ry="12" stroke-width="0.5" opacity="0.30"/>
    </g>

    <!-- Equator band at y=20 (matches H crossbar) -->
    <line x1="15" y1="20" x2="47" y2="20" stroke="url(#goldMetalNav)" stroke-width="3" clip-path="url(#globeClipNav)"/>

    <!-- Continents (scaled from main logo) -->
    <g clip-path="url(#globeClipNav)" fill="url(#goldContinentNav)">
      <!-- North America -->
      <path d="M20 6 L23 5 L26 6 L28 9 L28 12 L28 15 L26 17 L24 18 L21 17 L20 16 L19 13 L19 9 Z"/>
      <!-- Florida -->
      <path d="M25 18 L26 20 L25 22 L24 22 L24 20 L24 18 Z"/>
      <!-- South America -->
      <path d="M22 23 L25 22 L28 23 L28 26 L28 31 L27 34 L24 34 L22 33 L21 30 L21 26 Z"/>
      <!-- Europe -->
      <path d="M34 6 L37 5 L40 7 L40 10 L38 11 L36 11 L34 9 Z"/>
      <!-- Africa -->
      <path d="M35 13 L38 12 L40 14 L41 18 L41 23 L39 26 L36 27 L34 26 L32 24 L32 20 L33 16 Z"/>
    </g>

    <!-- Resort building (simplified for small scale) -->
    <g clip-path="url(#globeClipNav)" fill="url(#goldMetalNav)">
      <!-- Platform at equator -->
      <rect x="22" y="19" width="18" height="2" rx="0.3"/>
      <!-- Left wing -->
      <rect x="22" y="15" width="3" height="5"/>
      <!-- Right wing -->
      <rect x="37" y="15" width="3" height="5"/>
      <!-- Main facade -->
      <rect x="25" y="11" width="10" height="9"/>
      <!-- Facade windows -->
      <rect x="26.5" y="12" width="2" height="3" fill="#060E20" rx="0.3"/>
      <rect x="30.5" y="12" width="2" height="3" fill="#060E20" rx="0.3"/>
      <rect x="34"   y="12" width="2" height="3" fill="#060E20" rx="0.3"/>
      <!-- Ground floor arches (2) -->
      <path d="M26 20 L26 15.5 A2 2 0 0 1 30 15.5 L30 20 Z" fill="#060E20"/>
      <path d="M31 20 L31 15.5 A2 2 0 0 1 35 15.5 L35 20 Z" fill="#060E20"/>
      <!-- Tower -->
      <rect x="27" y="7" width="6" height="5"/>
      <!-- Tower windows -->
      <rect x="27.5" y="8"  width="1.5" height="2.5" fill="#060E20" rx="0.3"/>
      <rect x="31"   y="8"  width="1.5" height="2.5" fill="#060E20" rx="0.3"/>
      <!-- Pediment -->
      <polygon points="25,7 35,7 30,4"/>
      <polyline points="25,7 30,4 35,7" fill="none" stroke="#FFF1B0" stroke-width="0.4" opacity="0.50"/>
    </g>

    <!-- Specular highlight -->
    <circle cx="31" cy="20" r="16" fill="url(#sphereGlowNav)"/>
    <!-- Globe border -->
    <circle cx="31" cy="20" r="16" fill="none" stroke="url(#goldMetalNav)" stroke-width="1.5"/>
  </g>

  <!-- HOSPEDAH text -->
  <text x="51" y="28" fill="url(#goldTextNav)" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" letter-spacing="1">HOSPEDAH</text>
</svg>
