<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="320" height="80" rx="8" fill="#001F3F"/>
  <!-- Gold accent line -->
  <rect x="12" y="68" width="296" height="3" rx="1.5" fill="url(#goldGrad)"/>
  <!-- House icon -->
  <polygon points="22,52 22,32 32,22 42,32 42,52" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="27" y="40" width="10" height="12" rx="1" fill="#D4AF37"/>
  <!-- HOSPEDAH text -->
  <text x="52" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3" fill="url(#goldGrad)">HOSPEDAH</text>
  <!-- Tagline -->
  <text x="52" y="64" font-family="'Segoe UI', Arial, sans-serif" font-size="9" letter-spacing="2" fill="#AAAAAA">RESORTS &amp; PRAIAS PREMIUM</text>
</svg>
