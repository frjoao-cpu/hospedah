<svg xmlns="http://www.w3.org/2000/svg" width="580" height="160" viewBox="0 0 580 160" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">HOSPEDAH — Resorts e Experiências Exclusivas</title>
  <desc id="logoDesc">Logo com H dourado com serifas, globo azul com continentes dourados, resort interno, nome HOSPEDAH em dourado e tagline.</desc>
  <defs>
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="30%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#FFF1B0"/>
      <stop offset="72%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF6CC"/>
      <stop offset="28%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#D4AF37"/>
      <stop offset="76%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F7DF8A"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="goldContinent" x1="5%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#EDD060"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
    <radialGradient id="navyDepth" cx="36%" cy="28%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2A4FA8"/>
      <stop offset="30%" stop-color="#163580"/>
      <stop offset="65%" stop-color="#0E2150"/>
      <stop offset="100%" stop-color="#040C1A"/>
    </radialGradient>
    <radialGradient id="sphereGlow" cx="33%" cy="22%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6888E0" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#3058B8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1E3870" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#091429" flood-opacity="0.38"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.50"/>
    </filter>
    <!-- Globe clip: centre (112,76) r=62 -->
    <clipPath id="globeClip">
      <circle cx="112" cy="76" r="62"/>
    </clipPath>
  </defs>

  <!-- H rendered FIRST (behind globe) -->
  <g filter="url(#softShadow)">
    <!-- Left vertical leg -->
    <rect x="7" y="10" width="15" height="132" fill="url(#goldMetal)"/>
    <!-- Right vertical leg -->
    <rect x="65" y="10" width="15" height="132" fill="url(#goldMetal)"/>
    <!-- Crossbar (centre y=76, height=12 — aligns with globe equator) -->
    <rect x="7" y="70" width="73" height="12" fill="url(#goldMetal)"/>
    <!-- Top serifs -->
    <rect x="2" y="10" width="25" height="5"  fill="url(#goldMetal)"/>
    <rect x="60" y="10" width="25" height="5" fill="url(#goldMetal)"/>
    <!-- Bottom serifs -->
    <rect x="2" y="137" width="25" height="5"  fill="url(#goldMetal)"/>
    <rect x="60" y="137" width="25" height="5" fill="url(#goldMetal)"/>
    <!-- Edge highlights -->
    <rect x="7"  y="10" width="15" height="5" fill="#FFF1B0" opacity="0.40"/>
    <rect x="65" y="10" width="15" height="5" fill="#FFF1B0" opacity="0.40"/>
  </g>

  <!-- Globe rendered SECOND (in front of H) — centre (112,76) r=62 -->
  <g filter="url(#softShadow)">
    <!-- 3D sphere base -->
    <circle cx="112" cy="76" r="62" fill="url(#navyDepth)"/>

    <!-- Latitude/longitude grid -->
    <g clip-path="url(#globeClip)" stroke="url(#goldMetal)" fill="none">
      <ellipse cx="112" cy="76" rx="15" ry="62" stroke-width="0.6" opacity="0.35"/>
      <ellipse cx="112" cy="76" rx="34" ry="62" stroke-width="0.6" opacity="0.35"/>
      <ellipse cx="112" cy="76" rx="52" ry="62" stroke-width="0.6" opacity="0.30"/>
      <ellipse cx="112" cy="76" rx="62" ry="15" stroke-width="0.6" opacity="0.35"/>
      <ellipse cx="112" cy="76" rx="59" ry="31" stroke-width="0.6" opacity="0.35"/>
      <ellipse cx="112" cy="76" rx="50" ry="48" stroke-width="0.6" opacity="0.30"/>
    </g>

    <!-- Equator band (y=76, matches H crossbar) -->
    <line x1="50" y1="76" x2="174" y2="76" stroke="url(#goldMetal)" stroke-width="12" clip-path="url(#globeClip)"/>

    <!-- Continents -->
    <g clip-path="url(#globeClip)" fill="url(#goldContinent)">
      <!-- North America -->
      <path d="M70 24 L82 20 L94 24 L100 34 L102 46 L100 58 L94 64 L85 67 L76 66 L69 59 L66 48 L68 35 Z"/>
      <!-- Florida -->
      <path d="M88 67 L92 76 L90 82 L87 82 L86 75 L87 67 Z"/>
      <!-- South America -->
      <path d="M78 87 L89 82 L99 87 L102 100 L101 116 L95 127 L86 130 L78 126 L75 114 L74 100 Z"/>
      <!-- Caribbean -->
      <path d="M92 76 L98 73 L100 78 L94 80 Z" opacity="0.65"/>
      <!-- Europe -->
      <path d="M124 24 L136 20 L145 26 L146 37 L139 43 L130 42 L123 36 Z"/>
      <!-- Africa -->
      <path d="M125 50 L138 46 L147 53 L150 70 L148 86 L141 98 L132 103 L123 99 L117 90 L115 75 L118 59 Z"/>
      <!-- Madagascar -->
      <path d="M150 72 L154 67 L157 74 L155 85 L152 85 L149 78 Z" opacity="0.75"/>
    </g>

    <!-- Resort building — classical facade centred on equator -->
    <g clip-path="url(#globeClip)" fill="url(#goldMetal)">
      <!-- Platform at equator -->
      <rect x="80" y="73" width="64" height="5" rx="0.5"/>
      <!-- Left wing -->
      <rect x="82" y="58" width="12" height="16"/>
      <rect x="83.5" y="60"  width="3.5" height="5" fill="#060E20" rx="0.4"/>
      <rect x="89"   y="60"  width="3.5" height="5" fill="#060E20" rx="0.4"/>
      <!-- Right wing -->
      <rect x="130" y="58" width="12" height="16"/>
      <rect x="131.5" y="60" width="3.5" height="5" fill="#060E20" rx="0.4"/>
      <rect x="137"   y="60" width="3.5" height="5" fill="#060E20" rx="0.4"/>
      <!-- Main facade -->
      <rect x="93" y="40" width="38" height="34"/>
      <!-- Upper-floor windows (5) -->
      <rect x="95.5" y="43" width="5" height="7" fill="#060E20" rx="0.4"/>
      <rect x="103"  y="43" width="5" height="7" fill="#060E20" rx="0.4"/>
      <rect x="110.5" y="43" width="4" height="7" fill="#060E20" rx="0.4"/>
      <rect x="117"  y="43" width="5" height="7" fill="#060E20" rx="0.4"/>
      <rect x="124"  y="43" width="5" height="7" fill="#060E20" rx="0.4"/>
      <!-- Mid cornice -->
      <rect x="93" y="54" width="38" height="1.5" fill="#FFF1B0" opacity="0.35"/>
      <!-- Ground-floor arched openings (4) -->
      <path d="M95.5 74 L95.5 62 A3.5 3.5 0 0 1 102.5 62 L102.5 74 Z" fill="#060E20"/>
      <path d="M104.5 74 L104.5 62 A3.5 3.5 0 0 1 111.5 62 L111.5 74 Z" fill="#060E20"/>
      <path d="M113.5 74 L113.5 62 A3.5 3.5 0 0 1 120.5 62 L120.5 74 Z" fill="#060E20"/>
      <path d="M122.5 74 L122.5 62 A3.5 3.5 0 0 1 129.5 62 L129.5 74 Z" fill="#060E20"/>
      <!-- Ground-floor string course -->
      <rect x="93" y="60.5" width="38" height="1.5" fill="#FFF1B0" opacity="0.30"/>
      <!-- Pilaster edges -->
      <rect x="94.5" y="40" width="1.5" height="34" fill="#FFF1B0" opacity="0.20"/>
      <rect x="129"  y="40" width="1.5" height="34" fill="#FFF1B0" opacity="0.20"/>
      <!-- Central tower -->
      <rect x="102" y="25" width="20" height="16"/>
      <!-- Tower cornice -->
      <rect x="102" y="25" width="20" height="2" fill="#FFF1B0" opacity="0.45"/>
      <!-- Tower windows -->
      <rect x="104"  y="28" width="5" height="8" fill="#060E20" rx="0.5"/>
      <rect x="115"  y="28" width="5" height="8" fill="#060E20" rx="0.5"/>
      <!-- Pediment -->
      <polygon points="98,25 126,25 112,14"/>
      <polyline points="98,25 112,14 126,25" fill="none" stroke="#FFF1B0" stroke-width="0.9" opacity="0.50"/>
    </g>

    <!-- Specular highlight -->
    <circle cx="112" cy="76" r="62" fill="url(#sphereGlow)"/>
    <!-- Globe border ring -->
    <circle cx="112" cy="76" r="62" fill="none" stroke="url(#goldMetal)" stroke-width="3"/>
  </g>

  <!-- HOSPEDAH text (shifted right to clear the larger icon) -->
  <text x="190" y="75" fill="url(#goldText)" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" letter-spacing="2" filter="url(#textShadow)" paint-order="stroke fill" stroke="#5a3a00" stroke-width="0.6" stroke-linejoin="round">HOSPEDAH</text>

  <!-- Tagline — centred under HOSPEDAH with symmetric dashes -->
  <g fill="url(#goldMetal)" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" text-anchor="middle">
    <text x="345" y="110">Sua experiência começa aqui.</text>
    <text x="198" y="110">—</text>
    <text x="492" y="110">—</text>
  </g>

</svg>
