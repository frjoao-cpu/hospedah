<svg xmlns="http://www.w3.org/2000/svg" width="580" height="185" viewBox="0 0 580 185" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">HOSPEDAH — Resorts e Experiências Exclusivas</title>
  <desc id="logoDesc">Logo com H dourado com serifas, globo azul com continentes dourados, resort interno, nome HOSPEDAH em dourado e tagline.</desc>
  <defs>
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="30%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#FFF1B0"/>
      <stop offset="72%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF6CC"/>
      <stop offset="28%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#D4AF37"/>
      <stop offset="76%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F7DF8A"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="goldContinent" x1="5%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#EDD060"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
    <radialGradient id="navyDepth" cx="36%" cy="28%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2A4FA8"/>
      <stop offset="30%" stop-color="#163580"/>
      <stop offset="65%" stop-color="#0E2150"/>
      <stop offset="100%" stop-color="#040C1A"/>
    </radialGradient>
    <radialGradient id="sphereGlow" cx="33%" cy="22%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6888E0" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#3058B8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1E3870" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#091429" flood-opacity="0.38"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.50"/>
    </filter>
    <!-- Globe clip: centre (112,87) r=62 -->
    <clipPath id="globeClip">
      <circle cx="112" cy="87" r="62"/>
    </clipPath>
  </defs>

  <!-- H rendered FIRST (behind globe) -->
  <g filter="url(#softShadow)">
    <!-- Left vertical leg -->
    <rect x="7" y="15" width="15" height="144" fill="url(#goldMetal)"/>
    <!-- Right vertical leg -->
    <rect x="65" y="15" width="15" height="144" fill="url(#goldMetal)"/>
    <!-- Crossbar (centre y=87, height=12 — aligns with globe equator) -->
    <rect x="7" y="81" width="73" height="12" fill="url(#goldMetal)"/>
    <!-- Top serifs — tapered bracket shape -->
    <polygon points="2,15 27,15 22,23 7,23" fill="url(#goldMetal)"/>
    <polygon points="60,15 85,15 80,23 65,23" fill="url(#goldMetal)"/>
    <!-- Bottom serifs — tapered bracket shape -->
    <polygon points="2,159 27,159 22,151 7,151" fill="url(#goldMetal)"/>
    <polygon points="60,159 85,159 80,151 65,151" fill="url(#goldMetal)"/>
    <!-- Edge highlights -->
    <rect x="7"  y="15" width="15" height="5" fill="#FFF1B0" opacity="0.40"/>
    <rect x="65" y="15" width="15" height="5" fill="#FFF1B0" opacity="0.40"/>
  </g>

  <!-- Globe rendered SECOND (in front of H) — centre (112,87) r=62 -->
  <g filter="url(#softShadow)">
    <!-- 3D sphere base -->
    <circle cx="112" cy="87" r="62" fill="url(#navyDepth)"/>

    <!-- Latitude/longitude grid -->
    <g clip-path="url(#globeClip)" stroke="url(#goldMetal)" fill="none">
      <ellipse cx="112" cy="87" rx="15" ry="62" stroke-width="0.6" opacity="0.35"/>
      <ellipse cx="112" cy="87" rx="34" ry="62" stroke-width="0.6" opacity="0.35"/>
      <ellipse cx="112" cy="87" rx="52" ry="62" stroke-width="0.6" opacity="0.30"/>
      <ellipse cx="112" cy="87" rx="62" ry="15" stroke-width="0.6" opacity="0.35"/>
      <ellipse cx="112" cy="87" rx="59" ry="31" stroke-width="0.6" opacity="0.35"/>
      <ellipse cx="112" cy="87" rx="50" ry="48" stroke-width="0.6" opacity="0.30"/>
    </g>

    <!-- Equator band (y=87, matches H crossbar) -->
    <line x1="50" y1="87" x2="174" y2="87" stroke="url(#goldMetal)" stroke-width="12" clip-path="url(#globeClip)"/>

    <!-- Continents (all y-coords shifted +11 from original to follow new globe centre) -->
    <g clip-path="url(#globeClip)" fill="url(#goldContinent)">
      <!-- North America -->
      <path d="M70 35 L82 31 L94 35 L100 45 L102 57 L100 69 L94 75 L85 78 L76 77 L69 70 L66 59 L68 46 Z"/>
      <!-- Florida -->
      <path d="M88 78 L92 87 L90 93 L87 93 L86 86 L87 78 Z"/>
      <!-- South America -->
      <path d="M78 98 L89 93 L99 98 L102 111 L101 127 L95 138 L86 141 L78 137 L75 125 L74 111 Z"/>
      <!-- Caribbean -->
      <path d="M92 87 L98 84 L100 89 L94 91 Z" opacity="0.65"/>
      <!-- Europe -->
      <path d="M124 35 L136 31 L145 37 L146 48 L139 54 L130 53 L123 47 Z"/>
      <!-- Africa -->
      <path d="M125 61 L138 57 L147 64 L150 81 L148 97 L141 109 L132 114 L123 110 L117 101 L115 86 L118 70 Z"/>
      <!-- Madagascar -->
      <path d="M150 83 L154 78 L157 85 L155 96 L152 96 L149 89 Z" opacity="0.75"/>
    </g>

    <!-- Resort building — classical facade centred on equator (y=87) -->
    <g clip-path="url(#globeClip)" fill="url(#goldMetal)">
      <!-- Platform at equator -->
      <rect x="80" y="84" width="64" height="5" rx="0.5"/>
      <!-- Left wing -->
      <rect x="82" y="69" width="12" height="16"/>
      <rect x="83.5" y="71"  width="3.5" height="5" fill="#060E20" rx="0.4"/>
      <rect x="89"   y="71"  width="3.5" height="5" fill="#060E20" rx="0.4"/>
      <!-- Right wing -->
      <rect x="130" y="69" width="12" height="16"/>
      <rect x="131.5" y="71" width="3.5" height="5" fill="#060E20" rx="0.4"/>
      <rect x="137"   y="71" width="3.5" height="5" fill="#060E20" rx="0.4"/>
      <!-- Main facade -->
      <rect x="93" y="51" width="38" height="34"/>
      <!-- Upper-floor windows (5) -->
      <rect x="95.5" y="54" width="5" height="7" fill="#060E20" rx="0.4"/>
      <rect x="103"  y="54" width="5" height="7" fill="#060E20" rx="0.4"/>
      <rect x="110.5" y="54" width="4" height="7" fill="#060E20" rx="0.4"/>
      <rect x="117"  y="54" width="5" height="7" fill="#060E20" rx="0.4"/>
      <rect x="124"  y="54" width="5" height="7" fill="#060E20" rx="0.4"/>
      <!-- Mid cornice -->
      <rect x="93" y="65" width="38" height="1.5" fill="#FFF1B0" opacity="0.35"/>
      <!-- Ground-floor arched openings (4) -->
      <path d="M95.5 85 L95.5 73 A3.5 3.5 0 0 1 102.5 73 L102.5 85 Z" fill="#060E20"/>
      <path d="M104.5 85 L104.5 73 A3.5 3.5 0 0 1 111.5 73 L111.5 85 Z" fill="#060E20"/>
      <path d="M113.5 85 L113.5 73 A3.5 3.5 0 0 1 120.5 73 L120.5 85 Z" fill="#060E20"/>
      <path d="M122.5 85 L122.5 73 A3.5 3.5 0 0 1 129.5 73 L129.5 85 Z" fill="#060E20"/>
      <!-- Ground-floor string course -->
      <rect x="93" y="71.5" width="38" height="1.5" fill="#FFF1B0" opacity="0.30"/>
      <!-- Pilaster edges -->
      <rect x="94.5" y="51" width="1.5" height="34" fill="#FFF1B0" opacity="0.20"/>
      <rect x="129"  y="51" width="1.5" height="34" fill="#FFF1B0" opacity="0.20"/>
      <!-- Central tower -->
      <rect x="102" y="36" width="20" height="16"/>
      <!-- Tower cornice -->
      <rect x="102" y="36" width="20" height="2" fill="#FFF1B0" opacity="0.45"/>
      <!-- Tower windows -->
      <rect x="104"  y="39" width="5" height="8" fill="#060E20" rx="0.5"/>
      <rect x="115"  y="39" width="5" height="8" fill="#060E20" rx="0.5"/>
      <!-- Pediment -->
      <polygon points="98,36 126,36 112,25"/>
      <polyline points="98,36 112,25 126,36" fill="none" stroke="#FFF1B0" stroke-width="0.9" opacity="0.50"/>
    </g>

    <!-- Specular highlight -->
    <circle cx="112" cy="87" r="62" fill="url(#sphereGlow)"/>
    <!-- Globe border ring -->
    <circle cx="112" cy="87" r="62" fill="none" stroke="url(#goldMetal)" stroke-width="3"/>
  </g>

  <!-- HOSPEDAH text -->
  <text x="190" y="86" fill="url(#goldText)" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" letter-spacing="2" filter="url(#textShadow)" paint-order="stroke fill" stroke="#5a3a00" stroke-width="0.6" stroke-linejoin="round">HOSPEDAH</text>

  <!-- Tagline — centred under HOSPEDAH with ornamental arrow dashes -->
  <g fill="url(#goldMetal)" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" text-anchor="middle">
    <text x="345" y="121">Sua experiência começa aqui</text>
  </g>
  <!-- Left ornament: line + arrowhead pointing right -->
  <line x1="196" y1="117" x2="225" y2="117" stroke="url(#goldMetal)" stroke-width="1.2"/>
  <polygon points="225,113.5 225,120.5 231,117" fill="url(#goldMetal)"/>
  <!-- Right ornament: line + arrowhead pointing left -->
  <line x1="496" y1="117" x2="467" y2="117" stroke="url(#goldMetal)" stroke-width="1.2"/>
  <polygon points="467,113.5 467,120.5 461,117" fill="url(#goldMetal)"/>

</svg>
