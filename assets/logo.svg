<svg xmlns="http://www.w3.org/2000/svg" width="580" height="160" viewBox="0 0 580 160" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">HOSPEDAH — Resorts e Experiências Exclusivas</title>
  <desc id="logoDesc">Logo com H dourado, globo azul com continentes dourados, resort interno, nome HOSPEDAH em dourado e tagline.</desc>
  <defs>
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="30%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#FFF1B0"/>
      <stop offset="72%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF6CC"/>
      <stop offset="28%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#D4AF37"/>
      <stop offset="76%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F7DF8A"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="navyDepth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2F5E"/>
      <stop offset="100%" stop-color="#0B1C3D"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#091429" flood-opacity="0.38"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.50"/>
    </filter>
  </defs>

  <!-- Globe rendered FIRST (behind H legs) — centered at absolute (60, 69) via translate(18,31) -->
  <g transform="translate(18 31)" filter="url(#softShadow)">
    <!-- Base sphere -->
    <circle cx="42" cy="38" r="34" fill="url(#navyDepth)" stroke="url(#goldMetal)" stroke-width="2"/>

    <!-- Latitude / longitude grid -->
    <g stroke="url(#goldMetal)" fill="none">
      <!-- Equator — prominent gold line that visually acts as the H crossbar -->
      <line x1="8" y1="38" x2="76" y2="38" stroke-width="1.3" opacity="0.9"/>
      <!-- Tropic lines -->
      <line x1="13" y1="27" x2="71" y2="27" stroke-width="0.7" opacity="0.5"/>
      <line x1="13" y1="49" x2="71" y2="49" stroke-width="0.7" opacity="0.5"/>
      <!-- Polar circles -->
      <line x1="25" y1="16" x2="59" y2="16" stroke-width="0.6" opacity="0.4"/>
      <line x1="25" y1="60" x2="59" y2="60" stroke-width="0.6" opacity="0.4"/>
      <!-- Longitude ellipses -->
      <ellipse cx="42" cy="38" rx="30" ry="10" stroke-width="0.7" opacity="0.5"/>
      <ellipse cx="42" cy="38" rx="30" ry="20" stroke-width="0.7" opacity="0.5"/>
      <ellipse cx="42" cy="38" rx="17" ry="34" stroke-width="0.7" opacity="0.55"/>
      <!-- Central meridian -->
      <line x1="42" y1="4" x2="42" y2="72" stroke-width="0.7" opacity="0.55"/>
    </g>

    <!-- Continents (gold) — positioned in the central visible strip between H legs -->
    <g fill="url(#goldSoft)">
      <!-- Americas (left of globe centre) -->
      <path d="M28 22l6-4 7 2 2 7-4 5-7 2-4-4z"/>
      <path d="M31 37l5-2 6 2 2 6-4 7-6 3-4-2 1-8z"/>
      <!-- Europe / Africa (right of centre) -->
      <path d="M46 20l5-1 4 4-1 6-4 3-5-2 1-6z"/>
      <path d="M48 32l5-1 5 3 2 6-5 7-5 1-3-4 1-8z"/>
      <!-- Asia hint -->
      <path d="M58 18l6-1 3 3-1 5-5 2-4-2 1-5z"/>
    </g>

    <!-- Hotel / resort building silhouette in globe centre -->
    <g fill="url(#goldMetal)">
      <!-- Side wings -->
      <rect x="22" y="39" width="7" height="11"/>
      <rect x="55" y="39" width="7" height="11"/>
      <!-- Main facade -->
      <rect x="27" y="37" width="30" height="15"/>
      <!-- Central tower -->
      <rect x="36" y="29" width="12" height="10"/>
      <!-- Pediment / roof -->
      <polygon points="35,29 49,29 42,23"/>
      <!-- Windows — main facade (navy) -->
      <rect x="29" y="39" width="4" height="5" fill="#091429" rx="0.5"/>
      <rect x="35" y="39" width="4" height="5" fill="#091429" rx="0.5"/>
      <rect x="41" y="39" width="4" height="5" fill="#091429" rx="0.5"/>
      <rect x="47" y="39" width="4" height="5" fill="#091429" rx="0.5"/>
      <!-- Windows — central tower (navy) -->
      <rect x="38" y="31" width="3" height="4" fill="#091429" rx="0.5"/>
      <rect x="43" y="31" width="3" height="4" fill="#091429" rx="0.5"/>
    </g>

    <!-- Globe border drawn last so it sits on top of continents/building -->
    <circle cx="42" cy="38" r="34" fill="none" stroke="url(#goldMetal)" stroke-width="2"/>
  </g>

  <!-- H legs rendered SECOND (in front of globe), no crossbar — globe equator line serves that role -->
  <g filter="url(#softShadow)">
    <path d="M24 24h16v90H24z" fill="url(#goldMetal)"/>
    <path d="M80 24h16v90H80z" fill="url(#goldMetal)"/>
    <!-- Subtle top/bottom highlights on each leg -->
    <path d="M24 24h16v6H24zm0 84h16v6H24zm56-84h16v6H80zm0 84h16v6H80z" fill="#FFF1B0" opacity="0.45"/>
  </g>

  <!-- HOSPEDAH — font-size reduced to 52 and viewBox widened to 580 so the final H is never clipped -->
  <text x="150" y="74" fill="url(#goldText)" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" letter-spacing="2" filter="url(#textShadow)" paint-order="stroke fill" stroke="#5a3a00" stroke-width="0.6" stroke-linejoin="round">HOSPEDAH</text>

  <!-- Tagline — centred under HOSPEDAH text (~x=305) with symmetric dashes -->
  <g fill="url(#goldMetal)" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" text-anchor="middle">
    <text x="305" y="108">Sua experiência começa aqui.</text>
    <text x="158" y="108">—</text>
    <text x="452" y="108">—</text>
  </g>

</svg>
