<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 400 160" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">HOSPEDAH — Resorts e Experiências Exclusivas</title>
  <desc id="logoDesc">Logo com H dourado, globo azul com continentes dourados, resort interno, nome HOSPEDAH e tagline.</desc>
  <defs>
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="30%" stop-color="#F2D06B"/>
      <stop offset="52%" stop-color="#FFF1B0"/>
      <stop offset="72%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B6C08"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F7DF8A"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="navyDepth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2F5E"/>
      <stop offset="100%" stop-color="#0B1C3D"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#091429" flood-opacity="0.38"/>
    </filter>
    <symbol id="hospedah-navbar-lockup" viewBox="0 0 200 40">
      <circle cx="20" cy="20" r="14" fill="url(#navyDepth)" stroke="url(#goldMetal)" stroke-width="1.2"/>
      <ellipse cx="20" cy="20" rx="9" ry="14" fill="none" stroke="url(#goldMetal)" stroke-width="0.7" opacity="0.6"/>
      <ellipse cx="20" cy="20" rx="14" ry="5" fill="none" stroke="url(#goldMetal)" stroke-width="0.7" opacity="0.6"/>
      <path d="M13 18l4-3 5 1 2 4-4 3-4-1z" fill="url(#goldSoft)" opacity="0.95"/>
      <path d="M17 27h8v-5h-8zm1.8-5h4.4v-2.2h-4.4zm-2.6 5h1.6v-4h-1.6zm9.6 0h1.6v-4h-1.6z" fill="url(#goldMetal)"/>
      <text x="42" y="26" fill="url(#goldMetal)" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" letter-spacing="1">HOSPEDAH</text>
    </symbol>
  </defs>

  <g filter="url(#softShadow)">
    <path d="M24 24h16v38h40V24h16v90H80V78H40v36H24z" fill="url(#goldMetal)"/>
    <path d="M24 24h16v6H24zm56 0h16v6H80zm0 84h16v6H80zm-56 0h16v6H24z" fill="#FFF1B0" opacity="0.45"/>
  </g>

  <g transform="translate(65 14)" filter="url(#softShadow)">
    <circle cx="42" cy="38" r="34" fill="url(#navyDepth)" stroke="url(#goldMetal)" stroke-width="1.6"/>

    <g stroke="url(#goldMetal)" stroke-linecap="round" fill="none" opacity="0.55">
      <ellipse cx="42" cy="38" rx="30" ry="10" stroke-width="0.8"/>
      <ellipse cx="42" cy="38" rx="30" ry="20" stroke-width="0.8"/>
      <ellipse cx="42" cy="38" rx="17" ry="34" stroke-width="0.8"/>
      <line x1="8" y1="38" x2="76" y2="38" stroke-width="0.7"/>
    </g>

    <g fill="url(#goldSoft)">
      <path d="M27 25l7-7 8 2 2 8-5 6-9-1z"/>
      <path d="M39 39l8-3 7 3 2 7-9 5-10-2z"/>
      <path d="M30 44l5 4-1 8-6 5-5-4 2-8z"/>
    </g>

    <path d="M27 56h30v9H27zm2.4 0h5.2V47h-5.2zm8.2 0h8.8V43h-8.8zm11.8 0h5.2V49h-5.2zM32 47h4.8l-2.4-5.5zM41.8 43h7l-3.5-6.2zM51.5 49h4.5l-2.2-4.5z" fill="url(#goldMetal)"/>
  </g>

  <text x="153" y="72" fill="#0B1C3D" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" letter-spacing="1.5">HOSPEDAH</text>

  <g fill="url(#goldMetal)" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" text-anchor="middle">
    <text x="272" y="106">Sua experiência começa aqui.</text>
    <text x="160" y="106">—</text>
    <text x="384" y="106">—</text>
  </g>
</svg>
